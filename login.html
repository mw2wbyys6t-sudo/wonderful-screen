<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星云编年史 · 登录 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --neon-pink: #ff2a6d;
            --deep-space: #03030a;
            --star-white: #f0f0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
            background: var(--deep-space);
            color: var(--star-white);
        }

        /* ===== 全屏背景轮播 ===== */
        .slideshow {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
            will-change: opacity, transform;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.12);
            animation: kenburns 10s linear infinite alternate;
        }

        @keyframes kenburns {
            0% { transform: scale(1.08) translate(0, 0); }
            100% { transform: scale(1.18) translate(-1.5%, -1%); }
        }

        /* 暗角与色调层：右侧更暗以突出登录卡片，中央保留人物亮度 */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(circle at 45% 35%, transparent 0%, rgba(3, 3, 10, 0.35) 50%, rgba(3, 3, 10, 0.75) 100%),
                linear-gradient(90deg, rgba(3, 3, 10, 0.2) 0%, rgba(3, 3, 10, 0.1) 45%, rgba(3, 3, 10, 0.55) 80%, rgba(3, 3, 10, 0.7) 100%),
                linear-gradient(180deg, rgba(3, 3, 10, 0.35) 0%, rgba(3, 3, 10, 0.05) 40%, rgba(3, 3, 10, 0.55) 100%);
            pointer-events: none;
        }

        /* ===== 动态光斑背景 ===== */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            animation: float 14s ease-in-out infinite;
        }

        .orb-1 {
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.6) 0%, rgba(0, 120, 255, 0.2) 60%, transparent 100%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.5) 0%, rgba(120, 20, 200, 0.15) 60%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(255, 42, 109, 0.4) 0%, rgba(200, 30, 90, 0.1) 60%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -9s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.06); }
            50% { transform: translate(-30px, 30px) scale(0.96); }
            75% { transform: translate(50px, 40px) scale(1.04); }
        }

        /* ===== 主场景 ===== */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            perspective: 1200px;
            padding: 40px min(5vw, 80px);
        }

        /* 顶部标题 */
        .title-section {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.4);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(0.85rem, 2.5vw, 1.05rem);
            color: rgba(240, 240, 255, 0.72);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.25); }
        }

        /* ===== 玻璃登录卡片 ===== */
        .login-scene {
            position: relative;
            width: min(42vw, 420px);
            min-width: 320px;
            margin-top: 50px;
        }

        .glass-back {
            position: absolute;
            width: 92%;
            height: 94%;
            top: 12px;
            left: 4%;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
            transform: translateZ(-70px) rotateX(5deg);
        }

        .glass-card {
            position: relative;
            width: 100%;
            padding: 44px 38px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 顶部轮廓高光 */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.38) 0%,
                rgba(255, 255, 255, 0.08) 45%,
                transparent 75%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 鼠标跟随高光 */
        .sheen {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.2) 0%,
                rgba(255, 255, 255, 0.07) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.45s ease;
            mix-blend-mode: overlay;
        }

        .glass-card:hover .sheen {
            opacity: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 14px var(--neon-cyan);
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-group input:focus {
            border-color: rgba(0, 243, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.12);
        }

        .login-button {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.18), rgba(176, 38, 255, 0.18));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.35s ease;
            box-shadow:
                0 6px 24px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.28), rgba(176, 38, 255, 0.28));
            box-shadow:
                0 10px 36px rgba(0, 243, 255, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .login-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.4) 0%,
                rgba(255, 255, 255, 0.05) 60%,
                transparent 100%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 轮播指示器 */
        .slide-indicators {
            position: absolute;
            bottom: 42px;
            left: 42px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: var(--neon-cyan);
            box-shadow: 0 0 12px var(--neon-cyan);
            transform: scale(1.3);
        }

        /* 角色名称浮动标签 */
        .character-label {
            position: absolute;
            bottom: 78px;
            left: 42px;
            z-index: 10;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 4px;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }

        .character-label.visible {
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .scene {
                align-items: center;
                padding: 40px 20px;
            }
            .login-scene {
                width: min(92vw, 440px);
                margin-top: 70px;
            }
            .vignette {
                background:
                    radial-gradient(circle at 50% 35%, transparent 0%, rgba(3, 3, 10, 0.45) 50%, rgba(3, 3, 10, 0.85) 100%),
                    linear-gradient(180deg, rgba(3, 3, 10, 0.35) 0%, rgba(3, 3, 10, 0.15) 45%, rgba(3, 3, 10, 0.7) 100%);
            }
            .slide-indicators,
            .character-label {
                left: 50%;
                transform: translateX(-50%);
            }
            .character-label {
                bottom: 80px;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 34px 26px;
                border-radius: 30px;
            }
            .login-title {
                font-size: 26px;
            }
            .main-title {
                letter-spacing: 6px;
            }
            .login-scene {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 全屏背景轮播 -->
    <div class="slideshow" id="slideshow"></div>

    <!-- 暗角与色调层 -->
    <div class="vignette"></div>

    <!-- 动态光斑 -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 主场景 -->
    <div class="scene">
        <div class="title-section">
            <h1 class="main-title">NEBULA CHRONICLE</h1>
            <p class="sub-title">星云编年史 · 探索二次元的次元之门</p>
        </div>

        <div class="login-scene">
            <div class="glass-back"></div>
            <div class="glass-card" id="glassCard">
                <div class="sheen" id="sheen"></div>
                <div class="login-content">
                    <div class="login-badge">
                        <span class="badge-dot"></span>
                        欢迎回来
                    </div>
                    <h2 class="login-title">登录</h2>
                    <p class="login-desc">以语音与手势，开启你的动漫时空之旅</p>

                    <form id="loginForm" autocomplete="off">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="login-button">进入星云</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="character-label" id="characterLabel"></div>
        <div class="slide-indicators" id="indicators"></div>
    </div>

    <script>
        // 角色轮播数据：focus 为 object-position，确保人物主体不被遮挡
        const characters = [
            { file: 'violet-evergarden.png', name: '薇尔莉特 · 伊芙加登', focus: '50% 28%' },
            { file: 'akiyama-mio.jpg', name: '秋山澪', focus: '52% 32%' },
            { file: 'tachibana-kanade.jpg', name: '立华奏', focus: '50% 30%' },
            { file: 'shana.jpg', name: '夏娜', focus: '50% 35%' },
            { file: 'kato-megumi.jpg', name: '加藤惠', focus: '46% 30%' },
            { file: 'rem.jpg', name: '雷姆', focus: '50% 28%' },
            { file: 'elaina.jpg', name: '伊蕾娜', focus: '48% 26%' },
            { file: 'misaka-mikoto.jpg', name: '御坂美琴', focus: '46% 30%' }
        ];

        const slideshow = document.getElementById('slideshow');
        const indicators = document.getElementById('indicators');
        const characterLabel = document.getElementById('characterLabel');
        let currentSlide = 0;
        let slideInterval;

        // 初始化轮播
        function initSlideshow() {
            characters.forEach((char, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide' + (index === 0 ? ' active' : '');

                const img = document.createElement('img');
                img.src = `images/login/${char.file}`;
                img.alt = char.name;
                img.loading = index === 0 ? 'eager' : 'lazy';
                img.style.objectPosition = char.focus || '50% 50%';
                img.style.objectFit = 'cover';
                img.style.width = '100%';
                img.style.height = '100%';
                slide.appendChild(img);

                slideshow.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'indicator' + (index === 0 ? ' active' : '');
                dot.setAttribute('aria-label', `切换到 ${char.name}`);
                dot.addEventListener('click', () => goToSlide(index));
                indicators.appendChild(dot);
            });
            updateLabel(0);
            startAutoPlay();
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.indicator');

            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');

            currentSlide = index;

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            updateLabel(currentSlide);

            resetAutoPlay();
        }

        function nextSlide() {
            const next = (currentSlide + 1) % characters.length;
            goToSlide(next);
        }

        function updateLabel(index) {
            characterLabel.classList.remove('visible');
            setTimeout(() => {
                characterLabel.textContent = characters[index].name;
                characterLabel.classList.add('visible');
            }, 300);
        }

        function startAutoPlay() {
            slideInterval = setInterval(nextSlide, 6000);
        }

        function resetAutoPlay() {
            clearInterval(slideInterval);
            startAutoPlay();
        }

        // Liquid Glass 鼠标跟随高光
        const card = document.getElementById('glassCard');
        const sheen = document.getElementById('sheen');
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            targetX = e.clientX - rect.left;
            targetY = e.clientY - rect.top;

            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            card.style.transform = `rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
        });

        card.addEventListener('mouseleave', () => {
            sheen.style.opacity = '0';
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        card.addEventListener('mouseenter', () => {
            sheen.style.opacity = '1';
        });

        function animateSheen() {
            currentX += (targetX - currentX) * 0.12;
            currentY += (targetY - currentY) * 0.12;
            sheen.style.left = currentX + 'px';
            sheen.style.top = currentY + 'px';
            requestAnimationFrame(animateSheen);
        }
        animateSheen();

        // 登录表单
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return;

            // 模拟登录验证（演示用途，后续可替换为真实接口）
            sessionStorage.setItem('nebulaUser', username);
            window.location.href = 'nebula-chronicle.html';
        });

        // 启动
        initSlideshow();
    </script>
</body>
</html>
