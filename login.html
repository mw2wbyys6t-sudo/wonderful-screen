<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星云编年史 · 登录 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --neon-pink: #ff2a6d;
            --deep-space: #03030a;
            --star-white: #f0f0ff;
            --theme-color: #00f3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
            background: var(--deep-space);
            color: var(--star-white);
        }

        /* ===== 全屏背景轮播 ===== */
        .slideshow {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
            will-change: opacity, transform;
        }

        .slide.active {
            opacity: 1;
        }

        .slide.active img {
            animation: kenburns 10s linear infinite alternate;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.12);
        }

        @keyframes kenburns {
            0% { transform: scale(1.08) translate(0, 0); }
            100% { transform: scale(1.18) translate(-1.5%, -1%); }
        }

        /* 暗角与色调层 */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background:
                radial-gradient(circle at 35% 40%, transparent 0%, rgba(3, 3, 10, 0.35) 45%, rgba(3, 3, 10, 0.8) 100%),
                linear-gradient(90deg, rgba(3, 3, 10, 0.1) 0%, rgba(3, 3, 10, 0.05) 40%, rgba(3, 3, 10, 0.6) 75%, rgba(3, 3, 10, 0.75) 100%),
                linear-gradient(180deg, rgba(3, 3, 10, 0.35) 0%, rgba(3, 3, 10, 0.05) 40%, rgba(3, 3, 10, 0.55) 100%);
            pointer-events: none;
        }

        /* ===== 粒子背景 ===== */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ===== 动态光斑背景 ===== */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            animation: float 14s ease-in-out infinite;
        }

        .orb-1 {
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.6) 0%, rgba(0, 120, 255, 0.2) 60%, transparent 100%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.5) 0%, rgba(120, 20, 200, 0.15) 60%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(255, 42, 109, 0.4) 0%, rgba(200, 30, 90, 0.1) 60%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -9s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.06); }
            50% { transform: translate(-30px, 30px) scale(0.96); }
            75% { transform: translate(50px, 40px) scale(1.04); }
        }

        /* ===== 主场景 ===== */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 min(5vw, 80px);
            perspective: 1200px;
        }

        /* 顶部标题 */
        .title-section {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.4);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(0.85rem, 2.5vw, 1.05rem);
            color: rgba(240, 240, 255, 0.72);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.25); }
        }

        /* ===== 左侧角色信息区 ===== */
        .character-section {
            position: relative;
            width: min(42vw, 520px);
            min-width: 300px;
            align-self: flex-end;
            padding-bottom: 80px;
            pointer-events: none;
        }

        .character-info-card {
            background: rgba(3, 3, 10, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--theme-color);
            border-radius: 0 20px 20px 0;
            padding: 24px 28px;
            transform: translateX(-20px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .character-info-card.visible {
            transform: translateX(0);
            opacity: 1;
        }

        .character-year {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--theme-color);
            text-shadow: 0 0 14px color-mix(in srgb, var(--theme-color) 60%, transparent);
            margin-bottom: 8px;
        }

        .character-name {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .character-quote {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }

        /* ===== 玻璃登录卡片 ===== */
        .login-scene {
            position: relative;
            width: min(42vw, 420px);
            min-width: 320px;
        }

        .glass-back {
            position: absolute;
            width: 92%;
            height: 94%;
            top: 12px;
            left: 4%;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
            transform: translateZ(-70px) rotateX(5deg);
        }

        .glass-card {
            position: relative;
            width: 100%;
            padding: 44px 38px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.35),
                0 0 36px color-mix(in srgb, var(--theme-color) 8%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 顶部轮廓高光 */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.38) 0%,
                rgba(255, 255, 255, 0.08) 45%,
                transparent 75%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 动态光流 */
        .glass-card::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 255, 255, 0.04) 30deg,
                transparent 60deg,
                color-mix(in srgb, var(--theme-color) 6%, transparent) 90deg,
                transparent 120deg,
                rgba(255, 255, 255, 0.03) 150deg,
                transparent 180deg,
                color-mix(in srgb, var(--theme-color) 4%, transparent) 210deg,
                transparent 240deg,
                rgba(255, 255, 255, 0.02) 270deg,
                transparent 300deg,
                transparent 360deg
            );
            animation: lightRotate 14s linear infinite;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .glass-card:hover::after,
        .glass-card:focus-within::after {
            opacity: 1;
        }

        @keyframes lightRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 鼠标跟随高光 */
        .sheen {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.18) 0%,
                color-mix(in srgb, var(--theme-color) 8%, transparent) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.45s ease;
            mix-blend-mode: overlay;
        }

        .glass-card:hover .sheen {
            opacity: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--theme-color);
            box-shadow: 0 0 14px var(--theme-color);
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-group input:focus {
            border-color: var(--theme-color);
            background: rgba(0, 0, 0, 0.3);
            box-shadow:
                0 0 0 3px color-mix(in srgb, var(--theme-color) 12%, transparent),
                0 0 24px color-mix(in srgb, var(--theme-color) 30%, transparent);
        }

        .login-button {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(135deg, color-mix(in srgb, var(--theme-color) 22%, transparent), rgba(176, 38, 255, 0.18));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.35s ease;
            box-shadow:
                0 6px 24px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .login-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .login-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow:
                0 10px 36px color-mix(in srgb, var(--theme-color) 22%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .login-button .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 轮播指示器 */
        .slide-indicators {
            position: absolute;
            bottom: 42px;
            left: 42px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: var(--theme-color);
            box-shadow: 0 0 12px var(--theme-color);
            transform: scale(1.4);
        }

        /* 音频控制 */
        #audio-toggle {
            position: fixed;
            top: 28px;
            right: 28px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #audio-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        #audio-toggle[aria-pressed="true"] {
            color: var(--theme-color);
            border-color: color-mix(in srgb, var(--theme-color) 50%, transparent);
            box-shadow: 0 0 20px color-mix(in srgb, var(--theme-color) 30%, transparent);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .scene {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 100px 24px 40px;
                gap: 24px;
            }
            .character-section {
                width: 100%;
                min-width: auto;
                align-self: center;
                padding-bottom: 0;
                order: 2;
            }
            .character-info-card {
                border-radius: 20px;
                border-left: none;
                border-top: 3px solid var(--theme-color);
                text-align: center;
                padding: 18px 22px;
            }
            .login-scene {
                width: min(92vw, 440px);
                order: 1;
            }
            .vignette {
                background:
                    radial-gradient(circle at 50% 35%, transparent 0%, rgba(3, 3, 10, 0.45) 50%, rgba(3, 3, 10, 0.85) 100%),
                    linear-gradient(180deg, rgba(3, 3, 10, 0.35) 0%, rgba(3, 3, 10, 0.15) 45%, rgba(3, 3, 10, 0.7) 100%);
            }
            .slide-indicators {
                left: 50%;
                transform: translateX(-50%);
                bottom: 24px;
            }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 34px 26px;
                border-radius: 30px;
            }
            .login-title {
                font-size: 26px;
            }
            .main-title {
                letter-spacing: 6px;
            }
            .login-scene {
                min-width: auto;
            }
        }

        /* 减少运动偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 全屏背景轮播 -->
    <div class="slideshow" id="slideshow"></div>

    <!-- 暗角与色调层 -->
    <div class="vignette"></div>

    <!-- 粒子背景 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 动态光斑 -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 主场景 -->
    <div class="scene">
        <div class="title-section">
            <h1 class="main-title">NEBULA CHRONICLE</h1>
            <p class="sub-title">星云编年史 · 探索二次元的次元之门</p>
        </div>

        <div class="character-section">
            <div class="character-info-card" id="characterInfoCard">
                <div class="character-year" id="characterYear"></div>
                <h2 class="character-name" id="characterName"></h2>
                <p class="character-quote" id="characterQuote"></p>
            </div>
        </div>

        <div class="login-scene">
            <div class="glass-back"></div>
            <div class="glass-card" id="glassCard">
                <div class="sheen" id="sheen"></div>
                <div class="login-content">
                    <div class="login-badge">
                        <span class="badge-dot"></span>
                        欢迎回来
                    </div>
                    <h2 class="login-title">登录</h2>
                    <p class="login-desc">以语音与手势，开启你的动漫时空之旅</p>

                    <form id="loginForm" autocomplete="off">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required minlength="6">
                        </div>
                        <button type="submit" class="login-button">进入星云</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="slide-indicators" id="indicators"></div>
    </div>

    <button id="audio-toggle" title="背景音乐" aria-label="开启背景音乐" aria-pressed="false">♪</button>

    <script>
        // 角色轮播数据
        const characters = [
            { file: 'violet-evergarden.png', name: '薇尔莉特 · 伊芙加登', year: '2019 世萌萌王', color: '#b892ff', quote: '爱，究竟是什么意思？', focus: '50% 28%' },
            { file: 'akiyama-mio.jpg', name: '秋山澪', year: '2010/2011 世萌萌王', color: '#ff9ec8', quote: '不要再这样看着我……', focus: '52% 32%' },
            { file: 'tachibana-kanade.jpg', name: '立华奏', year: '2012 世萌萌王', color: '#c7f0ff', quote: '我希望你能活下去。', focus: '50% 30%' },
            { file: 'shana.jpg', name: '夏娜', year: '2016 世萌萌王', color: '#ff4d4d', quote: '吵死了！吵死了！吵死了！', focus: '50% 35%' },
            { file: 'kato-megumi.jpg', name: '加藤惠', year: '2017 世萌萌王', color: '#ffb7c5', quote: '我，一直在你身边哦。', focus: '46% 30%' },
            { file: 'rem.jpg', name: '雷姆', year: '2018 世萌萌王', color: '#7fd3ff', quote: '雷姆相信昴。', focus: '50% 28%' },
            { file: 'elaina.jpg', name: '伊蕾娜', year: '2021 世萌萌王', color: '#e8e8ff', quote: '请问有什么委托吗？', focus: '48% 26%' },
            { file: 'misaka-mikoto.jpg', name: '御坂美琴', year: '人气之王', color: '#00bfff', quote: '你指尖跃动的电光，是我此生不变的信仰。', focus: '46% 30%' }
        ];

        const slideshow = document.getElementById('slideshow');
        const indicators = document.getElementById('indicators');
        const characterInfoCard = document.getElementById('characterInfoCard');
        const characterYear = document.getElementById('characterYear');
        const characterName = document.getElementById('characterName');
        const characterQuote = document.getElementById('characterQuote');
        const rootStyle = document.documentElement.style;
        let currentSlide = 0;
        let slideInterval;

        // 初始化轮播
        function initSlideshow() {
            characters.forEach((char, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide' + (index === 0 ? ' active' : '');

                const img = document.createElement('img');
                img.src = `images/login/${char.file}`;
                img.alt = char.name;
                img.loading = index === 0 ? 'eager' : 'lazy';
                img.style.objectPosition = char.focus || '50% 50%';
                img.style.objectFit = 'cover';
                img.style.width = '100%';
                img.style.height = '100%';
                slide.appendChild(img);

                slideshow.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'indicator' + (index === 0 ? ' active' : '');
                dot.setAttribute('aria-label', `切换到 ${char.name}`);
                dot.addEventListener('click', () => goToSlide(index));
                indicators.appendChild(dot);
            });
            updateCharacterInfo(0, true);
            startAutoPlay();
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.indicator');

            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');

            currentSlide = index;

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            updateCharacterInfo(currentSlide);

            resetAutoPlay();
        }

        function nextSlide() {
            const next = (currentSlide + 1) % characters.length;
            goToSlide(next);
        }

        function updateCharacterInfo(index, initial = false) {
            const char = characters[index];
            rootStyle.setProperty('--theme-color', char.color);

            if (initial) {
                characterYear.textContent = char.year;
                characterName.textContent = char.name;
                characterQuote.textContent = `「${char.quote}」`;
                characterInfoCard.classList.add('visible');
                return;
            }

            characterInfoCard.classList.remove('visible');
            setTimeout(() => {
                characterYear.textContent = char.year;
                characterName.textContent = char.name;
                characterQuote.textContent = `「${char.quote}」`;
                characterInfoCard.classList.add('visible');
            }, 400);
        }

        function startAutoPlay() {
            slideInterval = setInterval(nextSlide, 6000);
        }

        function resetAutoPlay() {
            clearInterval(slideInterval);
            startAutoPlay();
        }

        // 粒子背景
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particleRafId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const particles = [];
            const count = Math.min(180, Math.floor((canvas.width * canvas.height) / 9000));

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }

            let frame = 0;
            function draw() {
                particleRafId = requestAnimationFrame(draw);
                frame++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;

                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    const twinkle = Math.sin(frame * 0.02 + p.twinkle) * 0.3 + 0.7;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * twinkle})`;
                    ctx.fill();
                });
            }
            draw();

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(particleRafId);
                } else {
                    draw();
                }
            });
        }

        // Liquid Glass 鼠标跟随高光
        const card = document.getElementById('glassCard');
        const sheen = document.getElementById('sheen');
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let sheenRafId = null;

        function animateSheen() {
            currentX += (targetX - currentX) * 0.12;
            currentY += (targetY - currentY) * 0.12;
            sheen.style.left = currentX + 'px';
            sheen.style.top = currentY + 'px';
            sheenRafId = requestAnimationFrame(animateSheen);
        }

        card.addEventListener('pointermove', (e) => {
            const rect = card.getBoundingClientRect();
            targetX = e.clientX - rect.left;
            targetY = e.clientY - rect.top;

            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            card.style.transform = `rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
        }, { passive: true });

        card.addEventListener('pointerleave', () => {
            sheen.style.opacity = '0';
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
            if (sheenRafId) {
                cancelAnimationFrame(sheenRafId);
                sheenRafId = null;
            }
        });

        card.addEventListener('pointerenter', () => {
            sheen.style.opacity = '1';
            if (!sheenRafId) animateSheen();
        });

        // 登录表单
        const loginBtn = document.querySelector('.login-button');

        loginBtn.addEventListener('click', (e) => {
            const rect = loginBtn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            loginBtn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return;

            loginBtn.disabled = true;
            const originalText = loginBtn.textContent;
            loginBtn.textContent = '星门开启中…';

            setTimeout(() => {
                sessionStorage.setItem('nebulaUser', username);
                window.location.href = 'nebula-chronicle.html';
            }, 800);
        });

        // 程序化环境音乐
        let audioNodes = null;
        let audioMuted = true;
        const audioToggle = document.getElementById('audio-toggle');

        function initAudio() {
            if (audioNodes) return;
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;

            const ctx = new AudioCtx();
            const master = ctx.createGain();
            master.gain.value = 0;
            master.connect(ctx.destination);

            const drones = [
                { freq: 55, gain: 0.12, type: 'sine' },
                { freq: 110, gain: 0.06, type: 'triangle' },
                { freq: 220, gain: 0.03, type: 'sine' }
            ];

            const oscillators = [];
            const gains = [];

            drones.forEach(d => {
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = d.type;
                osc.frequency.value = d.freq;
                g.gain.value = d.gain;
                osc.connect(g);
                g.connect(master);
                osc.start();
                oscillators.push(osc);
                gains.push(g);
            });

            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain);
            lfoGain.connect(master.gain);
            lfo.start();

            const delay = ctx.createDelay();
            delay.delayTime.value = 0.45;
            const delayGain = ctx.createGain();
            delayGain.gain.value = 0.25;
            master.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(ctx.destination);

            audioNodes = { ctx, master, oscillators, gains, lfo, lfoGain, delay, delayGain };
        }

        function toggleAudio() {
            if (!audioNodes) initAudio();
            if (!audioNodes) return;

            audioMuted = !audioMuted;
            audioToggle.setAttribute('aria-pressed', !audioMuted);
            audioToggle.textContent = audioMuted ? '♪' : '♫';

            const now = audioNodes.ctx.currentTime;
            if (!audioMuted) {
                audioNodes.ctx.resume();
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0.3, now + 2.5);
            } else {
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0, now + 0.8);
            }
        }

        audioToggle.addEventListener('click', toggleAudio);

        // 启动
        initSlideshow();
        initParticles();

        window.addEventListener('beforeunload', () => {
            clearInterval(slideInterval);
        });
    </script>
</body>
</html>
