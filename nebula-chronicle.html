<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星云编年史 · 手势次元 | Nebula Chronicle</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 共享数据与工具 -->
    <script src="js/shared-data.js"></script>
    <script src="js/shared-utils.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #b026ff;
            --neon-cyan: #00ffff;
            --deep-space: #050510;
            --star-white: #e0e0ff;
            --glass-bg: rgba(10, 10, 40, 0.6);
            --glass-border: rgba(100, 100, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--deep-space);
            color: var(--star-white);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* ===== 星云背景 Canvas ===== */
        #nebula-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ===== 主界面 ===== */
        #main-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* ===== 标题区域 ===== */
        .title-section {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.1rem;
            color: rgba(200, 200, 255, 0.7);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(0, 243, 255, 0.3)); }
            100% { filter: brightness(1.3) drop-shadow(0 0 30px rgba(176, 38, 255, 0.6)); }
        }

        .music-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.35);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
            transition: all 0.3s ease;
        }

        .music-toggle:hover {
            background: rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.25);
            transform: translateY(-2px);
        }

        .music-toggle[aria-pressed="true"] {
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.25);
            animation: musicPulse 2s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.15); }
            50% { box-shadow: 0 0 30px rgba(0, 243, 255, 0.35); }
        }

        /* ===== 语音开关 ===== */
        .voice-toggle {
            position: fixed;
            top: 30px;
            right: 82px;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 255, 0.35);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            color: var(--neon-pink);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);
            transition: all 0.3s ease;
        }

        .voice-toggle:hover {
            background: rgba(255, 0, 255, 0.15);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.25);
            transform: translateY(-2px);
        }

        .voice-toggle[aria-pressed="true"] {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.35);
            animation: voicePulse 1.6s ease-in-out infinite;
        }

        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 255, 0.45); }
        }

        .voice-feedback {
            position: fixed;
            top: 80px;
            right: 30px;
            padding: 8px 16px;
            background: rgba(255, 0, 255, 0.15);
            border: 1px solid rgba(255, 0, 255, 0.35);
            border-radius: 20px;
            color: var(--neon-pink);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .voice-feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 播放按钮 ===== */
        .play-btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px 24px;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.15), rgba(176, 38, 255, 0.15));
            border: 1px solid rgba(0, 243, 255, 0.4);
            border-radius: 14px;
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .play-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.3), rgba(176, 38, 255, 0.3));
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.25);
            transform: translateY(-2px);
        }

        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(200, 200, 255, 0.5);
        }

        /* ===== 时间树 ===== */
        #timeline-tree {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 80vh;
            pointer-events: auto;
        }

        /* ===== 螺旋时间轴 ===== */
        .spiral-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        .spiral-track {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(80vmin, 600px);
            height: min(80vmin, 600px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, 0.1);
            box-shadow:
                0 0 60px rgba(0, 243, 255, 0.1),
                inset 0 0 60px rgba(176, 38, 255, 0.05);
            animation: spiralRotate 60s linear infinite;
        }

        @keyframes spiralRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ===== 时间节点 ===== */
        .anime-node {
            position: absolute;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background-color: rgba(5, 5, 16, 0.9);
            border: 2px solid rgba(100, 100, 255, 0.35);
            box-shadow:
                0 0 20px rgba(0, 243, 255, 0.15),
                inset 0 0 24px rgba(0, 243, 255, 0.05);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            overflow: hidden;
            transform: translate(-50%, -50%);
        }

        .anime-node::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0.65) 100%);
            z-index: 2;
            transition: background 0.4s;
        }

        .anime-node:hover::after,
        .anime-node.active::after {
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.45) 100%);
        }

        .anime-node > .node-content {
            transition: transform 0.1s linear;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .anime-node > .node-content > .node-float {
            animation: nodeFloat 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes nodeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .anime-node::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--genre-color, var(--neon-cyan)), var(--neon-purple), var(--neon-pink), var(--genre-color, var(--neon-cyan)));
            z-index: 1;
            opacity: 0;
            transition: opacity 0.4s;
            filter: blur(1px);
        }

        .anime-node:hover::before,
        .anime-node.active::before,
        .anime-node:focus-visible::before {
            opacity: 0.9;
            animation: borderRotate 3s linear infinite;
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .anime-node:hover,
        .anime-node.active,
        .anime-node:focus-visible {
            transform: translate(-50%, -50%) scale(1.45);
            box-shadow:
                0 0 50px var(--genre-glow, rgba(0, 243, 255, 0.5)),
                0 0 90px rgba(176, 38, 255, 0.25),
                inset 0 0 35px rgba(255, 0, 255, 0.15);
            border-color: var(--genre-color, rgba(0, 243, 255, 0.6));
            z-index: 100;
        }

        .anime-node:focus-visible {
            outline: 2px solid var(--neon-cyan);
            outline-offset: 4px;
        }

        .node-year {
            font-size: 0.8rem;
            color: rgba(220, 235, 255, 0.95);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8), 0 0 12px rgba(0, 243, 255, 0.7);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .node-title {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.95);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Noto Serif SC', serif;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9), 0 0 10px rgba(0, 243, 255, 0.3);
        }

        /* ===== 连接线 ===== */
        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.45), transparent);
            transform-origin: left center;
            pointer-events: none;
            animation: linePulse 2s ease-in-out infinite;
        }

        @keyframes linePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* ===== 详情面板 ===== */
        .detail-panel {
            position: fixed;
            right: -100%;
            top: 50%;
            transform: translateY(-50%);
            width: min(420px, calc(100vw - 40px));
            max-height: 85vh;
            background: rgba(8, 8, 28, 0.72);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(100, 100, 255, 0.22);
            border-radius: 24px;
            padding: 32px;
            z-index: 200;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.4s ease,
                        box-shadow 0.4s ease;
            overflow-y: auto;
            pointer-events: auto;
            box-shadow:
                0 0 60px rgba(0, 243, 255, 0.08),
                inset 0 0 50px rgba(176, 38, 255, 0.05);
            opacity: 0.9;
        }

        .detail-panel.open {
            right: 20px;
            opacity: 1;
            box-shadow:
                0 0 80px var(--detail-glow, rgba(0, 243, 255, 0.18)),
                inset 0 0 50px rgba(176, 38, 255, 0.05);
        }

        .detail-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--detail-accent, var(--neon-cyan)), var(--neon-purple), var(--neon-pink));
            border-radius: 24px 24px 0 0;
        }

        .detail-image {
            width: 100%;
            height: 220px;
            background: radial-gradient(circle at 30% 30%, rgba(20, 20, 60, 0.6), rgba(5, 5, 16, 0.8));
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin-bottom: 24px;
            border: 1px solid rgba(100, 100, 255, 0.2);
            box-shadow:
                0 0 30px var(--detail-glow, rgba(0, 243, 255, 0.15)),
                inset 0 0 40px rgba(0, 0, 0, 0.4);
        }

        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .detail-image-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 20px;
            z-index: 0;
        }

        .detail-image-placeholder .placeholder-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .detail-image-placeholder .placeholder-genre {
            font-size: 0.8rem;
            color: var(--detail-accent, var(--neon-cyan));
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .detail-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.08) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .detail-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 6px;
            text-shadow: 0 0 20px var(--detail-glow, rgba(0, 243, 255, 0.4));
            letter-spacing: 1px;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .detail-year {
            font-size: 0.9rem;
            color: var(--neon-pink);
            font-family: 'Orbitron', sans-serif;
        }

        .detail-genre {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--detail-accent, rgba(0, 243, 255, 0.4));
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--detail-accent, var(--neon-cyan));
            font-family: 'Noto Serif SC', serif;
        }

        .detail-desc {
            font-size: 0.95rem;
            line-height: 1.9;
            color: rgba(200, 210, 255, 0.82);
            text-align: justify;
            font-family: 'Noto Serif SC', serif;
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.15);
            border: 1px solid rgba(255, 0, 255, 0.35);
            color: var(--neon-pink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 0, 255, 0.4);
            transform: rotate(90deg);
        }

        /* ===== 摄像头区域 ===== */
        #camera-section {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 240px;
            z-index: 100;
            pointer-events: auto;
        }

        .camera-container {
            position: relative;
            width: 240px;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(0, 243, 255, 0.3);
            box-shadow: 
                0 0 30px rgba(0, 243, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        #input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .camera-label {
            text-align: center;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
        }

        .camera-controls {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .camera-container:hover .camera-controls,
        .camera-controls:focus-within {
            opacity: 1;
        }

        .camera-btn {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid rgba(0, 243, 255, 0.4);
            background: rgba(5, 5, 16, 0.8);
            color: var(--neon-cyan);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .camera-btn:hover {
            background: rgba(0, 243, 255, 0.25);
        }

        #camera-section.minimized .camera-container {
            height: 40px;
            border-color: rgba(0, 243, 255, 0.2);
            background: rgba(5, 5, 16, 0.8);
        }

        #camera-section.minimized #input_video,
        #camera-section.minimized #output_canvas,
        #camera-section.minimized .gesture-indicator {
            display: none;
        }

        #camera-section.minimized .camera-label {
            display: none;
        }

        #camera-section.minimized .camera-controls {
            opacity: 1;
            position: static;
            width: 100%;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            padding: 0 10px;
        }

        .gesture-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            backdrop-filter: blur(10px);
        }

        /* ===== 手势提示 ===== */
        .gesture-hints {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            pointer-events: auto;
            transition: transform 0.3s ease;
        }

        .hint-toggle {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(0, 243, 255, 0.4);
            background: rgba(5, 5, 16, 0.9);
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .hint-toggle:hover {
            background: rgba(0, 243, 255, 0.2);
        }

        .gesture-hints[data-collapsed="true"] .hint-toggle {
            transform: rotate(180deg);
        }

        .gesture-hints[data-collapsed="true"] .hint-card {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
        }

        .hint-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px;
            width: 260px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hint-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 2px;
        }

        .hint-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.78rem;
            color: rgba(210, 210, 255, 0.85);
        }

        .hint-icon {
            width: 32px;

        /* ===== 启动画面 ===== */

        /* ===== 氛围层 ===== */

        .startup-subtitle {
            font-family: 'ZCOOL XiaoWei', serif;

</head>

                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>

    <!-- 手势光标 -->

    <!-- 鼠标光标追踪器 -->
    <div id="cursor-tracker"></div>

    <script>

        // ===== 音乐引擎（Web Audio 生成星云氛围音乐） =====
        const MusicEngine = {
            audioContext: null,
            masterGain: null,
            isPlaying: false,
            activeSources: [],
            nextNoteTime: 0,
            schedulerTimer: null,

            init() {
                if (this.audioContext) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                this.audioContext = new AudioContext();
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = 0.22;
                this.masterGain.connect(this.audioContext.destination);
            },

            async play() {
                this.init();
                if (!this.audioContext) return;
                if (this.audioContext.state === 'suspended') {
                    await this.audioContext.resume();
                }
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.startDrone();
                this.startArpeggio();
                this.updateButton();
            },

            stop() {
                if (!this.isPlaying) return;
                this.isPlaying = false;
                this.activeSources.forEach(src => {
                    try {
                        src.stop();
                        src.disconnect();
                    } catch (err) { void err; }
                });
                this.activeSources = [];
                if (this.schedulerTimer) {
                    clearTimeout(this.schedulerTimer);
                    this.schedulerTimer = null;
                }
                this.updateButton();
            },

            toggle() {
                if (this.isPlaying) this.stop();
                else this.play();
            },

            startDrone() {
                // 深层星云铺垫：A2-E3-G3-B3 四度和声
                const freqs = [110.00, 164.81, 196.00, 246.94];
                freqs.forEach((f, i) => {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    const filter = this.audioContext.createBiquadFilter();

                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = f;

                    filter.type = 'lowpass';
                    filter.frequency.value = 500 + i * 100;
                    filter.Q.value = 1.5;

                    gain.gain.value = 0.04;

                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);

                    osc.start();
                    this.activeSources.push(osc);

                    // 缓慢滤波器扫频，营造呼吸感
                    const lfo = this.audioContext.createOscillator();
                    const lfoGain = this.audioContext.createGain();
                    lfo.frequency.value = 0.08 + i * 0.03;
                    lfoGain.gain.value = 150;
                    lfo.connect(lfoGain);
                    lfoGain.connect(filter.frequency);
                    lfo.start();
                    this.activeSources.push(lfo);
                });
            },

            startArpeggio() {
                // 日式五声音阶，空灵短音符
                const base = 261.63; // C4
                const ratios = [1, 9 / 8, 5 / 4, 3 / 2, 5 / 3, 2];
                this.nextNoteTime = this.audioContext.currentTime;
                this.scheduleNotes(base, ratios);
            },

            scheduleNotes(base, ratios) {
                if (!this.isPlaying) return;
                const lookahead = 0.15;
                while (this.nextNoteTime < this.audioContext.currentTime + lookahead) {
                    const ratio = ratios[Math.floor(Math.random() * ratios.length)];
                    const freq = base * ratio * (Math.random() > 0.85 ? 0.5 : 1);
                    this.playSparkle(freq, this.nextNoteTime, 0.35 + Math.random() * 0.4);
                    this.nextNoteTime += 0.6 + Math.random() * 1.2;
                }
                this.schedulerTimer = setTimeout(() => this.scheduleNotes(base, ratios), 120);
            },

            playSparkle(freq, time, duration) {
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                const filter = this.audioContext.createBiquadFilter();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.02, time + duration);

                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                filter.Q.value = 4;

                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.05, time + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

                // 轻微延迟，增加空间感
                const delay = this.audioContext.createDelay();
                delay.delayTime.value = 0.25;
                const delayGain = this.audioContext.createGain();
                delayGain.gain.value = 0.25;

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.masterGain);
                gain.connect(delay);
                delay.connect(delayGain);
                delayGain.connect(this.masterGain);

                osc.start(time);
                osc.stop(time + duration + 0.1);
                this.activeSources.push(osc);

                // 自动清理已停止的音源引用
                setTimeout(() => {
                    const idx = this.activeSources.indexOf(osc);
                    if (idx > -1) this.activeSources.splice(idx, 1);
                }, (time - this.audioContext.currentTime + duration + 0.2) * 1000);
            },

            updateButton() {
                const btn = dom.musicToggle;
                if (!btn) return;
                btn.setAttribute('aria-pressed', String(this.isPlaying));
                btn.setAttribute('aria-label', this.isPlaying ? '暂停音乐' : '播放音乐');
                btn.innerHTML = this.isPlaying
                    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
                    : '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            }
        };

        // ===== DOM 缓存 =====
        const dom = {
            startupScreen: document.getElementById('startup-screen'),
            mainInterface: document.getElementById('main-interface'),
            spiralContainer: document.getElementById('spiral-container'),
            nodes: null,
            nodeContents: null,
            eraLabels: null,
            detailPanel: document.getElementById('detail-panel'),
            detailImage: document.getElementById('detail-image'),
            detailImg: document.getElementById('detail-img'),
            detailPlaceholder: document.getElementById('detail-placeholder'),
            placeholderTitle: document.getElementById('placeholder-title'),
            placeholderGenre: document.getElementById('placeholder-genre'),
            detailTitle: document.getElementById('detail-title'),
            detailYear: document.getElementById('detail-year'),
            detailGenre: document.getElementById('detail-genre'),
            detailDesc: document.getElementById('detail-desc'),
            gestureIndicator: document.getElementById('gesture-indicator'),
            handCursor: document.getElementById('hand-cursor'),
            cursorTracker: document.getElementById('cursor-tracker'),
            loadingText: document.getElementById('loading-text'),
            startBtn: document.querySelector('.start-btn'),
            video: document.getElementById('input_video'),
            outputCanvas: document.getElementById('output_canvas'),
            gestureHints: document.getElementById('gesture-hints'),
            hintToggle: document.getElementById('hint-toggle'),
            cameraSection: document.getElementById('camera-section'),
            musicToggle: document.getElementById('music-toggle')
        };

        // ===== UI 交互初始化 =====
        function initUI() {
            // 音乐开关
            if (dom.musicToggle) {
                dom.musicToggle.addEventListener('click', () => MusicEngine.toggle());
            }

            // 语音开关
            const voiceToggle = document.getElementById('voice-toggle');
            if (voiceToggle) {
                const supported = VoiceEngine.isSupported();
                voiceToggle.style.display = supported ? 'flex' : 'none';
                VoiceEngine.onStateChange = updateVoiceButton;
                voiceToggle.addEventListener('click', () => {
                    if (VoiceEngine.isListening) {
                        VoiceEngine.stop();
                    } else {
                        VoiceEngine.onResult = handleVoiceCommand;
                        VoiceEngine.start();
                    }
                });
            }

            // 手势提示折叠
            if (dom.hintToggle && dom.gestureHints) {
                dom.hintToggle.addEventListener('click', () => {
                    const collapsed = dom.gestureHints.getAttribute('data-collapsed') === 'true';
                    dom.gestureHints.setAttribute('data-collapsed', String(!collapsed));
                    dom.hintToggle.setAttribute('aria-expanded', String(collapsed));
                    dom.hintToggle.setAttribute('aria-label', collapsed ? '折叠手势提示' : '展开手势提示');
                });
            }

            // 摄像头最小化/关闭控制
            initCameraControls();
        }

        function initCameraControls() {
            const section = dom.cameraSection;
            if (!section) return;

            const controls = document.createElement('div');
            controls.className = 'camera-controls';
            controls.innerHTML = `
                <button class="camera-btn camera-minimize" aria-label="最小化摄像头" title="最小化">−</button>
                <button class="camera-btn camera-close" aria-label="关闭摄像头" title="关闭">×</button>
            `;

            const container = section.querySelector('.camera-container');
            if (container) container.appendChild(controls);

            const minimizeBtn = controls.querySelector('.camera-minimize');
            const closeBtn = controls.querySelector('.camera-close');

            minimizeBtn.addEventListener('click', () => {
                section.classList.toggle('minimized');
                minimizeBtn.setAttribute('aria-label', section.classList.contains('minimized') ? '展开摄像头' : '最小化摄像头');
                minimizeBtn.textContent = section.classList.contains('minimized') ? '+' : '−';
            });

            closeBtn.addEventListener('click', () => {
                section.style.display = 'none';
                if (state.gestureMode !== 'mouse') setGestureMode('mouse');
            });
        }

        // ===== 全局状态 =====
        const state = {
            isStarted: false,
            cameraReady: false,
            currentGesture: 'none',
            handX: 0,
            handY: 0,
            smoothedHandX: 0,
            smoothedHandY: 0,
            selectedNode: null,
            spiralRotation: 0,
            isPinching: false,
            lastPinchTime: 0,
            lastDetailOpenTime: 0,
            lastGestureTime: 0,
            lastHandX: 0,
            pinchStartTime: 0,
            openHandStartTime: 0,
            velocityEma: 0,
            particleTimer: null,
            nebulaAnimationId: null,
            gestureMode: 'camera' // 'camera' | 'mouse'
        };

        /**
         * 判断手指是否伸展：指尖到手腕的距离大于近端指节到手腕距离的 1.1 倍
         */
        function isFingerExtended(tip, pip, wrist) {
            return distance(tip, wrist) > distance(pip, wrist) * 1.1;
        }

        /**
         * 判断拇指是否伸展：拇指指尖到食指根部的距离作为参考
         */
        function isThumbExtended(thumbTip, thumbIp, indexMcp, wrist) {
            return distance(thumbTip, wrist) > distance(thumbIp, wrist) * 1.05;
        }

        // ===== 启动体验 =====
        async function startExperience() {
            dom.startBtn.style.display = 'none';
            dom.loadingText.style.display = 'block';

            // 摄像头在后台初始化，避免阻塞启动流程
            initCamera().catch(error => {
                console.warn('摄像头初始化失败，切换到鼠标模式:', error);
                setGestureMode('mouse');
            });

            generateTimelineTree();
            preloadImages();

            // 在用户手势后启动氛围音乐（绕过浏览器自动播放限制）
            MusicEngine.play().catch(error => console.warn('音乐启动失败:', error));

            setTimeout(() => {
                dom.startupScreen.classList.add('hidden');
                dom.mainInterface.style.display = 'block';
                state.isStarted = true;
                startParticleSystem();
            }, CONFIG.STARTUP_DELAY_MS);
        }

        function setGestureMode(mode) {
            state.gestureMode = mode;
            updateGestureIndicator(mode === 'mouse' ? '鼠标模式' : '等待手势...');
        }

        // ===== 图片预加载 =====
        function preloadImages() {
            AnimeDB.all.forEach(anime => {
                if (anime.image) {
                    const img = new Image();
                    img.src = anime.image;
                }
            });
        }

        // ===== 时间树渲染 =====
        function generateTimelineTree() {
            const container = dom.spiralContainer;
            const centerX = 50;
            const centerY = 50;
            const { SPIRAL_MIN_RADIUS: minRadius, SPIRAL_MAX_RADIUS: maxRadius, SPIRAL_TURNS } = CONFIG;
            const total = AnimeDB.count;

            AnimeDB.all.forEach((anime, index) => {
                const position = calculateNodePosition(index, total, centerX, centerY, minRadius, maxRadius, SPIRAL_TURNS);
                const node = createNodeElement(anime, index, position);
                container.appendChild(node);

                if (index > 0) {
                    createConnectionLine(container, index, position.progress, position.angle, position.radius, position.x, position.y, centerX, centerY, minRadius, maxRadius);
                }
            });

            createEraLabels(container, centerX, centerY);
            cacheTimelineNodes();
            applySpiralTransform();
        }

        function calculateNodePosition(index, total, centerX, centerY, minRadius, maxRadius, spiralTurns) {
            const progress = index / total;
            const angle = progress * Math.PI * 2 * spiralTurns;
            const radius = minRadius + (maxRadius - minRadius) * progress;
            return {
                progress,
                angle,
                radius,
                x: centerX + radius * Math.cos(angle),
                y: centerY + radius * Math.sin(angle)
            };
        }

        function createNodeElement(anime, index, position) {
            const node = document.createElement('div');
            const genreColor = getGenreColor(anime.genre);

            node.className = 'anime-node';
            node.dataset.index = String(index);
            node.setAttribute('tabindex', '0');
            node.setAttribute('role', 'button');
            node.setAttribute('aria-label', `${anime.year}年 ${anime.title}，${anime.genre}`);

            // 类型主题色通过 CSS 变量直接设置，新增分类无需改 CSS
            node.style.setProperty('--genre-color', genreColor);
            node.style.setProperty('--genre-glow', hexToRgba(genreColor, 0.45));

            // 图片加载失败时，类型色渐变作为 fallback
            const fallbackGradient = `radial-gradient(circle at 30% 30%, ${hexToRgba(genreColor, 0.25)}, rgba(5, 5, 16, 0.9))`;
            if (anime.image) {
                node.style.backgroundImage = `url('${anime.image}'), ${fallbackGradient}`;
                node.style.backgroundSize = 'cover, cover';
                node.style.backgroundPosition = 'center, center';
            } else {
                node.style.backgroundImage = fallbackGradient;
            }

            node.style.left = position.x + '%';
            node.style.top = position.y + '%';

            node.innerHTML = `
                <div class="node-content">
                    <div class="node-float" style="animation-delay: ${(index % 10) * 0.3}s">
                        <div class="node-year">${anime.year}</div>
                        <div class="node-title">${anime.title}</div>
                    </div>
                </div>
            `;

            node.addEventListener('click', () => showDetail(index));
            node.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    showDetail(index);
                }
            });
            node.addEventListener('mouseenter', () => node.classList.add('active'));
            node.addEventListener('mouseleave', () => {
                if (state.selectedNode !== index) node.classList.remove('active');
            });

            return node;
        }

        function cacheTimelineNodes() {
            const container = dom.spiralContainer;
            dom.nodes = [...container.querySelectorAll('.anime-node')];
            dom.nodeContents = [...container.querySelectorAll('.anime-node > .node-content')];
            dom.eraLabels = [...container.querySelectorAll('.era-label')];
        }

        function createConnectionLine(container, index, progress, angle, radius, x, y, centerX, centerY, minRadius, maxRadius) {
            const prevProgress = (index - 1) / AnimeDB.all.length;
            const prevAngle = prevProgress * Math.PI * 2 * CONFIG.SPIRAL_TURNS;
            const prevRadius = minRadius + (maxRadius - minRadius) * prevProgress;
            const prevX = centerX + prevRadius * Math.cos(prevAngle);
            const prevY = centerY + prevRadius * Math.sin(prevAngle);

            const dx = x - prevX;
            const dy = y - prevY;
            const length = Math.sqrt(dx * dx + dy * dy);
            const rotation = Math.atan2(dy, dx) * 180 / Math.PI;

            const line = document.createElement('div');
            line.className = 'connection-line';
            line.style.width = length + '%';
            line.style.left = prevX + '%';
            line.style.top = prevY + '%';
            line.style.transform = `rotate(${rotation}deg)`;

            container.appendChild(line);
        }

        function createEraLabels(container, centerX, centerY) {
            const eras = [
                { year: '1960s', angle: 0 },
                { year: '1970s', angle: 72 },
                { year: '1980s', angle: 144 },
                { year: '1990s', angle: 216 },
                { year: '2000s', angle: 288 },
                { year: '2010s', angle: 360 },
                { year: '2020s', angle: 432 }
            ];

            eras.forEach(era => {
                const label = document.createElement('div');
                label.className = 'era-label';
                label.textContent = era.year;
                const rad = era.angle * Math.PI / 180;
                const r = 45;
                label.style.left = (centerX + r * Math.cos(rad)) + '%';
                label.style.top = (centerY + r * Math.sin(rad)) + '%';
                container.appendChild(label);
            });
        }

        // ===== 详情面板 =====
        function showDetail(index) {
            const now = Date.now();
            if (now - state.lastDetailOpenTime < CONFIG.DETAIL_OPEN_COOLDOWN_MS) return;
            state.lastDetailOpenTime = now;

            const anime = AnimeDB.all[index];
            if (!anime) return;

            state.selectedNode = index;

            const accent = getGenreColor(anime.genre);
            const glow = accent + '35'; // 约 21% 透明度

            dom.detailPanel.style.setProperty('--detail-accent', accent);
            dom.detailPanel.style.setProperty('--detail-glow', glow);

            dom.detailTitle.textContent = anime.title;
            dom.detailYear.textContent = anime.year + '年';
            dom.detailGenre.textContent = anime.genre;
            dom.detailDesc.textContent = anime.desc;

            // 图片加载成功时显示图片，失败或缺失时显示占位
            if (anime.image) {
                dom.detailImg.src = anime.image;
                dom.detailImg.alt = anime.title;
                dom.detailImg.style.display = 'block';
                dom.detailImg.onerror = () => {
                    dom.detailImg.style.display = 'none';
                    showDetailPlaceholder(anime);
                };
                dom.detailImg.onload = () => {
                    if (dom.detailPlaceholder) dom.detailPlaceholder.style.display = 'none';
                };
            } else {
                dom.detailImg.src = '';
                dom.detailImg.style.display = 'none';
                showDetailPlaceholder(anime);
            }

            dom.detailPanel.classList.add('open');
            dom.detailPanel.focus({ preventScroll: true });

            if (dom.nodes) {
                dom.nodes.forEach((node, i) => {
                    node.classList.toggle('active', i === index);
                });
            }

            const playBtn = document.getElementById('play-btn');
            if (playBtn) {
                const hasSource = !!(anime.bilibili || anime.videoUrl);
                playBtn.disabled = !hasSource;
                playBtn.textContent = hasSource ? '▶ 播放作品' : '暂无片源';
            }
        }

        function showDetailPlaceholder(anime) {
            if (!dom.detailPlaceholder) return;
            dom.detailPlaceholder.style.display = 'flex';
            if (dom.placeholderTitle) dom.placeholderTitle.textContent = anime.title;
            if (dom.placeholderGenre) dom.placeholderGenre.textContent = anime.genre;
        }

        function closeDetail() {
            dom.detailPanel.classList.remove('open');
            state.selectedNode = null;
            if (dom.nodes) {
                dom.nodes.forEach(node => node.classList.remove('active'));
            }
        }

        function playSelectedAnime() {
            if (state.selectedNode === null) return;
            const anime = AnimeDB.get(state.selectedNode);
            if (!anime) return;
            if (!anime.bilibili && !anime.videoUrl) {
                alert('该片源暂未配置，请在动漫数据中添加 bilibili 或 videoUrl 字段。');
                return;
            }
            window.location.href = `watch.html?index=${state.selectedNode}`;
        }

        // ===== 摄像头与手势识别 =====
        async function initCamera() {
            if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
                throw new Error('MediaPipe 库未加载，无法启用手势识别');
            }

            dom.outputCanvas.width = CONFIG.CAMERA_WIDTH;
            dom.outputCanvas.height = CONFIG.CAMERA_HEIGHT;

            const canvasCtx = dom.outputCanvas.getContext('2d');
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => onHandResults(results, canvasCtx));

            const camera = new Camera(dom.video, {
                onFrame: async () => {
                    await hands.send({ image: dom.video });
                },
                width: CONFIG.CAMERA_WIDTH,
                height: CONFIG.CAMERA_HEIGHT
            });

            await Promise.race([
                camera.start(),
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('摄像头启动超时')), CONFIG.CAMERA_TIMEOUT_MS)
                )
            ]);

            state.cameraReady = true;
            setGestureMode('camera');
        }

        function onHandResults(results, canvasCtx) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, CONFIG.CAMERA_WIDTH, CONFIG.CAMERA_HEIGHT);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                    color: '#00f3ff',
                    lineWidth: 2
                });
                drawLandmarks(canvasCtx, landmarks, {
                    color: '#ff00ff',
                    lineWidth: 1,
                    radius: 3
                });

                const indexTip = landmarks[8];
                const rawX = (1 - indexTip.x) * window.innerWidth;
                const rawY = indexTip.y * window.innerHeight;
                const dx = rawX - state.smoothedHandX;
                const dy = rawY - state.smoothedHandY;
                if (Math.hypot(dx, dy) > CONFIG.HAND_DEAD_ZONE_PX) {
                    state.smoothedHandX = lerp(state.smoothedHandX, rawX, CONFIG.CURSOR_LERP);
                    state.smoothedHandY = lerp(state.smoothedHandY, rawY, CONFIG.CURSOR_LERP);
                }
                state.handX = state.smoothedHandX;
                state.handY = state.smoothedHandY;

                detectGesture(landmarks);
                updateHandCursor(state.handX, state.handY);
            } else {
                hideHandCursor();
                state.lastHandX = 0;
                setDetectedGesture('none');
            }

            canvasCtx.restore();
        }

        // ===== 手势识别 =====
        function detectGesture(landmarks) {
            const now = Date.now();
            if (now - state.lastGestureTime < CONFIG.GESTURE_DEBOUNCE_MS) return;

            const wrist = landmarks[0];
            const thumbTip = landmarks[4];
            const thumbIp = landmarks[3];
            const indexTip = landmarks[8];
            const indexPip = landmarks[6];
            const indexMcp = landmarks[5];
            const middleTip = landmarks[12];
            const middlePip = landmarks[10];
            const ringTip = landmarks[16];
            const ringPip = landmarks[14];
            const pinkyTip = landmarks[20];
            const pinkyPip = landmarks[18];

            const fingers = {
                index: isFingerExtended(indexTip, indexPip, wrist),
                middle: isFingerExtended(middleTip, middlePip, wrist),
                ring: isFingerExtended(ringTip, ringPip, wrist),
                pinky: isFingerExtended(pinkyTip, pinkyPip, wrist),
                thumb: isThumbExtended(thumbTip, thumbIp, indexMcp, wrist)
            };

            const pinchDistance = distance(thumbTip, indexTip);
            const isPinched = pinchDistance < CONFIG.PINCH_THRESHOLD;

            let gesture = 'none';

            if (isPinched) {
                gesture = 'pinch';
                if (state.pinchStartTime === 0) state.pinchStartTime = now;
                if (now - state.pinchStartTime > CONFIG.PINCH_HOLD_MS) {
                    handlePinch();
                }
            } else {
                state.isPinching = false;
                state.pinchStartTime = 0;

                if (fingers.index && fingers.middle && fingers.ring && fingers.pinky) {
                    gesture = 'open';
                    if (state.openHandStartTime === 0) state.openHandStartTime = now;
                    if (now - state.openHandStartTime > CONFIG.OPEN_HAND_HOLD_MS) {
                        handleHover(state.handX, state.handY, true);
                    }
                } else {
                    state.openHandStartTime = 0;
                    if (fingers.index && !fingers.middle && !fingers.ring && !fingers.pinky) {
                        gesture = 'point';
                        handleHover(state.handX, state.handY, false);
                    } else if (fingers.index && fingers.middle && !fingers.ring && !fingers.pinky) {
                        gesture = 'swipe';
                        rotateTimelineByVelocity();
                    }
                }
            }

            if (gesture !== state.currentGesture) {
                state.lastGestureTime = now;
                setDetectedGesture(gesture);
            }
        }

        function setDetectedGesture(gesture) {
            state.currentGesture = gesture;
            updateGestureIndicator(getGestureText(gesture));
            updateHintHighlight(gesture);
        }

        function handlePinch() {
            const now = Date.now();
            if (!state.isPinching && now - state.lastPinchTime > CONFIG.PINCH_COOLDOWN_MS) {
                state.isPinching = true;
                state.lastPinchTime = now;
                simulateClick(state.handX, state.handY);
            }
        }

        function getGestureText(gesture) {
            const texts = {
                none: '等待手势...',
                point: '☝️ 指向模式',
                swipe: '✋ 滑动模式',
                pinch: '👌 点击确认',
                open: '🖐 详情模式'
            };
            return texts[gesture] || '等待手势...';
        }

        function updateGestureIndicator(text) {
            dom.gestureIndicator.textContent = text;
        }

        function updateHintHighlight(gesture) {
            document.querySelectorAll('.hint-item').forEach(item => item.classList.remove('active'));
            const hintMap = {
                point: 'hint-point',
                swipe: 'hint-swipe',
                pinch: 'hint-pinch',
                open: 'hint-open'
            };
            const target = document.getElementById(hintMap[gesture]);
            if (target) target.classList.add('active');
        }

        // ===== 光标控制 =====
        function updateHandCursor(x, y) {
            dom.handCursor.style.display = 'block';
            const scale = state.currentGesture === 'pinch' ? 1.3 : 1;
            dom.handCursor.style.transform = `translate(${x - 20}px, ${y - 20}px) scale(${scale})`;
            dom.handCursor.classList.toggle('active', state.currentGesture === 'pinch');
        }

        function hideHandCursor() {
            dom.handCursor.style.display = 'none';
        }

        // ===== 节点悬停与选择 =====
        function handleHover(x, y, canOpenDetail) {
            if (!dom.nodes || dom.nodes.length === 0) return;

            const containerRect = dom.spiralContainer.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;
            const rad = state.spiralRotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            let hoveredIndex = null;

            dom.nodes.forEach((node, index) => {
                // 将节点百分比坐标转为容器本地像素坐标
                const leftPct = parseFloat(node.style.left);
                const topPct = parseFloat(node.style.top);
                const localX = (leftPct - 50) / 100 * containerRect.width;
                const localY = (topPct - 50) / 100 * containerRect.height;

                // 应用螺旋旋转，得到屏幕坐标
                const screenX = centerX + localX * cos - localY * sin;
                const screenY = centerY + localX * sin + localY * cos;

                const dist = Math.sqrt((x - screenX) ** 2 + (y - screenY) ** 2);
                const isHovered = dist < CONFIG.HOVER_RADIUS;

                if (isHovered) hoveredIndex = index;
                node.classList.toggle('active', isHovered || state.selectedNode === index);
            });

            if (canOpenDetail && hoveredIndex !== null) {
                showDetail(hoveredIndex);
            }
        }

        // ===== 时间轴旋转 =====
        function rotateTimelineByVelocity() {
            if (state.lastHandX === 0) {
                state.lastHandX = state.handX;
                return;
            }
            const rawVelocity = state.handX - state.lastHandX;
            state.lastHandX = state.handX;
            state.velocityEma = lerp(state.velocityEma, rawVelocity, CONFIG.ROTATION_EMA_ALPHA);
            const targetRotation = state.spiralRotation + state.velocityEma * CONFIG.ROTATION_DAMPING;
            state.spiralRotation = lerp(state.spiralRotation, targetRotation, 0.25);
            applySpiralTransform();
        }

        function applySpiralTransform() {
            dom.spiralContainer.style.transform = `rotate(${state.spiralRotation}deg)`;

            // 节点内容反向旋转，保持文字正向可读
            if (dom.nodeContents) {
                dom.nodeContents.forEach(content => {
                    content.style.transform = `rotate(${-state.spiralRotation}deg)`;
                });
            }

            // 年代标签同样反向旋转
            if (dom.eraLabels) {
                dom.eraLabels.forEach(label => {
                    label.style.transform = `translate(-50%, -50%) rotate(${-state.spiralRotation}deg)`;
                });
            }
        }

        // ===== 模拟点击 =====
        function simulateClick(x, y) {
            // 手光标中心即交互点，无需额外偏移
            const element = document.elementFromPoint(x, y);
            if (element?.classList.contains('anime-node')) {
                element.click();
            } else {
                const node = findNearestNode(x, y);
                if (node) node.click();
            }
        }

        function findNearestNode(x, y) {
            if (!dom.nodes || dom.nodes.length === 0) return null;

            const containerRect = dom.spiralContainer.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;
            const rad = state.spiralRotation * Math.PI / 180;
            const cos = Math.cos(rad);
            const sin = Math.sin(rad);

            let nearest = null;
            let minDistance = Infinity;

            dom.nodes.forEach(node => {
                const leftPct = parseFloat(node.style.left);
                const topPct = parseFloat(node.style.top);
                const localX = (leftPct - 50) / 100 * containerRect.width;
                const localY = (topPct - 50) / 100 * containerRect.height;

                const screenX = centerX + localX * cos - localY * sin;
                const screenY = centerY + localX * sin + localY * cos;

                const dist = Math.sqrt((x - screenX) ** 2 + (y - screenY) ** 2);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearest = node;
                }
            });

            return minDistance < CONFIG.HOVER_RADIUS ? nearest : null;
        }

        // ===== 3D 星云背景 =====
        function initNebulaBackground() {
            const canvas = document.getElementById('nebula-canvas');
            if (!window.THREE) {
                // Three.js 未加载时的兜底：纯色背景
                canvas.style.background = 'radial-gradient(ellipse at center, #0a0a20 0%, #050510 100%)';
                return;
            }

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.0012);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 600;

            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const palette = [
                new THREE.Color(0x00f3ff),
                new THREE.Color(0xff00ff),
                new THREE.Color(0xb026ff),
                new THREE.Color(0x00ffff),
                new THREE.Color(0x4040ff)
            ];

            // 星尘粒子
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = [];
            const starColors = [];
            const starSizes = [];

            for (let i = 0; i < CONFIG.NEBULA_3D_PARTICLES; i++) {
                const x = (Math.random() - 0.5) * 2500;
                const y = (Math.random() - 0.5) * 1800;
                const z = (Math.random() - 0.5) * 1200;
                starPositions.push(x, y, z);

                const color = palette[Math.floor(Math.random() * palette.length)];
                starColors.push(color.r, color.g, color.b);

                starSizes.push(Math.random() * 2.5);
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
            starGeometry.setAttribute('size', new THREE.Float32BufferAttribute(starSizes, 1));

            const starMaterial = new THREE.PointsMaterial({
                size: 2,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            const starField = new THREE.Points(starGeometry, starMaterial);
            scene.add(starField);

            // 彩色星云团（大粒径半透明粒子）
            const cloudGeometry = new THREE.BufferGeometry();
            const cloudPositions = [];
            const cloudColors = [];

            for (let i = 0; i < CONFIG.NEBULA_3D_CLOUDS; i++) {
                const x = (Math.random() - 0.5) * 1600;
                const y = (Math.random() - 0.5) * 1000;
                const z = (Math.random() - 0.5) * 800 - 200;
                cloudPositions.push(x, y, z);

                const color = palette[i % palette.length];
                cloudColors.push(color.r, color.g, color.b);
            }

            cloudGeometry.setAttribute('position', new THREE.Float32BufferAttribute(cloudPositions, 3));
            cloudGeometry.setAttribute('color', new THREE.Float32BufferAttribute(cloudColors, 3));

            const cloudMaterial = new THREE.PointsMaterial({
                size: 260,
                vertexColors: true,
                transparent: true,
                opacity: 0.12,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                depthWrite: false
            });

            const nebulaClouds = new THREE.Points(cloudGeometry, cloudMaterial);
            scene.add(nebulaClouds);

            // 中心发光核心
            const coreGeometry = new THREE.SphereGeometry(40, 32, 32);
            const coreMaterial = new THREE.MeshBasicMaterial({
                color: 0x00f3ff,
                transparent: true,
                opacity: 0.08,
                blending: THREE.AdditiveBlending
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            scene.add(core);

            // 鼠标/手势视差目标
            let targetCameraX = 0;
            let targetCameraY = 0;

            document.addEventListener('mousemove', (e) => {
                targetCameraX = (e.clientX / window.innerWidth - 0.5) * 80;
                targetCameraY = (e.clientY / window.innerHeight - 0.5) * 60;
            });

            // 每帧根据手势位置更新视差目标
            function updateHandParallax() {
                if (state.gestureMode === 'camera' && state.handX > 0) {
                    targetCameraX = (state.handX / window.innerWidth - 0.5) * 80;
                    targetCameraY = (state.handY / window.innerHeight - 0.5) * 60;
                }
            }

            function animate() {
                state.nebulaAnimationId = requestAnimationFrame(animate);

                updateHandParallax();
                camera.position.x = lerp(camera.position.x, targetCameraX, 0.04);
                camera.position.y = lerp(camera.position.y, -targetCameraY, 0.04);
                camera.lookAt(scene.position);

                starField.rotation.y += 0.0003;
                starField.rotation.x += 0.0001;
                nebulaClouds.rotation.y -= 0.00015;
                core.rotation.y += 0.001;
                core.scale.setScalar(1 + Math.sin(Date.now() * 0.001) * 0.05);

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ===== 粒子系统（对象池） =====
        function startParticleSystem() {
            const pool = [];
            const maxPoolSize = 40;

            function spawnParticle() {
                if (!state.isStarted) return;

                let poolItem = pool.find(p => p.inUse === false);
                let particleEl;

                if (!poolItem && pool.length < maxPoolSize) {
                    particleEl = document.createElement('div');
                    particleEl.className = 'particle';
                    document.body.appendChild(particleEl);
                    poolItem = { el: particleEl, inUse: true };
                    pool.push(poolItem);
                } else if (poolItem) {
                    poolItem.inUse = true;
                    particleEl = poolItem.el;
                } else {
                    return;
                }

                const size = Math.random() * 4 + 2;
                const colors = ['#00f3ff', '#ff00ff', '#b026ff', '#00ffff'];

                particleEl.style.left = Math.random() * 100 + 'vw';
                particleEl.style.width = size + 'px';
                particleEl.style.height = size + 'px';
                particleEl.style.animationDuration = Math.random() * 10 + 10 + 's';
                particleEl.style.opacity = Math.random() * 0.5 + 0.2;
                particleEl.style.background = colors[Math.floor(Math.random() * colors.length)];
                particleEl.style.display = 'block';

                setTimeout(() => {
                    particleEl.style.display = 'none';
                    poolItem.inUse = false;
                }, CONFIG.PARTICLE_LIFETIME_MS);
            }

            state.particleTimer = setInterval(spawnParticle, CONFIG.PARTICLE_INTERVAL_MS);
        }

        // ===== 清理与事件监听 =====
        function cleanup() {
            if (state.particleTimer) {
                clearInterval(state.particleTimer);
                state.particleTimer = null;
            }
            if (state.nebulaAnimationId) {
                cancelAnimationFrame(state.nebulaAnimationId);
                state.nebulaAnimationId = null;
            }
            MusicEngine.stop();
        }

        document.addEventListener('mousemove', (e) => {
            dom.cursorTracker.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeDetail();
        });

        window.addEventListener('beforeunload', cleanup);

        function updateVoiceButton(isListening) {
            const btn = document.getElementById('voice-toggle');
            if (!btn) return;
            btn.setAttribute('aria-pressed', String(isListening));
            btn.setAttribute('aria-label', isListening ? '关闭语音' : '开启语音');
        }

        function showVoiceFeedback(message) {
            const el = document.getElementById('voice-feedback');
            if (!el) return;
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function handleVoiceCommand(text) {
            showVoiceFeedback(`识别：${text}`);
            const lower = text.toLowerCase().replace(/[，。？！]/g, ' ').trim();
            if (lower.includes('关闭') || lower.includes('退出')) {
                closeDetail();
                return;
            }
            const playMatch = lower.match(/(?:播放|看|打开)\s*(.+)/);
            if (playMatch) {
                const keyword = playMatch[1].trim();
                const results = AnimeDB.search(keyword);
                if (results.length > 0) {
                    const target = AnimeDB.all.findIndex(a => a.title === results[0].title);
                    if (target >= 0) {
                        window.location.href = `watch.html?index=${target}`;
                    }
                } else {
                    showVoiceFeedback(`未找到「${keyword}」`);
                }
            }
        }

        window.addEventListener('load', () => {
            initNebulaBackground();
            initUI();
        });
    </script>
</body>
</html>
