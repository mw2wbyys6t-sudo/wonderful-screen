<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星云编年史 - 沉浸式动漫编年史入口">
    <title>星云编年史 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050714;
            --bg-darker: #03030a;
            --neon-cyan: #00f3ff;
            --neon-purple: #b892ff;
            --neon-blue: #4da6ff;
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.72);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.35);
            --theme-color: #00f3ff;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        /* 深空背景层 */
        #space-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 45%, rgba(124, 77, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(77, 166, 255, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(184, 146, 255, 0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 35%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-darker) 100%);
        }

        #space-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/generated/nebula-bg.jpg') center/cover no-repeat;
            opacity: 0.4;
            mix-blend-mode: screen;
        }

        /* 动态光斑 */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: float 16s ease-in-out infinite;
        }

        .orb-1 {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, var(--neon-blue) 0%, rgba(45, 90, 245, 0.6) 70%, transparent 100%);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-purple) 0%, rgba(124, 77, 255, 0.5) 70%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #52d1c1 0%, rgba(0, 153, 204, 0.5) 70%, transparent 100%);
            top: 50%;
            left: 50%;
            margin-left: -160px;
            margin-top: -160px;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.22) 0%, rgba(45, 90, 245, 0.08) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            margin-left: -600px;
            margin-top: -600px;
            opacity: 0.18;
            animation-delay: -13s;
            animation-duration: 24s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.08); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(50px, 40px) scale(1.03); }
        }

        /* 星点画布 */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Three.js 容器 */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 3;
        }

        #canvas-container canvas {
            display: block;
        }

        /* 标题层 */
        #title-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #title-layer.visible {
            opacity: 1;
            transform: scale(1);
        }

        #title-layer.watermark {
            opacity: 0.38;
            transform: scale(0.85);
            filter: blur(0.5px);
        }

        #title-layer h1 {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-shadow:
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(0, 243, 255, 0.15);
            margin-bottom: 12px;
        }

        #title-layer .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            margin-bottom: 16px;
        }

        .title-ornament {
            width: min(520px, 72vw);
            height: auto;
            opacity: 0.85;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.25));
        }

        #title-layer .tagline {
            font-size: clamp(14px, 1.8vw, 20px);
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            opacity: 0.9;
        }

        /* 玻璃圆盘底座 */
        .title-disc {
            position: absolute;
            width: min(520px, 80vw);
            height: min(260px, 40vw);
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
            transform: translateY(20px) rotateX(60deg);
            box-shadow:
                0 0 60px rgba(0, 243, 255, 0.1),
                inset 0 0 40px rgba(255, 255, 255, 0.05);
        }

        /* 登录层 */
        #login-layer {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(60px) scale(0.96);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #login-layer.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* 玻璃登录卡片 */
        .glass-card {
            position: relative;
            width: min(92vw, 420px);
            padding: 44px 36px;
            border-radius: 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.35),
                0 0 40px rgba(0, 243, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transform-style: preserve-3d;
            touch-action: none;
            transition: box-shadow 0.4s ease;
        }

        .glass-card.glow-cyan {
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.35),
                0 0 50px rgba(0, 243, 255, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.28),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.4) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                transparent 70%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: url('images/effects/glass-caustic.jpg') center/cover;
            mix-blend-mode: overlay;
            opacity: 0.14;
            pointer-events: none;
        }

        /* 动态光流 */
        .light-flow {
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 255, 255, 0.06) 30deg,
                transparent 60deg,
                rgba(0, 243, 255, 0.04) 90deg,
                transparent 120deg,
                rgba(184, 146, 255, 0.04) 150deg,
                transparent 180deg,
                rgba(255, 255, 255, 0.05) 210deg,
                transparent 240deg,
                rgba(0, 243, 255, 0.03) 270deg,
                transparent 300deg,
                rgba(184, 146, 255, 0.03) 330deg,
                transparent 360deg
            );
            animation: lightRotate 12s linear infinite;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .glass-card:hover .light-flow,
        .glass-card:focus-within .light-flow {
            opacity: 1;
        }

        @keyframes lightRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sheen {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.22) 0%,
                rgba(255, 255, 255, 0.08) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            mix-blend-mode: overlay;
        }

        .glass-card:hover .sheen {
            opacity: 1;
        }

        .glass-card h2 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .glass-card .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--theme-color, var(--neon-cyan));
            box-shadow:
                0 0 0 3px rgba(0, 243, 255, 0.1),
                0 0 24px color-mix(in srgb, var(--theme-color, var(--neon-cyan)) 35%, transparent);
            background: rgba(0, 0, 0, 0.35);
            animation: focusPulse 2s ease-in-out infinite;
        }

        @keyframes focusPulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.08), 0 0 20px rgba(0, 243, 255, 0.12); }
            50% { box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.15), 0 0 32px rgba(0, 243, 255, 0.22); }
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.25),
                transparent
            );
            transition: left 0.6s ease;
        }

        .login-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .login-btn:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.25);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .login-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .guest-link:hover {
            color: var(--neon-cyan);
        }

        /* 跳过按钮 */
        #skip-btn {
            position: fixed;
            top: 28px;
            right: 28px;
            z-index: 100;
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            min-width: 44px;
            min-height: 44px;
        }

        #skip-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #skip-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        #skip-btn::after {
            content: '（空格）';
            display: inline-block;
            max-width: 0;
            opacity: 0;
            margin-left: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        #skip-btn:hover::after {
            max-width: 80px;
            opacity: 1;
            margin-left: 6px;
        }

        /* 加载提示 */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-darker);
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 0.2em;
            transition: opacity 0.8s ease;
            gap: 20px;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(0, 243, 255, 0.4) 40%, transparent 70%);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
            animation: logoBreathe 2s ease-in-out infinite;
        }

        @keyframes logoBreathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        .loading-dots {
            display: flex;
            gap: 6px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-cyan);
            animation: loadingDots 1.4s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loadingDots {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        /* 音频控制 */
        #audio-toggle {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        #audio-toggle.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #audio-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        #audio-toggle[aria-pressed="true"] {
            color: var(--neon-cyan);
            border-color: rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            #title-layer h1 { letter-spacing: 0.08em; }
            #title-layer .subtitle { letter-spacing: 0.25em; }
            .glass-card { padding: 36px 28px; }
            .glass-card h2 { font-size: 24px; }
            #audio-toggle { top: 22px; left: 22px; }
            #skip-btn { top: 22px; right: 22px; }
        }

        /* 减少运动偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <canvas id="starfield"></canvas>
    <div id="canvas-container"></div>

    <div id="title-layer">
        <div class="title-disc"></div>
        <h1>星云编年史</h1>
        <p class="subtitle">NEBULA CHRONICLE</p>
        <img src="images/effects/title-ornament.png" alt="" class="title-ornament">
        <p class="tagline">群星已就位，编年史待启</p>
    </div>

    <div id="login-layer">
        <div class="glass-card" id="loginCard">
            <div class="light-flow"></div>
            <div class="sheen" id="loginSheen"></div>
            <h2>启程</h2>
            <p class="login-subtitle">开启你的星云之旅</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">星图标识</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">星云密钥</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required minlength="6">
                </div>
                <button type="submit" class="login-btn">进入星云</button>
            </form>
            <a href="#" class="guest-link" id="guestLink">以游客身份浏览</a>
        </div>
    </div>

    <button id="audio-toggle" title="背景音乐" aria-label="开启背景音乐" aria-pressed="false">♪</button>
    <button id="skip-btn">跳过动画</button>

    <div id="loading">
        <div class="loading-logo"></div>
        <div>星云苏醒中</div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ============================================================
        // 星云编年史 · 启动页 + 登录页一体化（v2）
        // 叙事：星云苏醒 → 玻璃凝聚 → 角色觉醒 → 编年史展开
        //       → 星图散开成粒子 → 星云漩涡 → 标题水印 + 登录升起
        //       → 角色在登录周围凝聚成守护星座环
        // ============================================================

        const CHARACTERS = [
            { name: '秋山澪', file: 'akiyama-mio.jpg', color: 0xff9ec8, year: '2010/2011' },
            { name: '立华奏', file: 'tachibana-kanade.jpg', color: 0xc7f0ff, year: '2012' },
            { name: '夏娜', file: 'shana.jpg', color: 0xff4d4d, year: '2016' },
            { name: '加藤惠', file: 'kato-megumi.jpg', color: 0xffb7c5, year: '2017' },
            { name: '雷姆', file: 'rem.jpg', color: 0x7fd3ff, year: '2018' },
            { name: '薇尔莉特', file: 'violet-evergarden.png', color: 0xb892ff, year: '2019' },
            { name: '伊蕾娜', file: 'elaina.jpg', color: 0xe8e8ff, year: '2021' },
            { name: '御坂美琴', file: 'misaka-mikoto.jpg', color: 0x00bfff, year: '人气之王' }
        ];

        const IMAGE_BASE = 'images/login/';
        const DURATION = {
            nebulaAwake: 2.0,
            glassForm: 1.5,
            characterAwake: 2.0,
            starChartExpand: 2.5,
            scatter: 1.8,
            vortex: 2.0,
            titleReveal: 1.2,
            loginRise: 1.2,
            ringForm: 1.5
        };

        let scene, camera, renderer;
        let cards = [];
        let constellationLines;
        let vortexParticles;
        let centralGlow;
        let magicCircle;

        // ============================================================
        // 程序化环境音乐（Web Audio API）
        // ============================================================
        function initAudio() {
            if (audioNodes) return;
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;

            const ctx = new AudioCtx();
            const master = ctx.createGain();
            master.gain.value = 0;
            master.connect(ctx.destination);

            // 三层 drone：低、中、高
            const drones = [
                { freq: 55, gain: 0.12, type: 'sine' },      // A1 低频底音
                { freq: 110, gain: 0.06, type: 'triangle' }, // A2 中频铺垫
                { freq: 220, gain: 0.03, type: 'sine' }      // A3 高频泛音
            ];

            const oscillators = [];
            const gains = [];

            drones.forEach(d => {
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = d.type;
                osc.frequency.value = d.freq;
                g.gain.value = d.gain;
                osc.connect(g);
                g.connect(master);
                osc.start();
                oscillators.push(osc);
                gains.push(g);
            });

            // LFO 缓慢调制音量，制造呼吸感
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain);
            lfoGain.connect(master.gain);
            lfo.start();

            // 轻微延迟制造空间感
            const delay = ctx.createDelay();
            delay.delayTime.value = 0.45;
            const delayGain = ctx.createGain();
            delayGain.gain.value = 0.25;
            master.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(ctx.destination);

            audioNodes = { ctx, master, oscillators, gains, lfo, lfoGain, delay, delayGain };
        }

        function toggleAudio() {
            if (!audioNodes) initAudio();
            if (!audioNodes) return;

            audioMuted = !audioMuted;
            audioToggle.setAttribute('aria-pressed', !audioMuted);
            audioToggle.textContent = audioMuted ? '♪' : '♫';

            const now = audioNodes.ctx.currentTime;
            if (!audioMuted) {
                audioNodes.ctx.resume();
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0.35, now + 2.5);
            } else {
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0, now + 0.8);
            }
        }

        // ============================================================
        // 星点背景
        // ============================================================
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let starRafId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const stars = [];
            const count = Math.min(320, Math.floor((canvas.width * canvas.height) / 5500));

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.6 + 0.3,
                    opacity: Math.random() * 0.6 + 0.2,
                    speed: Math.random() * 0.3 + 0.05,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.03 + 0.01
                });
            }

            let frame = 0;
            let lastDraw = 0;
            function draw(now) {
                starRafId = requestAnimationFrame(draw);
                if (reducedMotion) return;
                if (now - lastDraw < 32) return;
                lastDraw = now;
                frame++;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 偶尔出现流星
                if (Math.random() < 0.015) {
                    createShootingStar(ctx, canvas);
                }

                stars.forEach(star => {
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }

                    const twinkle = Math.sin(frame * star.twinkleSpeed + star.twinkle) * 0.35 + 0.65;
                    const alpha = star.opacity * twinkle;

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();

                    // 大星点加十字辉光
                    if (star.size > 1.2) {
                        ctx.save();
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(star.x - star.size * 2, star.y);
                        ctx.lineTo(star.x + star.size * 2, star.y);
                        ctx.moveTo(star.x, star.y - star.size * 2);
                        ctx.lineTo(star.x, star.y + star.size * 2);
                        ctx.stroke();
                        ctx.restore();
                    }
                });
            }
            draw(0);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(starRafId);
                } else {
                    draw(0);
                }
            });
        }

        function createShootingStar(ctx, canvas) {
            const startX = Math.random() * canvas.width;
            const startY = Math.random() * canvas.height * 0.4;
            const length = Math.random() * 60 + 40;
            const angle = Math.PI / 4;
            let progress = 0;

            function drawTrail() {
                progress += 6;
                if (progress > length + 20) return;

                const x = startX + Math.cos(angle) * progress;
                const y = startY + Math.sin(angle) * progress;
                const tailX = x - Math.cos(angle) * length;
                const tailY = y - Math.sin(angle) * length;

                const gradient = ctx.createLinearGradient(tailX, tailY, x, y);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.9)');

                ctx.save();
                ctx.globalAlpha = Math.max(0, 1 - progress / (length + 20));
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.restore();

                requestAnimationFrame(drawTrail);
            }
            drawTrail();
        }

        // ============================================================
        // 星座连线（能量束版本）
        // ============================================================
        function initConstellationLines() {
            const material = new THREE.LineBasicMaterial({
                color: 0x00f3ff,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending
            });

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(8 * 3 * 2);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            constellationLines = new THREE.LineSegments(geometry, material);
            scene.add(constellationLines);
        }

        function updateConstellationLines(opacity = null) {
            if (!constellationLines) return;

            const positions = constellationLines.geometry.attributes.position.array;
            const count = cards.length;

            for (let i = 0; i < count; i++) {
                const current = cards[i];
                const next = cards[(i + 1) % count];

                const idx = i * 6;
                positions[idx] = current.position.x;
                positions[idx + 1] = current.position.y;
                positions[idx + 2] = current.position.z;
                positions[idx + 3] = next.position.x;
                positions[idx + 4] = next.position.y;
                positions[idx + 5] = next.position.z;
            }

            constellationLines.geometry.attributes.position.needsUpdate = true;
            if (opacity !== null) {
                constellationLines.material.opacity = opacity;
            }
        }

        // ============================================================
        // 星云漩涡粒子
        // ============================================================
        function initVortex() {
            const particleCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const basePositions = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0x4da6ff),
                new THREE.Color(0xb892ff),
                new THREE.Color(0xffffff),
                new THREE.Color(0x00f3ff)
            ];

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 8 + 0.5;
                const height = (Math.random() - 0.5) * 4;

                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = height;
                positions[i * 3 + 2] = Math.sin(angle) * radius;

                basePositions[i * 3] = positions[i * 3];
                basePositions[i * 3 + 1] = height;
                basePositions[i * 3 + 2] = positions[i * 3 + 2];

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                sizes[i] = Math.random() * 0.12 + 0.03;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.userData = { basePositions };

            const material = new THREE.PointsMaterial({
                size: 0.14,
                map: particleTexture,
                vertexColors: true,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            vortexParticles = new THREE.Points(geometry, material);
            vortexParticles.visible = false;
            scene.add(vortexParticles);
        }

        function resetVortex() {
            if (!vortexParticles) return;
            const positions = vortexParticles.geometry.attributes.position.array;
            const base = vortexParticles.geometry.userData.basePositions;
            for (let i = 0; i < positions.length; i++) {
                positions[i] = base[i];
            }
            vortexParticles.geometry.attributes.position.needsUpdate = true;
        }

        function updateVortex(time, intensity = 1) {
            if (!vortexParticles || !vortexParticles.visible) return;

            const positions = vortexParticles.geometry.attributes.position.array;
            const count = positions.length / 3;

            for (let i = 0; i < count; i++) {
                const idx = i * 3;
                let x = positions[idx];
                let y = positions[idx + 1];
                let z = positions[idx + 2];

                const radius = Math.sqrt(x * x + z * z);
                let angle = Math.atan2(z, x);

                angle += 0.03 * intensity;
                const shrink = radius > 0.3 ? radius * (0.992 - 0.004 * intensity) : radius;

                positions[idx] = Math.cos(angle) * shrink;
                positions[idx + 1] *= 0.995;
                positions[idx + 2] = Math.sin(angle) * shrink;
            }

            vortexParticles.geometry.attributes.position.needsUpdate = true;
            vortexParticles.rotation.y = time * 0.15;
        }

        // ============================================================
        // 登录成功粒子爆发
        // ============================================================
        function createLoginBurst() {
            const count = 120;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const opacities = new Float32Array(count);

            const colorPalette = [
                new THREE.Color(0x00f3ff),
                new THREE.Color(0xb892ff),
                new THREE.Color(0xffffff)
            ];

            for (let i = 0; i < count; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = 0;

                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = Math.random() * 0.15 + 0.05;

                velocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                velocities[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                velocities[i * 3 + 2] = Math.cos(phi) * speed;

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                opacities[i] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.18,
                map: particleTexture,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            burstParticles = new THREE.Points(geometry, material);
            burstParticles.userData = { velocities, opacities, life: 0 };
            scene.add(burstParticles);
        }

        function updateBurst() {
            if (!burstParticles) return;

            const positions = burstParticles.geometry.attributes.position.array;
            const velocities = burstParticles.userData.velocities;
            const opacities = burstParticles.userData.opacities;
            burstParticles.userData.life++;

            let alive = false;
            for (let i = 0; i < opacities.length; i++) {
                if (opacities[i] <= 0.01) continue;
                alive = true;

                positions[i * 3] += velocities[i * 3];
                positions[i * 3 + 1] += velocities[i * 3 + 1];
                positions[i * 3 + 2] += velocities[i * 3 + 2];

                opacities[i] *= 0.96;
            }

            burstParticles.geometry.attributes.position.needsUpdate = true;
            burstParticles.material.opacity = Math.max(...opacities);

            if (!alive || burstParticles.userData.life > 120) {
                scene.remove(burstParticles);
                burstParticles.geometry.dispose();
                burstParticles.material.dispose();
                burstParticles = null;
            }
        }

        // ============================================================
        // 动画编排
        // ============================================================
        function getCardOrbitPosition(index, total, radius, yOffset = 0) {
            const positions = [
                { angle: -Math.PI / 2, r: 1.0, yMul: 0.15 },
                { angle: 0, r: 1.0, yMul: 0 },
                { angle: Math.PI / 2, r: 1.0, yMul: -0.15 },
                { angle: Math.PI, r: 1.0, yMul: 0 },
                { angle: -Math.PI / 4, r: 1.18, yMul: 0.08 },
                { angle: Math.PI / 4, r: 1.18, yMul: -0.08 },
                { angle: 3 * Math.PI / 4, r: 1.18, yMul: -0.08 },
                { angle: -3 * Math.PI / 4, r: 1.18, yMul: 0.08 }
            ];
            const p = positions[index % positions.length];
            return {
                x: Math.cos(p.angle) * radius * p.r,
                y: yOffset + Math.sin(p.angle) * radius * p.yMul,
                z: Math.sin(p.angle) * radius * p.r,
                rotY: -p.angle,
                rotX: 0.08
            };
        }

        function getCardRingPosition(index, total, radius) {
            const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
            return {
                x: Math.cos(angle) * radius,
                y: Math.sin(angle) * radius * 0.55,
                z: -2.8,
                rotY: -angle * 0.35 + Math.PI,
                rotX: 0
            };
        }

        function buildTimeline() {
            const tl = gsap.timeline({
                onComplete: () => {
                    if (!isSkipped) showLogin();
                }
            });

            masterTimeline = tl;

            if (reducedMotion) {
                tl.call(() => showLogin(), null, 0.2);
                return tl;
            }

            // Phase 1: 星云苏醒
            const t0 = 0;
            tl.to(centralGlow.scale, {
                x: 1.5, y: 1.5, z: 1.5,
                duration: DURATION.nebulaAwake,
                ease: 'power2.inOut'
            }, t0);
            tl.to(centralGlow.material, {
                opacity: 0.6,
                duration: DURATION.nebulaAwake,
                ease: 'power2.inOut'
            }, t0);

            // Phase 2: 液态玻璃凝聚
            const t2 = t0 + DURATION.nebulaAwake;
            cards.forEach((card, i) => {
                const stagger = i * 0.08;
                const mesh = card.userData.cardMesh;
                tl.call(() => { card.visible = true; }, null, t2 + stagger);
                tl.to(card.scale, {
                    x: 1, y: 1, z: 1,
                    duration: DURATION.glassForm,
                    ease: 'back.out(1.4)'
                }, t2 + stagger);
                tl.to(mesh.material, {
                    opacity: 0.96,
                    duration: DURATION.glassForm * 0.6,
                    ease: 'power2.out'
                }, t2 + stagger);
            });

            // Phase 3: 角色觉醒 - 卡片扩散到轨道
            const t3 = t2 + DURATION.glassForm + 0.4;
            cards.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards.length, 4.5, 0);
                tl.to(card.position, {
                    x: target.x,
                    y: target.y,
                    z: target.z,
                    duration: DURATION.characterAwake,
                    ease: 'power3.out'
                }, t3);
                tl.to(card.rotation, {
                    y: target.rotY,
                    x: target.rotX,
                    duration: DURATION.characterAwake,
                    ease: 'power3.out'
                }, t3);
            });

            // Phase 4: 编年史展开
            const t4 = t3 + DURATION.characterAwake;
            tl.to(constellationLines.material, {
                opacity: 0.6,
                duration: DURATION.starChartExpand * 0.4,
                ease: 'power2.out'
            }, t4);
            tl.to(magicCircle.material, {
                opacity: 0.55,
                duration: DURATION.starChartExpand * 0.5,
                ease: 'power2.out'
            }, t4 + 0.3);
            tl.to(magicCircle.scale, {
                x: 5, y: 5, z: 5,
                duration: DURATION.starChartExpand,
                ease: 'sine.out'
            }, t4 + 0.3);
            cards.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards.length, 5.5, 0);
                tl.to(card.position, {
                    x: target.x,
                    y: target.y,
                    z: target.z,
                    duration: DURATION.starChartExpand,
                    ease: 'sine.inOut'
                }, t4);
            });

            // Phase 5: 星图散开成星云粒子
            const t5 = t4 + DURATION.starChartExpand;
            tl.to(constellationLines.material, {
                opacity: 0,
                duration: DURATION.scatter * 0.5,
                ease: 'power2.in'
            }, t5);
            tl.to(magicCircle.material, {
                opacity: 0,
                duration: DURATION.scatter,
                ease: 'power2.in'
            }, t5);
            cards.forEach((card, i) => {
                const stagger = i * 0.05;
                const scatterAngle = (i / cards.length) * Math.PI * 2;
                const scatterRadius = 9 + Math.random() * 2;
                tl.to(card.position, {
                    x: Math.cos(scatterAngle) * scatterRadius,
                    y: (Math.random() - 0.5) * 5,
                    z: Math.sin(scatterAngle) * scatterRadius,
                    duration: DURATION.scatter,
                    ease: 'power3.out'
                }, t5 + stagger);
                tl.to(card.rotation, {
                    y: Math.PI * 3 + scatterAngle,
                    z: 0.3,
                    duration: DURATION.scatter,
                    ease: 'power3.out'
                }, t5 + stagger);
                tl.to(card.scale, {
                    x: 0.1, y: 0.1, z: 0.1,
                    duration: DURATION.scatter * 0.7,
                    ease: 'power3.in'
                }, t5 + stagger * 0.5);
                tl.to(card.userData.cardMesh.material, {
                    opacity: 0,
                    duration: DURATION.scatter * 0.5,
                    ease: 'power2.in'
                }, t5 + DURATION.scatter * 0.4 + stagger);
            });

            // Phase 6: 星云漩涡凝聚
            const t6 = t5 + DURATION.scatter + 0.2;
            tl.call(() => {
                resetVortex();
                vortexParticles.visible = true;
                centralGlow.material.color.setHex(0xffffff);
            }, null, t6);
            tl.to(vortexParticles.material, {
                opacity: 0.85,
                duration: DURATION.vortex * 0.4,
                ease: 'power2.out'
            }, t6);
            tl.to(centralGlow.scale, {
                x: 4, y: 4, z: 4,
                duration: DURATION.vortex,
                ease: 'power2.out'
            }, t6);
            tl.to(centralGlow.material, {
                opacity: 0.75,
                duration: DURATION.vortex,
                ease: 'power2.out'
            }, t6);
            tl.to(vortexParticles.material, {
                opacity: 0,
                duration: DURATION.vortex * 0.6,
                ease: 'power2.in'
            }, t6 + DURATION.vortex * 0.5);
            tl.to(centralGlow.scale, {
                x: 0.1, y: 0.1, z: 0.1,
                duration: 0.8,
                ease: 'power2.in'
            }, t6 + DURATION.vortex * 0.7);

            // Phase 7: 标题浮现为水印
            const t7 = t6 + DURATION.vortex + 0.3;
            tl.call(() => {
                titleLayer.classList.add('visible');
                setTimeout(() => titleLayer.classList.add('watermark'), 1200);
            }, null, t7);
            tl.to({}, { duration: DURATION.titleReveal }, t7);

            return tl;
        }

        // ============================================================
        // 渲染循环
        // ============================================================
        function animate() {
            rafId = requestAnimationFrame(animate);
            if (document.hidden) return;

            const time = performance.now() * 0.001;

            // 卡片持续漂浮
            cards.forEach((card, i) => {
                if (!card.visible) return;

                if (loginLayer.classList.contains('visible') && card.userData.isRing) {
                    const baseY = card.userData.ringY || card.position.y;
                    const angle = card.userData.ringAngle + time * 0.06;
                    card.position.x = Math.cos(angle) * card.userData.ringRadius;
                    card.position.y = baseY + Math.sin(time * 0.5 + i) * 0.06;
                    card.position.z = -2.8 + Math.sin(angle * 0.5) * 0.25;
                    card.rotation.y = -angle * 0.35 + Math.PI + Math.sin(time * 0.3 + i) * 0.03;
                } else {
                    card.position.y += Math.sin(time * 0.8 + i) * 0.002;
                    card.rotation.y += 0.002;
                }
            });

            // 魔法阵旋转
            if (magicCircle && magicCircle.visible && magicCircle.material.opacity > 0) {
                magicCircle.material.rotation += 0.003;
            }

            // 更新连线
            if (constellationLines && constellationLines.material.opacity > 0) {
                updateConstellationLines();
            }

            // 更新漩涡
            updateVortex(time, 1.5);

            // 更新爆发粒子
            updateBurst();

            renderer.render(scene, camera);
        }

        // ============================================================
        // 状态切换
        // ============================================================
        function showStaticLogin(message) {
            loadingEl.classList.add('hidden');
            skipBtn.classList.remove('visible');
            titleLayer.classList.add('visible');
            titleLayer.classList.add('watermark');
            loginLayer.classList.add('visible');
            audioToggle.classList.add('visible');
            if (message) {
                const tagline = titleLayer.querySelector('.tagline');
                if (tagline) tagline.textContent = message;
            }
        }

        function showLogin() {
            titleLayer.classList.add('watermark');
            loginLayer.classList.add('visible');
            skipBtn.classList.remove('visible');
            audioToggle.classList.add('visible');

            // 卡片在登录卡片周围凝聚成守护星座环
            cards.forEach((card, i) => {
                card.visible = true;
                card.userData.isRing = true;
                const target = getCardRingPosition(i, cards.length, 5.2);
                card.userData.ringRadius = 5.2;
                card.userData.ringAngle = (i / cards.length) * Math.PI * 2 - Math.PI / 2;
                card.userData.ringY = target.y;

                gsap.to(card.position, {
                    x: target.x,
                    y: target.y,
                    z: target.z,
                    duration: DURATION.ringForm,
                    ease: 'power3.out'
                });
                gsap.to(card.rotation, {
                    y: target.rotY,
                    x: target.rotX,
                    z: 0,
                    duration: DURATION.ringForm,
                    ease: 'power3.out'
                });
                gsap.to(card.scale, {
                    x: 0.68, y: 0.68, z: 0.68,
                    duration: DURATION.ringForm,
                    ease: 'power3.out'
                });
                gsap.to(card.userData.cardMesh.material, {
                    opacity: 0.95,
                    duration: DURATION.ringForm * 0.6,
                    ease: 'power2.out'
                });
                gsap.to(card.userData.borderMesh.material, {
                    opacity: 0.35,
                    duration: DURATION.ringForm,
                    ease: 'power2.out'
                });
                gsap.to(card.userData.glowMesh.material, {
                    opacity: 0.16,
                    duration: DURATION.ringForm,
                    ease: 'power2.out'
                });
            });

            // 隐藏连线和漩涡，中央光保留微弱
            if (constellationLines) constellationLines.visible = false;
            if (vortexParticles) vortexParticles.visible = false;
            if (centralGlow) {
                gsap.to(centralGlow.scale, { x: 0.3, y: 0.3, z: 0.3, duration: 1.5 });
                gsap.to(centralGlow.material, { opacity: 0.25, duration: 1.5 });
            }
        }

        function skipAnimation() {
            if (isSkipped) return;
            isSkipped = true;

            if (webglFailed) {
                showStaticLogin('静态模式 · 仍可正常登录');
                return;
            }

            if (masterTimeline) masterTimeline.kill();
            gsap.killTweensOf(cards);
            gsap.killTweensOf([centralGlow, magicCircle, vortexParticles?.material, constellationLines?.material]);

            titleLayer.classList.add('watermark');
            showLogin();
        }

        // ============================================================
        // 资源清理
        // ============================================================
        function disposeScene() {
            cancelAnimationFrame(rafId);
            gsap.killTweensOf(cards);
            gsap.killTweensOf([centralGlow, magicCircle, vortexParticles, constellationLines]);

            cards.forEach(group => {
                group.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (child.material.map) child.material.map.dispose();
                        child.material.dispose();
                    }
                });
                scene.remove(group);
            });
            cards = [];

            if (constellationLines) {
                constellationLines.geometry.dispose();
                constellationLines.material.dispose();
                scene.remove(constellationLines);
                constellationLines = null;
            }

            if (vortexParticles) {
                vortexParticles.geometry.dispose();
                vortexParticles.material.dispose();
                scene.remove(vortexParticles);
                vortexParticles = null;
            }

            if (centralGlow) {
                centralGlow.geometry.dispose();
                centralGlow.material.dispose();
                scene.remove(centralGlow);
                centralGlow = null;
            }

            if (magicCircle) {
                magicCircle.material.dispose();
                scene.remove(magicCircle);
                magicCircle = null;
            }

            if (burstParticles) {
                burstParticles.geometry.dispose();
                burstParticles.material.dispose();
                scene.remove(burstParticles);
                burstParticles = null;
            }

            [particleTexture, warmParticleTexture, streakTexture, causticTexture, magicCircleTexture].forEach(tex => {
                if (tex) tex.dispose();
            });

            if (renderer) {
                renderer.dispose();
                renderer.domElement.remove();
                renderer = null;
            }
        }

        // ============================================================
        // 登录交互
        // ============================================================
        function initLoginInteraction() {
            // 鼠标跟随高光
            let targetX = 0, targetY = 0;
            let currentX = 0, currentY = 0;
            let sheenRafId;

            function updateSheen() {
                currentX += (targetX - currentX) * 0.12;
                currentY += (targetY - currentY) * 0.12;
                loginSheen.style.left = currentX + 'px';
                loginSheen.style.top = currentY + 'px';
                sheenRafId = requestAnimationFrame(updateSheen);
            }

            loginCard.addEventListener('mouseenter', () => {
                loginSheen.style.opacity = '1';
                if (!sheenRafId) updateSheen();
            });

            loginCard.addEventListener('mouseleave', () => {
                loginSheen.style.opacity = '0';
                if (sheenRafId) {
                    cancelAnimationFrame(sheenRafId);
                    sheenRafId = null;
                }
            });

            loginCard.addEventListener('pointermove', (e) => {
                const rect = loginCard.getBoundingClientRect();
                targetX = e.clientX - rect.left;
                targetY = e.clientY - rect.top;

                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                loginCard.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
            }, { passive: true });

            loginCard.addEventListener('pointerleave', () => {
                loginCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });

            // 输入框聚焦时循环切换主题色
            const inputs = loginForm.querySelectorAll('input');
            let themeIndex = 0;
            let themeInterval = null;

            function cycleThemeColor() {
                const char = CHARACTERS[themeIndex % CHARACTERS.length];
                const hex = hexToCss(char.color);
                rootStyle.setProperty('--theme-color', hex);
                themeIndex++;
            }

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    loginCard.classList.add('glow-cyan');
                    cycleThemeColor();
                    if (!themeInterval) themeInterval = setInterval(cycleThemeColor, 1200);
                });
                input.addEventListener('blur', () => {
                    loginCard.classList.remove('glow-cyan');
                    clearInterval(themeInterval);
                    themeInterval = null;
                    rootStyle.setProperty('--theme-color', '#00f3ff');
                });
            });

            // 按钮涟漪
            const btn = loginForm.querySelector('.login-btn');
            btn.addEventListener('click', (e) => {
                const rect = btn.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });

            // 表单提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    alert('请输入用户名和密码');
                    return;
                }
                if (password.length < 6) {
                    alert('密码长度不能少于 6 位');
                    return;
                }

                btn.disabled = true;
                const originalText = btn.textContent;
                btn.textContent = '星门开启中…';

                createLoginBurst();

                setTimeout(() => {
                    sessionStorage.setItem('nebulaUser', username);
                    window.location.href = 'nebula-chronicle.html';
                }, 900);
            });

            guestLink.addEventListener('click', (e) => {
                e.preventDefault();
                createLoginBurst();
                setTimeout(() => {
                    sessionStorage.setItem('nebulaUser', '游客');
                    window.location.href = 'nebula-chronicle.html';
                }, 600);
            });
        }

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            reducedMotion = prefersReducedMotion();
            initStarfield();
            initLoginInteraction();
            skipBtn.addEventListener('click', skipAnimation);
            audioToggle.addEventListener('click', toggleAudio);

            // 空格跳过
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && skipBtn.classList.contains('visible')) {
                    e.preventDefault();
                    skipAnimation();
                }
            });

            if (!isWebGLAvailable()) {
                webglFailed = true;
                loadingEl.textContent = '你的浏览器不支持 WebGL，正在进入登录页...';
                setTimeout(() => showStaticLogin('静态模式 · 仍可正常登录'), 800);
                return;
            }

            try {
                initThree();
                await loadSharedTextures();
                initCards();
                initConstellationLines();
                initVortex();

                await new Promise(resolve => setTimeout(resolve, 300));
                loadingEl.classList.add('hidden');
                skipBtn.classList.add('visible');

                buildTimeline();
                animate();
            } catch (err) {
                console.error('启动页初始化失败:', err);
                webglFailed = true;
                if (renderer) disposeScene();
                loadingEl.textContent = '动画加载失败，正在进入登录页...';
                setTimeout(() => showStaticLogin('静态模式 · 仍可正常登录'), 800);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (!webglFailed && renderer) disposeScene();
        });

        init().catch(err => {
            console.error('启动页初始化失败:', err);
            webglFailed = true;
            showStaticLogin('静态模式 · 仍可正常登录');
        });
    </script>
