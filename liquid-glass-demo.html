<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星云编年史 - 沉浸式动漫编年史入口">
    <title>星云编年史 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050714;
            --bg-darker: #03030a;
            --neon-cyan: #00f3ff;
            --neon-purple: #b892ff;
            --neon-blue: #4da6ff;
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.72);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.35);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        /* 深空背景层 */
        #space-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 50%, rgba(124, 77, 255, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(77, 166, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(184, 146, 255, 0.1) 0%, transparent 45%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-darker) 100%);
        }

        #space-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/generated/nebula-bg.jpg') center/cover no-repeat;
            opacity: 0.35;
            mix-blend-mode: screen;
        }

        /* 动态光斑 */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: float 16s ease-in-out infinite;
        }

        .orb-1 {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, var(--neon-blue) 0%, rgba(45, 90, 245, 0.6) 70%, transparent 100%);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-purple) 0%, rgba(124, 77, 255, 0.5) 70%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #52d1c1 0%, rgba(0, 153, 204, 0.5) 70%, transparent 100%);
            top: 50%;
            left: 50%;
            margin-left: -160px;
            margin-top: -160px;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.22) 0%, rgba(45, 90, 245, 0.08) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            margin-left: -600px;
            margin-top: -600px;
            opacity: 0.18;
            animation-delay: -13s;
            animation-duration: 24s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.08); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(50px, 40px) scale(1.03); }
        }

        /* 星点画布 */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Three.js 容器 */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 3;
        }

        #canvas-container canvas {
            display: block;
        }

        /* 标题层 */
        #title-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #title-layer.visible {
            opacity: 1;
            transform: scale(1);
        }

        #title-layer h1 {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-shadow:
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(0, 243, 255, 0.15);
            margin-bottom: 12px;
        }

        #title-layer .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            margin-bottom: 16px;
        }

        .title-ornament {
            width: min(520px, 72vw);
            height: auto;
            opacity: 0.85;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.25));
        }

        #title-layer .tagline {
            font-size: clamp(14px, 1.8vw, 20px);
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            opacity: 0.9;
        }

        /* 玻璃圆盘底座 */
        .title-disc {
            position: absolute;
            width: min(520px, 80vw);
            height: min(260px, 40vw);
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
            transform: translateY(20px) rotateX(60deg);
            box-shadow:
                0 0 60px rgba(0, 243, 255, 0.1),
                inset 0 0 40px rgba(255, 255, 255, 0.05);
        }

        /* 登录层 */
        #login-layer {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #login-layer.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* 玻璃登录卡片 */
        .glass-card {
            position: relative;
            width: min(92vw, 420px);
            padding: 44px 36px;
            border-radius: 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.35),
                0 0 40px rgba(0, 243, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transform-style: preserve-3d;
            touch-action: none;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.4) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                transparent 70%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: url('images/effects/glass-caustic.jpg') center/cover;
            mix-blend-mode: overlay;
            opacity: 0.14;
            pointer-events: none;
        }

        .sheen {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.22) 0%,
                rgba(255, 255, 255, 0.08) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            mix-blend-mode: overlay;
        }

        .glass-card h2 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .glass-card .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            background: rgba(0, 0, 0, 0.35);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .login-btn:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.25);
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .guest-link:hover {
            color: var(--neon-cyan);
        }

        /* 跳过按钮 */
        #skip-btn {
            position: fixed;
            top: 28px;
            right: 28px;
            z-index: 100;
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            min-width: 44px;
            min-height: 44px;
        }

        #skip-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #skip-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* 加载提示 */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-darker);
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 0.2em;
            transition: opacity 0.8s ease;
            gap: 16px;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading::after {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 8px 0 0 var(--neon-cyan), 16px 0 0 var(--neon-cyan);
            animation: loadingDots 1.4s infinite;
        }

        @keyframes loadingDots {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            #title-layer h1 { letter-spacing: 0.08em; }
            #title-layer .subtitle { letter-spacing: 0.25em; }
            .glass-card { padding: 36px 28px; }
            .glass-card h2 { font-size: 24px; }
        }

        /* 减少运动偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <canvas id="starfield"></canvas>
    <div id="canvas-container"></div>

    <div id="title-layer">
        <div class="title-disc"></div>
        <h1>星云编年史</h1>
        <p class="subtitle">NEBULA CHRONICLE</p>
        <img src="images/effects/title-ornament.png" alt="" class="title-ornament">
        <p class="tagline">群星已就位，编年史待启</p>
    </div>

    <div id="login-layer">
        <div class="glass-card" id="loginCard">
            <div class="sheen" id="loginSheen"></div>
            <h2>启程</h2>
            <p class="login-subtitle">开启你的星云之旅</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">星图标识</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">星云密钥</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required minlength="6">
                </div>
                <button type="submit" class="login-btn">进入星云</button>
            </form>
            <a href="#" class="guest-link" id="guestLink">以游客身份浏览</a>
        </div>
    </div>

    <button id="skip-btn">跳过动画</button>
    <div id="loading">星云苏醒中</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ============================================================
        // 星云编年史 · 启动页 + 登录页一体化
        // ============================================================

        const CHARACTERS = [
            { name: '秋山澪', file: 'akiyama-mio.jpg', color: 0xff9ec8, year: '2010/2011' },
            { name: '立华奏', file: 'tachibana-kanade.jpg', color: 0xc7f0ff, year: '2012' },
            { name: '夏娜', file: 'shana.jpg', color: 0xff4d4d, year: '2016' },
            { name: '加藤惠', file: 'kato-megumi.jpg', color: 0xffb7c5, year: '2017' },
            { name: '雷姆', file: 'rem.jpg', color: 0x7fd3ff, year: '2018' },
            { name: '薇尔莉特', file: 'violet-evergarden.png', color: 0xb892ff, year: '2019' },
            { name: '伊蕾娜', file: 'elaina.jpg', color: 0xe8e8ff, year: '2021' },
            { name: '御坂美琴', file: 'misaka-mikoto.jpg', color: 0x00bfff, year: '人气之王' }
        ];

        const IMAGE_BASE = 'images/login/';
        const DURATION = {
            nebulaAwake: 2.0,
            glassForm: 1.5,
            characterAwake: 2.0,
            starChartExpand: 2.5,
            collapse: 1.5,
            vortex: 1.5,
            titleReveal: 2.0,
            loginRise: 1.5
        };

        let scene, camera, renderer;
        let cards = [];
        let constellationLines;
        let vortexParticles;
        let centralGlow;
        let magicCircle;
        let masterTimeline;
        let isSkipped = false;
        let rafId;
        let reducedMotion = false;
        let webglFailed = false;

        // DOM 元素
        const loadingEl = document.getElementById('loading');
        const skipBtn = document.getElementById('skip-btn');
        const titleLayer = document.getElementById('title-layer');
        const loginLayer = document.getElementById('login-layer');
        const loginCard = document.getElementById('loginCard');
        const loginSheen = document.getElementById('loginSheen');
        const loginForm = document.getElementById('loginForm');
        const guestLink = document.getElementById('guestLink');

        // 共享纹理
        let particleTexture, warmParticleTexture, streakTexture, causticTexture, magicCircleTexture;

        // ============================================================
        // 工具函数
        // ============================================================
        function isWebGLAvailable() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl2') || canvas.getContext('webgl')));
            } catch (e) {
                return false;
            }
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        // ============================================================
        // 星点背景
        // ============================================================
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let starRafId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const stars = [];
            const count = Math.min(260, Math.floor((canvas.width * canvas.height) / 6500));

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.3,
                    opacity: Math.random() * 0.6 + 0.2,
                    speed: Math.random() * 0.3 + 0.05,
                    twinkle: Math.random() * Math.PI * 2
                });
            }

            let frame = 0;
            let lastDraw = 0;
            function draw(now) {
                starRafId = requestAnimationFrame(draw);
                if (reducedMotion) return;
                if (now - lastDraw < 32) return; // 限制约 30fps
                lastDraw = now;
                frame++;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                stars.forEach(star => {
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }

                    const twinkle = Math.sin(frame * 0.02 + star.twinkle) * 0.3 + 0.7;
                    const alpha = star.opacity * twinkle;

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                });
            }
            draw(0);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(starRafId);
                } else {
                    draw(0);
                }
            });
        }

        // ============================================================
        // Three.js 场景初始化
        // ============================================================
        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050714, 0.02);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 14);

            const maxDpr = window.innerWidth < 768 ? 1.5 : 2;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxDpr));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            renderer.domElement.addEventListener('webglcontextlost', (e) => {
                e.preventDefault();
                cancelAnimationFrame(rafId);
                webglFailed = true;
                showLogin();
            });

            renderer.domElement.addEventListener('webglcontextrestored', () => {
                location.reload();
            });

            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x4da6ff, 1.2, 50);
            pointLight.position.set(0, 0, 8);
            scene.add(pointLight);

            const rimLight = new THREE.PointLight(0xb892ff, 0.8, 50);
            rimLight.position.set(-10, 5, 5);
            scene.add(rimLight);

            // 中央发光体
            const glowGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x4da6ff,
                transparent: true,
                opacity: 0.3
            });
            centralGlow = new THREE.Mesh(glowGeo, glowMat);
            centralGlow.scale.set(0, 0, 0);
            scene.add(centralGlow);

            // 中央魔法阵
            magicCircleTexture = new THREE.TextureLoader().load('images/generated/magic-circle.jpg');
            magicCircleTexture.encoding = THREE.sRGBEncoding;
            const magicMat = new THREE.SpriteMaterial({
                map: magicCircleTexture,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                color: 0x88ccff
            });
            magicCircle = new THREE.Sprite(magicMat);
            magicCircle.scale.set(0, 0, 0);
            scene.add(magicCircle);

            window.addEventListener('resize', onWindowResize, { passive: true });
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============================================================
        // 纹理预加载
        // ============================================================
        function loadSharedTextures() {
            return new Promise((resolve) => {
                const loader = new THREE.TextureLoader();
                let loaded = 0;
                const total = 5;
                function check() {
                    loaded++;
                    if (loaded >= total) resolve();
                }

                particleTexture = loader.load('images/effects/particle-glow.png', check);
                warmParticleTexture = loader.load('images/effects/particle-glow-warm.png', check);
                streakTexture = loader.load('images/effects/light-streak.png', check);
                causticTexture = loader.load('images/effects/glass-caustic.jpg', check);
                magicCircleTexture = loader.load('images/generated/magic-circle.jpg', check);

                [particleTexture, warmParticleTexture, streakTexture, causticTexture, magicCircleTexture].forEach(tex => {
                    tex.encoding = THREE.sRGBEncoding;
                });
            });
        }

        // ============================================================
        // 创建液态玻璃角色卡片
        // ============================================================
        function createCard(char, index, texture) {
            const group = new THREE.Group();

            // 卡片尺寸：竖版 2.2 x 3.2
            const geometry = new THREE.PlaneGeometry(2.2, 3.2, 1, 1);

            // 玻璃材质：不使用 transmission（Plane 无厚度），改用 clearcoat + opacity 模拟
            const material = new THREE.MeshPhysicalMaterial({
                map: texture,
                color: 0xffffff,
                metalness: 0.05,
                roughness: 0.12,
                clearcoat: 1.0,
                clearcoatRoughness: 0.08,
                transparent: true,
                opacity: 0.96,
                side: THREE.DoubleSide,
                emissive: char.color,
                emissiveIntensity: 0.06,
                envMapIntensity: 1.0
            });

            const card = new THREE.Mesh(geometry, material);
            group.add(card);

            // 发光边框
            const borderGeo = new THREE.PlaneGeometry(2.35, 3.35, 1, 1);
            const borderMat = new THREE.MeshBasicMaterial({
                color: char.color,
                transparent: true,
                opacity: 0.25,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending
            });
            const border = new THREE.Mesh(borderGeo, borderMat);
            border.position.z = -0.02;
            group.add(border);

            // 体积光晕
            const glowGeo = new THREE.PlaneGeometry(3.0, 4.0, 1, 1);
            const glowMat = new THREE.MeshBasicMaterial({
                color: char.color,
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.z = -0.1;
            group.add(glow);

            group.userData = {
                index,
                color: char.color,
                baseScale: 1,
                name: char.name,
                cardMesh: card,
                borderMesh: border,
                glowMesh: glow
            };

            group.scale.set(0, 0, 0);
            group.visible = false;

            return group;
        }

        function initCards() {
            const loader = new THREE.TextureLoader();
            CHARACTERS.forEach((char, index) => {
                const texture = loader.load(IMAGE_BASE + char.file);
                texture.encoding = THREE.sRGBEncoding;
                const card = createCard(char, index, texture);
                cards.push(card);
                scene.add(card);
            });
        }

        // ============================================================
        // 星座连线
        // ============================================================
        function initConstellationLines() {
            const material = new THREE.LineBasicMaterial({
                color: 0x00f3ff,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending
            });

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(8 * 3 * 2);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            constellationLines = new THREE.LineSegments(geometry, material);
            scene.add(constellationLines);
        }

        function updateConstellationLines(opacity = null) {
            if (!constellationLines) return;

            const positions = constellationLines.geometry.attributes.position.array;
            const count = cards.length;

            for (let i = 0; i < count; i++) {
                const current = cards[i];
                const next = cards[(i + 1) % count];

                const idx = i * 6;
                positions[idx] = current.position.x;
                positions[idx + 1] = current.position.y;
                positions[idx + 2] = current.position.z;
                positions[idx + 3] = next.position.x;
                positions[idx + 4] = next.position.y;
                positions[idx + 5] = next.position.z;
            }

            constellationLines.geometry.attributes.position.needsUpdate = true;
            if (opacity !== null) {
                constellationLines.material.opacity = opacity;
            }
        }

        // ============================================================
        // 星云漩涡粒子
        // ============================================================
        function initVortex() {
            const particleCount = 600;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const basePositions = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0x4da6ff),
                new THREE.Color(0xb892ff),
                new THREE.Color(0xffffff),
                new THREE.Color(0x00f3ff)
            ];

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 8 + 0.5;
                const height = (Math.random() - 0.5) * 4;

                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = height;
                positions[i * 3 + 2] = Math.sin(angle) * radius;

                basePositions[i * 3] = positions[i * 3];
                basePositions[i * 3 + 1] = height;
                basePositions[i * 3 + 2] = positions[i * 3 + 2];

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                sizes[i] = Math.random() * 0.08 + 0.02;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.userData = { basePositions };

            const material = new THREE.PointsMaterial({
                size: 0.12,
                map: particleTexture,
                vertexColors: true,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            vortexParticles = new THREE.Points(geometry, material);
            vortexParticles.visible = false;
            scene.add(vortexParticles);
        }

        function resetVortex() {
            if (!vortexParticles) return;
            const positions = vortexParticles.geometry.attributes.position.array;
            const base = vortexParticles.geometry.userData.basePositions;
            for (let i = 0; i < positions.length; i++) {
                positions[i] = base[i];
            }
            vortexParticles.geometry.attributes.position.needsUpdate = true;
        }

        function updateVortex(time, intensity = 1) {
            if (!vortexParticles || !vortexParticles.visible) return;

            const positions = vortexParticles.geometry.attributes.position.array;
            const count = positions.length / 3;

            for (let i = 0; i < count; i++) {
                const idx = i * 3;
                let x = positions[idx];
                let y = positions[idx + 1];
                let z = positions[idx + 2];

                const radius = Math.sqrt(x * x + z * z);
                let angle = Math.atan2(z, x);

                angle += 0.025 * intensity;
                const shrink = radius > 0.3 ? radius * 0.988 : radius;

                positions[idx] = Math.cos(angle) * shrink;
                positions[idx + 1] *= 0.99;
                positions[idx + 2] = Math.sin(angle) * shrink;
            }

            vortexParticles.geometry.attributes.position.needsUpdate = true;
            vortexParticles.rotation.y = time * 0.2;
        }

        // ============================================================
        // 动画编排
        // ============================================================
        function getCardOrbitPosition(index, total, radius, yOffset = 0) {
            // 菱形 + 四角布局
            const positions = [
                { angle: -Math.PI / 2, r: 1.0, yMul: 0.15 },   // 上
                { angle: 0, r: 1.0, yMul: 0 },                  // 右
                { angle: Math.PI / 2, r: 1.0, yMul: -0.15 },    // 下
                { angle: Math.PI, r: 1.0, yMul: 0 },            // 左
                { angle: -Math.PI / 4, r: 1.18, yMul: 0.08 },   // 右上
                { angle: Math.PI / 4, r: 1.18, yMul: -0.08 },   // 右下
                { angle: 3 * Math.PI / 4, r: 1.18, yMul: -0.08 }, // 左下
                { angle: -3 * Math.PI / 4, r: 1.18, yMul: 0.08 }  // 左上
            ];
            const p = positions[index % positions.length];
            return {
                x: Math.cos(p.angle) * radius * p.r,
                y: yOffset + Math.sin(p.angle) * radius * p.yMul,
                z: Math.sin(p.angle) * radius * p.r,
                rotY: -p.angle,
                rotX: 0.08
            };
        }

        function buildTimeline() {
            const tl = gsap.timeline({
                onComplete: () => {
                    if (!isSkipped) showLogin();
                }
            });

            masterTimeline = tl;

            if (reducedMotion) {
                tl.call(() => showLogin(), null, 0.2);
                return tl;
            }

            // Phase 1: 星云苏醒 - 中央发光体呼吸
            const t0 = 0;
            tl.to(centralGlow.scale, {
                x: 1.5, y: 1.5, z: 1.5,
                duration: DURATION.nebulaAwake,
                ease: 'power2.inOut'
            }, t0);
            tl.to(centralGlow.material, {
                opacity: 0.6,
                duration: DURATION.nebulaAwake,
                ease: 'power2.inOut'
            }, t0);

            // Phase 2: 液态玻璃凝聚 - 卡片从中央诞生
            const t2 = t0 + DURATION.nebulaAwake;
            cards.forEach((card, i) => {
                const stagger = i * 0.08;
                const mesh = card.userData.cardMesh;
                tl.call(() => { card.visible = true; }, null, t2 + stagger);
                tl.to(card.scale, {
                    x: 1, y: 1, z: 1,
                    duration: DURATION.glassForm,
                    ease: 'back.out(1.4)'
                }, t2 + stagger);
                tl.to(mesh.material, {
                    opacity: 0.96,
                    duration: DURATION.glassForm * 0.6,
                    ease: 'power2.out'
                }, t2 + stagger);
            });

            // Phase 3: 角色觉醒 - 卡片扩散到轨道
            const t3 = t2 + DURATION.glassForm + 0.4;
            cards.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards.length, 4.5, 0);
                tl.to(card.position, {
                    x: target.x,
                    y: target.y,
                    z: target.z,
                    duration: DURATION.characterAwake,
                    ease: 'power3.out'
                }, t3);
                tl.to(card.rotation, {
                    y: target.rotY,
                    x: target.rotX,
                    duration: DURATION.characterAwake,
                    ease: 'power3.out'
                }, t3);
            });

            // Phase 4: 编年史展开 - 星图扩大，连线显现，魔法阵浮现
            const t4 = t3 + DURATION.characterAwake;
            tl.to(constellationLines.material, {
                opacity: 0.6,
                duration: DURATION.starChartExpand * 0.4,
                ease: 'power2.out'
            }, t4);
            tl.to(magicCircle.material, {
                opacity: 0.55,
                duration: DURATION.starChartExpand * 0.5,
                ease: 'power2.out'
            }, t4 + 0.3);
            tl.to(magicCircle.scale, {
                x: 5, y: 5, z: 5,
                duration: DURATION.starChartExpand,
                ease: 'sine.out'
            }, t4 + 0.3);
            cards.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards.length, 5.5, 0);
                tl.to(card.position, {
                    x: target.x,
                    y: target.y,
                    z: target.z,
                    duration: DURATION.starChartExpand,
                    ease: 'sine.inOut'
                }, t4);
            });

            // Phase 5: 星图坍缩
            const t5 = t4 + DURATION.starChartExpand;
            tl.to(constellationLines.material, {
                opacity: 0,
                duration: DURATION.collapse * 0.5,
                ease: 'power2.in'
            }, t5);
            tl.to(magicCircle.material, {
                opacity: 0,
                duration: DURATION.collapse,
                ease: 'power2.in'
            }, t5);
            cards.forEach((card, i) => {
                const stagger = i * 0.04;
                tl.to(card.position, {
                    x: 0, y: 0, z: 0,
                    duration: DURATION.collapse,
                    ease: 'power3.in'
                }, t5 + stagger);
                tl.to(card.rotation, {
                    y: Math.PI * 4,
                    z: 0.2,
                    duration: DURATION.collapse,
                    ease: 'power3.in'
                }, t5 + stagger);
                tl.to(card.scale, {
                    x: 0.05, y: 0.05, z: 0.05,
                    duration: DURATION.collapse,
                    ease: 'power3.in'
                }, t5 + stagger);
            });

            // Phase 6: 星云漩涡
            const t6 = t5 + DURATION.collapse + 0.2;
            tl.call(() => {
                resetVortex();
                vortexParticles.visible = true;
                centralGlow.material.color.setHex(0xffffff);
            }, null, t6);
            tl.to(vortexParticles.material, {
                opacity: 0.8,
                duration: DURATION.vortex * 0.5,
                ease: 'power2.out'
            }, t6);
            tl.to(centralGlow.scale, {
                x: 4, y: 4, z: 4,
                duration: DURATION.vortex,
                ease: 'power2.out'
            }, t6);
            tl.to(centralGlow.material, {
                opacity: 0.8,
                duration: DURATION.vortex,
                ease: 'power2.out'
            }, t6);
            tl.to(vortexParticles.material, {
                opacity: 0,
                duration: DURATION.vortex * 0.5,
                ease: 'power2.in'
            }, t6 + DURATION.vortex * 0.5);
            tl.to(centralGlow.scale, {
                x: 0.1, y: 0.1, z: 0.1,
                duration: 0.5,
                ease: 'power2.in'
            }, t6 + DURATION.vortex * 0.8);

            // Phase 7: 标题浮现
            const t7 = t6 + DURATION.vortex + 0.3;
            tl.call(() => {
                titleLayer.classList.add('visible');
            }, null, t7);
            tl.to({}, { duration: DURATION.titleReveal }, t7);

            return tl;
        }

        // ============================================================
        // 渲染循环
        // ============================================================
        function animate() {
            rafId = requestAnimationFrame(animate);
            if (document.hidden) return;

            const time = performance.now() * 0.001;

            // 卡片持续漂浮
            cards.forEach((card, i) => {
                if (card.visible) {
                    if (loginLayer.classList.contains('visible')) {
                        // 登录界面升起后两侧角色呼吸浮动
                        const baseY = card.userData.loginY || card.position.y;
                        card.position.y = baseY + Math.sin(time * 0.6 + i) * 0.08;
                    } else {
                        card.position.y += Math.sin(time * 0.8 + i) * 0.002;
                        card.rotation.y += 0.002;
                    }
                }
            });

            // 魔法阵旋转
            if (magicCircle && magicCircle.visible && magicCircle.material.opacity > 0) {
                magicCircle.material.rotation += 0.003;
            }

            // 更新连线
            if (constellationLines && constellationLines.material.opacity > 0) {
                updateConstellationLines();
            }

            // 更新漩涡
            updateVortex(time);

            renderer.render(scene, camera);
        }

        // ============================================================
        // 状态切换
        // ============================================================
        function showStaticLogin(message) {
            // 无 WebGL 或初始化失败时的静态降级：显示标题 + 登录卡片
            loadingEl.classList.add('hidden');
            skipBtn.classList.remove('visible');
            titleLayer.classList.add('visible');
            loginLayer.classList.add('visible');
            if (message) {
                const tagline = titleLayer.querySelector('.tagline');
                if (tagline) tagline.textContent = message;
            }
        }

        function showLogin() {
            titleLayer.classList.remove('visible');
            loginLayer.classList.add('visible');
            skipBtn.classList.remove('visible');

            // 角色退到两侧
            cards.forEach((card, i) => {
                const isLeft = i < 4;
                const xPos = isLeft ? -7.2 - (i % 4) * 0.35 : 7.2 + (i % 4) * 0.35;
                const yPos = (i % 4 - 1.5) * 2.6;
                card.userData.loginY = yPos;

                gsap.to(card.position, {
                    x: xPos,
                    y: yPos,
                    z: -2,
                    duration: 1.2,
                    ease: 'power3.out'
                });
                gsap.to(card.rotation, {
                    y: isLeft ? 0.25 : -0.25,
                    x: 0,
                    z: 0,
                    duration: 1.2,
                    ease: 'power3.out'
                });
                gsap.to(card.scale, {
                    x: 0.6, y: 0.6, z: 0.6,
                    duration: 1.2,
                    ease: 'power3.out'
                });
            });

            // 隐藏连线和漩涡
            if (constellationLines) constellationLines.visible = false;
            if (vortexParticles) vortexParticles.visible = false;
            if (centralGlow) centralGlow.visible = false;
        }

        function skipAnimation() {
            if (isSkipped) return;
            isSkipped = true;

            if (webglFailed) {
                showStaticLogin('静态模式 · 仍可正常登录');
                return;
            }

            if (masterTimeline) masterTimeline.kill();
            gsap.killTweensOf(cards);
            gsap.killTweensOf([centralGlow, magicCircle, vortexParticles?.material, constellationLines?.material]);

            cards.forEach(card => { card.visible = false; });
            if (centralGlow) centralGlow.visible = false;
            if (magicCircle) magicCircle.visible = false;
            if (constellationLines) constellationLines.visible = false;
            if (vortexParticles) vortexParticles.visible = false;

            titleLayer.classList.remove('visible');
            showLogin();
        }

        // ============================================================
        // 资源清理
        // ============================================================
        function disposeScene() {
            cancelAnimationFrame(rafId);
            gsap.killTweensOf(cards);
            gsap.killTweensOf([centralGlow, magicCircle, vortexParticles, constellationLines]);

            cards.forEach(group => {
                group.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (child.material.map) child.material.map.dispose();
                        child.material.dispose();
                    }
                });
                scene.remove(group);
            });
            cards = [];

            if (constellationLines) {
                constellationLines.geometry.dispose();
                constellationLines.material.dispose();
                scene.remove(constellationLines);
                constellationLines = null;
            }

            if (vortexParticles) {
                vortexParticles.geometry.dispose();
                vortexParticles.material.dispose();
                scene.remove(vortexParticles);
                vortexParticles = null;
            }

            if (centralGlow) {
                centralGlow.geometry.dispose();
                centralGlow.material.dispose();
                scene.remove(centralGlow);
                centralGlow = null;
            }

            if (magicCircle) {
                magicCircle.material.dispose();
                scene.remove(magicCircle);
                magicCircle = null;
            }

            [particleTexture, warmParticleTexture, streakTexture, causticTexture, magicCircleTexture].forEach(tex => {
                if (tex) tex.dispose();
            });

            if (renderer) {
                renderer.dispose();
                renderer.domElement.remove();
                renderer = null;
            }
        }

        // ============================================================
        // 登录交互
        // ============================================================
        function initLoginInteraction() {
            // 鼠标跟随高光
            let targetX = 0, targetY = 0;
            let currentX = 0, currentY = 0;
            let sheenRafId;

            function updateSheen() {
                currentX += (targetX - currentX) * 0.12;
                currentY += (targetY - currentY) * 0.12;
                loginSheen.style.left = currentX + 'px';
                loginSheen.style.top = currentY + 'px';
                sheenRafId = requestAnimationFrame(updateSheen);
            }

            loginCard.addEventListener('mouseenter', () => {
                loginSheen.style.opacity = '1';
                if (!sheenRafId) updateSheen();
            });

            loginCard.addEventListener('mouseleave', () => {
                loginSheen.style.opacity = '0';
                if (sheenRafId) {
                    cancelAnimationFrame(sheenRafId);
                    sheenRafId = null;
                }
            });

            // 统一 pointer 事件支持鼠标和触摸
            loginCard.addEventListener('pointermove', (e) => {
                const rect = loginCard.getBoundingClientRect();
                targetX = e.clientX - rect.left;
                targetY = e.clientY - rect.top;

                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                loginCard.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
            }, { passive: true });

            loginCard.addEventListener('pointerleave', () => {
                loginCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });

            // 表单提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    alert('请输入用户名和密码');
                    return;
                }
                if (password.length < 6) {
                    alert('密码长度不能少于 6 位');
                    return;
                }

                const btn = loginForm.querySelector('.login-btn');
                btn.disabled = true;
                btn.textContent = '验证中...';

                // 演示用途：延迟跳转
                setTimeout(() => {
                    sessionStorage.setItem('nebulaUser', username);
                    window.location.href = 'nebula-chronicle.html';
                }, 500);
            });

            guestLink.addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.setItem('nebulaUser', '游客');
                window.location.href = 'nebula-chronicle.html';
            });
        }

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            reducedMotion = prefersReducedMotion();
            initStarfield();
            initLoginInteraction();
            skipBtn.addEventListener('click', skipAnimation);

            if (!isWebGLAvailable()) {
                webglFailed = true;
                loadingEl.textContent = '你的浏览器不支持 WebGL，正在进入登录页...';
                setTimeout(() => showStaticLogin('静态模式 · 仍可正常登录'), 800);
                return;
            }

            try {
                initThree();
                await loadSharedTextures();
                initCards();
                initConstellationLines();
                initVortex();

                await new Promise(resolve => setTimeout(resolve, 300));
                loadingEl.classList.add('hidden');
                skipBtn.classList.add('visible');

                buildTimeline();
                animate();
            } catch (err) {
                console.error('启动页初始化失败:', err);
                webglFailed = true;
                if (renderer) disposeScene();
                loadingEl.textContent = '动画加载失败，正在进入登录页...';
                setTimeout(() => showStaticLogin('静态模式 · 仍可正常登录'), 800);
            }
        }

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (!webglFailed && renderer) disposeScene();
        });

        init().catch(err => {
            console.error('启动页初始化失败:', err);
            webglFailed = true;
            showStaticLogin('静态模式 · 仍可正常登录');
        });
    </script>
