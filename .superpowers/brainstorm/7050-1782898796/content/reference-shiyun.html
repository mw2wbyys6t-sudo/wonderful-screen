<h2>参考：抖音爆款「诗云」的交互思路</h2>
<p class="subtitle">把 32,657 位诗人、93 万首诗做成一片可漫游的三维星系</p>

<div class="mockup">
  <div class="mockup-header">核心特点</div>
  <div class="mockup-body">
    <ul>
      <li><strong>每个诗人 = 一颗星</strong>：诗人以粒子/光点形式分布在 3D 空间</li>
      <li><strong>每首诗 = 一个空间坐标</strong>：可缩放、旋转、漫游</li>
      <li><strong>点击星星看详情</strong>：弹出作品/诗人信息</li>
      <li><strong>关系网络</strong>：诗人之间有连线，形成星系群落</li>
      <li><strong>PC 端体验最完整</strong>：强调沉浸、探索、数据美感</li>
    </ul>
  </div>
</div>

<p class="subtitle">把这个思路迁移到星云编年史，就是让每个动漫作品/角色成为星系中的一颗星。</p>
