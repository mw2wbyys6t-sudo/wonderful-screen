<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星云编年史 · 登录 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --neon-pink: #ff2a6d;
            --neon-blue: #4da6ff;
            --deep-space: #03030a;
            --space-void: #050714;
            --star-white: #f0f0ff;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.16);
            --glass-highlight: rgba(255, 255, 255, 0.32);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
            background: var(--deep-space);
            color: var(--star-white);
        }

        /* ===== 加载遮罩 ===== */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--deep-space);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-purple);
            animation: spin 1.2s linear infinite;
        }

        .loader-text {
            margin-top: 24px;
            font-size: 13px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.55);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 星云背景 ===== */
        .nebula-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('images/login/nebula-bg.png') center/cover no-repeat;
        }

        .nebula-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 40%, rgba(0, 243, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(176, 38, 255, 0.08) 0%, transparent 40%),
                linear-gradient(180deg, rgba(3, 3, 10, 0.2) 0%, rgba(3, 3, 10, 0.55) 100%);
        }

        /* ===== 星点画布 ===== */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== 动态光斑 ===== */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.45;
            animation: floatOrb 18s ease-in-out infinite;
        }

        .orb-1 {
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.5) 0%, rgba(0, 120, 255, 0.15) 60%, transparent 100%);
            top: -120px;
            left: -120px;
        }

        .orb-2 {
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.45) 0%, rgba(120, 20, 200, 0.12) 60%, transparent 100%);
            bottom: -100px;
            right: -100px;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 42, 109, 0.3) 0%, rgba(200, 30, 90, 0.08) 60%, transparent 100%);
            top: 50%;
            left: 35%;
            transform: translate(-50%, -50%);
            animation-delay: -12s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -40px) scale(1.06); }
            50% { transform: translate(-30px, 30px) scale(0.96); }
            75% { transform: translate(40px, 50px) scale(1.04); }
        }

        /* ===== 暗角与色调层 ===== */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 3;
            background:
                radial-gradient(circle at 40% 45%, transparent 0%, rgba(3, 3, 10, 0.4) 45%, rgba(3, 3, 10, 0.78) 100%),
                linear-gradient(90deg, rgba(3, 3, 10, 0.15) 0%, rgba(3, 3, 10, 0.05) 45%, rgba(3, 3, 10, 0.55) 80%, rgba(3, 3, 10, 0.72) 100%);
            pointer-events: none;
        }

        /* ===== 星座连线装饰 ===== */
        .constellation {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            opacity: 0.35;
        }

        .constellation line {
            stroke: rgba(0, 243, 255, 0.25);
            stroke-width: 1;
            stroke-dasharray: 8 6;
            animation: dashFlow 12s linear infinite;
        }

        .constellation circle {
            fill: rgba(255, 255, 255, 0.6);
            filter: drop-shadow(0 0 4px rgba(0, 243, 255, 0.6));
        }

        @keyframes dashFlow {
            to { stroke-dashoffset: -84; }
        }

        /* ===== 主场景 ===== */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr min(42vw, 460px);
            align-items: center;
            padding: 40px min(5vw, 80px);
            gap: 60px;
            perspective: 1400px;
            opacity: 0;
            transform: scale(1.02);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .scene.ready {
            opacity: 1;
            transform: scale(1);
        }

        /* ===== 顶部标题 ===== */
        .title-section {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(0, 243, 255, 0.35);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            color: rgba(240, 240, 255, 0.72);
            margin-top: 10px;
            letter-spacing: 5px;
        }

        .tagline {
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            color: rgba(240, 240, 255, 0.45);
            margin-top: 8px;
            letter-spacing: 3px;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        /* ===== 左侧角色展示区 ===== */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 60px;
            pointer-events: none;
        }

        .character-display {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .character-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.6s ease-in-out;
            mask-image: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 60%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 60%, rgba(0,0,0,0) 100%);
        }

        .character-slide.active {
            opacity: 1;
        }

        .character-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transform: scale(1.12);
        }

        .character-slide.active img {
            animation: kenburns 10s ease-in-out infinite alternate;
        }

        @keyframes kenburns {
            0% { transform: scale(1.1) translate(0, 0); }
            100% { transform: scale(1.22) translate(-1%, -1.5%); }
        }

        .character-info {
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .character-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .character-year {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 100px;
            background: rgba(0, 243, 255, 0.12);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: var(--neon-cyan);
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .character-name {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 8px;
            color: #fff;
            text-shadow:
                0 0 30px rgba(0, 243, 255, 0.35),
                0 0 60px rgba(176, 38, 255, 0.25),
                0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 12px;
        }

        .character-quote {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 2px;
            max-width: 420px;
            line-height: 1.7;
        }

        .slide-indicators {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            pointer-events: auto;
        }

        .indicator:hover {
            background: rgba(255, 255, 255, 0.45);
            transform: scale(1.2);
        }

        .indicator.active {
            background: var(--neon-cyan);
            box-shadow: 0 0 16px var(--neon-cyan);
            transform: scale(1.3);
        }

        /* ===== 右侧玻璃登录卡片 ===== */
        .login-scene {
            position: relative;
            width: 100%;
            max-width: 440px;
            justify-self: end;
        }

        .glass-back {
            position: absolute;
            width: 92%;
            height: 94%;
            top: 14px;
            left: 4%;
            border-radius: 44px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(56px);
            -webkit-backdrop-filter: blur(56px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 32px 100px rgba(0, 0, 0, 0.5);
            transform: translateZ(-80px) rotateX(4deg);
        }

        .glass-card {
            position: relative;
            width: 100%;
            padding: 46px 40px;
            border-radius: 44px;
            background: var(--glass-bg);
            backdrop-filter: blur(36px);
            -webkit-backdrop-filter: blur(36px);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 16px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 243, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 顶部轮廓高光 */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 44px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.42) 0%,
                rgba(255, 255, 255, 0.1) 45%,
                transparent 75%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* 动态光流 */
        .light-flow {
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(0, 243, 255, 0.05) 60deg,
                rgba(176, 38, 255, 0.05) 120deg,
                transparent 180deg,
                rgba(255, 42, 109, 0.04) 240deg,
                rgba(0, 243, 255, 0.05) 300deg,
                transparent 360deg
            );
            animation: rotateFlow 20s linear infinite;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes rotateFlow {
            to { transform: rotate(360deg); }
        }

        /* 鼠标跟随高光 */
        .sheen {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.18) 0%,
                rgba(255, 255, 255, 0.06) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.5s ease;
            mix-blend-mode: overlay;
            z-index: 2;
        }

        .glass-card:hover .sheen {
            opacity: 1;
        }

        .login-content {
            position: relative;
            z-index: 3;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 14px var(--neon-cyan);
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.25); }
        }

        .login-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .login-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.62);
            margin-bottom: 34px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.22);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.35s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.32);
        }

        .form-group input:focus {
            border-color: rgba(0, 243, 255, 0.55);
            background: rgba(0, 0, 0, 0.32);
            box-shadow: 0 0 24px rgba(0, 243, 255, 0.14);
        }

        .login-button {
            width: 100%;
            margin-top: 10px;
            padding: 17px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.18), rgba(176, 38, 255, 0.18));
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.45) 0%,
                rgba(255, 255, 255, 0.05) 60%,
                transparent 100%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .login-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transform: rotate(25deg) translateX(-100%);
            transition: transform 0.8s ease;
        }

        .login-button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.3), rgba(176, 38, 255, 0.3));
            box-shadow:
                0 14px 42px rgba(0, 243, 255, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .login-button:hover::after {
            transform: rotate(25deg) translateX(100%);
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
            letter-spacing: 1px;
        }

        .guest-link:hover {
            color: var(--neon-cyan);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .scene {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 100px 24px 40px;
                align-items: end;
            }
            .hero-section {
                display: none;
            }
            .login-scene {
                justify-self: center;
                max-width: 460px;
            }
            .vignette {
                background:
                    radial-gradient(circle at 50% 40%, transparent 0%, rgba(3, 3, 10, 0.5) 50%, rgba(3, 3, 10, 0.85) 100%),
                    linear-gradient(180deg, rgba(3, 3, 10, 0.4) 0%, rgba(3, 3, 10, 0.1) 45%, rgba(3, 3, 10, 0.75) 100%);
            }
        }

        @media (max-width: 480px) {
            .main-title { letter-spacing: 6px; }
            .sub-title { letter-spacing: 3px; }
            .glass-card {
                padding: 36px 28px;
                border-radius: 34px;
            }
            .glass-card::before { border-radius: 34px; }
            .login-title { font-size: 28px; }
        }

        /* 减少运动偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">星云苏醒中</div>
    </div>

    <!-- 星云背景 -->
    <div class="nebula-bg"></div>

    <!-- 星点画布 -->
    <canvas id="starfield"></canvas>

    <!-- 动态光斑 -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 暗角 -->
    <div class="vignette"></div>

    <!-- 星座连线 -->
    <svg class="constellation" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
        <g id="constellation-lines">
            <line x1="240" y1="240" x2="420" y2="180" />
            <line x1="420" y1="180" x2="640" y2="320" />
            <line x1="640" y1="320" x2="540" y2="520" />
            <line x1="540" y1="520" x2="300" y2="480" />
            <line x1="300" y1="480" x2="240" y2="240" />
            <line x1="1380" y1="200" x2="1580" y2="280" />
            <line x1="1580" y1="280" x2="1680" y2="480" />
            <line x1="1680" y1="480" x2="1500" y2="620" />
            <line x1="1500" y1="620" x2="1320" y2="520" />
            <line x1="1320" y1="520" x2="1380" y2="200" />
            <line x1="420" y1="180" x2="1380" y2="200" />
            <line x1="640" y1="320" x2="1320" y2="520" />
            <circle cx="240" cy="240" r="2" />
            <circle cx="420" cy="180" r="2.5" />
            <circle cx="640" cy="320" r="2" />
            <circle cx="540" cy="520" r="2.5" />
            <circle cx="300" cy="480" r="2" />
            <circle cx="1380" cy="200" r="2.5" />
            <circle cx="1580" cy="280" r="2" />
            <circle cx="1680" cy="480" r="2.5" />
            <circle cx="1500" cy="620" r="2" />
            <circle cx="1320" cy="520" r="2.5" />
        </g>
    </svg>

    <!-- 主场景 -->
    <div class="scene" id="scene">
        <div class="title-section">
            <h1 class="main-title">NEBULA CHRONICLE</h1>
            <p class="sub-title">星云编年史 · 穿越次元之门</p>
            <p class="tagline">八位萌王点亮星图，你的次元之旅即将启程</p>
        </div>

        <div class="hero-section">
            <div class="character-display" id="characterDisplay"></div>
            <div class="character-info" id="characterInfo">
                <div class="character-year" id="characterYear"></div>
                <h2 class="character-name" id="characterName"></h2>
                <p class="character-quote" id="characterQuote"></p>
            </div>
            <div class="slide-indicators" id="indicators"></div>
        </div>

        <div class="login-scene">
            <div class="glass-back"></div>
            <div class="glass-card" id="glassCard">
                <div class="light-flow"></div>
                <div class="sheen" id="sheen"></div>
                <div class="login-content">
                    <div class="login-badge">
                        <span class="badge-dot"></span>
                        欢迎回来
                    </div>
                    <h2 class="login-title">登录</h2>
                    <p class="login-desc">以语音与手势，开启你的动漫时空之旅</p>

                    <form id="loginForm" autocomplete="off">
                        <div class="form-group">
                            <label for="username">星图标识</label>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
                        </div>
                        <div class="form-group">
                            <label for="password">星云密钥</label>
                            <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required minlength="6">
                        </div>
                        <button type="submit" class="login-button">进入星云</button>
                    </form>
                    <a href="nebula-chronicle.html" class="guest-link">以游客身份浏览</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 角色数据
        const characters = [
            { file: 'violet-evergarden.png', name: '薇尔莉特 · 伊芙加登', year: '2019 萌王', quote: '在星云的彼端，邮差的花香依旧。', focus: '50% 28%', color: '#ff6b9d' },
            { file: 'akiyama-mio.jpg', name: '秋山澪', year: '2010 / 2011 萌王', quote: '低音拨动的瞬间，星辰也随节奏轻颤。', focus: '52% 32%', color: '#00f3ff' },
            { file: 'tachibana-kanade.jpg', name: '立华奏', year: '2012 萌王', quote: '天使的音符划过深空，化作永恒之光。', focus: '50% 30%', color: '#b026ff' },
            { file: 'shana.jpg', name: '夏娜', year: '2016 萌王', quote: '红莲之火点燃夜幕，灼眼的星辰为你引路。', focus: '50% 35%', color: '#ff2a6d' },
            { file: 'kato-megumi.jpg', name: '加藤惠', year: '2017 萌王', quote: '平凡的日常里，也藏着改变次元的奇迹。', focus: '46% 30%', color: '#ffe600' },
            { file: 'rem.jpg', name: '雷姆', year: '2018 萌王', quote: '蓝色的忠诚穿越星河，抵达你所在的彼岸。', focus: '50% 28%', color: '#00a8ff' },
            { file: 'elaina.jpg', name: '伊蕾娜', year: '2021 萌王', quote: '魔女乘着扫帚掠过星云，故事才刚刚开始。', focus: '48% 26%', color: '#7ee8fa' },
            { file: 'misaka-mikoto.jpg', name: '御坂美琴', year: '人气之王', quote: '超电磁炮的光芒，撕裂次元与你相遇。', focus: '46% 30%', color: '#ffcc00' }
        ];

        const characterDisplay = document.getElementById('characterDisplay');
        const characterInfo = document.getElementById('characterInfo');
        const characterYear = document.getElementById('characterYear');
        const characterName = document.getElementById('characterName');
        const characterQuote = document.getElementById('characterQuote');
        const indicators = document.getElementById('indicators');
        let currentSlide = 0;
        let slideInterval;

        function initSlideshow() {
            characters.forEach((char, index) => {
                const slide = document.createElement('div');
                slide.className = 'character-slide' + (index === 0 ? ' active' : '');

                const img = document.createElement('img');
                img.src = `images/login/${char.file}`;
                img.alt = char.name;
                img.loading = index === 0 ? 'eager' : 'lazy';
                img.style.objectPosition = char.focus || '50% 50%';
                slide.appendChild(img);
                characterDisplay.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'indicator' + (index === 0 ? ' active' : '');
                dot.setAttribute('aria-label', `切换到 ${char.name}`);
                dot.addEventListener('click', () => goToSlide(index));
                indicators.appendChild(dot);
            });
            updateInfo(0);
            startAutoPlay();
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.character-slide');
            const dots = document.querySelectorAll('.indicator');

            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');

            currentSlide = index;

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            updateInfo(currentSlide);

            resetAutoPlay();
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % characters.length);
        }

        function updateInfo(index) {
            const char = characters[index];
            characterInfo.classList.remove('visible');
            setTimeout(() => {
                characterYear.textContent = char.year;
                characterName.textContent = char.name;
                characterQuote.textContent = char.quote;
                characterYear.style.color = char.color;
                characterYear.style.borderColor = char.color;
                characterYear.style.background = `${char.color}1a`;
                characterYear.style.textShadow = `0 0 10px ${char.color}66`;
                characterInfo.classList.add('visible');
            }, 250);
        }

        function startAutoPlay() {
            slideInterval = setInterval(nextSlide, 6500);
        }

        function resetAutoPlay() {
            clearInterval(slideInterval);
            startAutoPlay();
        }

        // ===== 星点粒子 =====
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let width, height;
            const stars = [];
            const count = 180;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            class Star {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 1.8 + 0.3;
                    this.speedX = (Math.random() - 0.5) * 0.25;
                    this.speedY = (Math.random() - 0.5) * 0.25;
                    this.alpha = Math.random() * 0.6 + 0.2;
                    this.alphaSpeed = (Math.random() - 0.5) * 0.015;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.alpha += this.alphaSpeed;
                    if (this.alpha <= 0.1 || this.alpha >= 0.9) this.alphaSpeed *= -1;
                    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                    ctx.fill();
                }
            }

            resize();
            for (let i = 0; i < count; i++) stars.push(new Star());

            function animate() {
                ctx.clearRect(0, 0, width, height);
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            animate();
        }

        // ===== Liquid Glass 鼠标跟随高光 =====
        const card = document.getElementById('glassCard');
        const sheen = document.getElementById('sheen');
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let sheenRafId = null;

        function animateSheen() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            sheen.style.left = currentX + 'px';
            sheen.style.top = currentY + 'px';
            sheenRafId = requestAnimationFrame(animateSheen);
        }

        card.addEventListener('pointermove', (e) => {
            const rect = card.getBoundingClientRect();
            targetX = e.clientX - rect.left;
            targetY = e.clientY - rect.top;

            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            card.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
        }, { passive: true });

        card.addEventListener('pointerleave', () => {
            sheen.style.opacity = '0';
            card.style.transform = 'rotateY(0deg) rotateX(0deg)';
            if (sheenRafId) {
                cancelAnimationFrame(sheenRafId);
                sheenRafId = null;
            }
        });

        card.addEventListener('pointerenter', () => {
            sheen.style.opacity = '1';
            if (!sheenRafId) animateSheen();
        });

        // ===== 登录表单 =====
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return;

            sessionStorage.setItem('nebulaUser', username);
            window.location.href = 'nebula-chronicle.html';
        });

        // ===== 页面加载动画 =====
        window.addEventListener('load', () => {
            initStarfield();
            initSlideshow();

            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('scene').classList.add('ready');
            }, 600);
        });

        window.addEventListener('beforeunload', () => {
            clearInterval(slideInterval);
        });
    </script>
</body>
</html>
