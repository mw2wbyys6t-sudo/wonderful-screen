<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星云编年史 - 沉浸式动漫编年史入口">
    <title>星云编年史 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Space+Grotesk:wght@400;700&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050714;
            --bg-darker: #03030a;
            --neon-cyan: #00f3ff;
            --neon-purple: #b892ff;
            --neon-blue: #4da6ff;
            --neon-pink: #ff2a6d;
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.72);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-darker);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        /* ============================================================
           共享背景层
           ============================================================ */
        #space-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 45%, rgba(124, 77, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(77, 166, 255, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(184, 146, 255, 0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 35%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-darker) 100%);
        }

        #space-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/generated/nebula-bg.jpg') center/cover no-repeat;
            opacity: 0.45;
            mix-blend-mode: screen;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        .phase-entrance #bg-video {
            opacity: 1;
        }

        /* 动态光斑 */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: float 16s ease-in-out infinite;
        }

        .orb-1 {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, var(--neon-blue) 0%, rgba(45, 90, 245, 0.6) 70%, transparent 100%);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-purple) 0%, rgba(124, 77, 255, 0.5) 70%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #52d1c1 0%, rgba(0, 153, 204, 0.5) 70%, transparent 100%);
            top: 50%;
            left: 50%;
            margin-left: -160px;
            margin-top: -160px;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.22) 0%, rgba(45, 90, 245, 0.08) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            margin-left: -600px;
            margin-top: -600px;
            opacity: 0.18;
            animation-delay: -13s;
            animation-duration: 24s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.08); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(50px, 40px) scale(1.03); }
        }

        /* 星点画布 */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ============================================================
           顶部标题（贯穿 Phase 1/2）
           ============================================================ */
        .title-main {
            position: fixed;
            top: 16%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease, top 1s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }

        .phase-showcase .title-main,
        .phase-entrance .title-main {
            opacity: 1;
            top: 12%;
        }

        .title-main h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2.6rem);
            font-weight: 700;
            letter-spacing: 0.22em;
            color: #f5f5f7;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.35);
        }

        .title-main p {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: rgba(240, 240, 255, 0.72);
            margin-top: 10px;
            letter-spacing: 0.3em;
        }

        /* ============================================================
           Phase 0: 加载画面
           ============================================================ */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-darker);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-ring {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 28px;
        }

        .loading-ring::before,
        .loading-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .loading-ring::before {
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-purple);
            animation: spin 1.2s linear infinite;
        }

        .loading-ring::after {
            inset: 10px;
            border-bottom-color: var(--neon-cyan);
            border-left-color: var(--neon-purple);
            animation: spin 1.8s linear infinite reverse;
            opacity: 0.6;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            letter-spacing: 0.25em;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .loading-progress {
            width: 160px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            transition: width 0.3s ease;
        }

        .loading-watermark {
            position: absolute;
            bottom: 42px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.12);
        }

        /* ============================================================
           Phase 1: 琉璃玻璃角色展示
           ============================================================ */
        #showcase {
            position: fixed;
            inset: 0;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            pointer-events: none;
        }

        .phase-showcase #showcase {
            opacity: 1;
            visibility: visible;
        }

        .central-gate {
            position: absolute;
            top: 55%;
            left: 50%;
            width: 220px;
            height: 220px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, transparent 70%);
            box-shadow: 0 0 80px rgba(0, 243, 255, 0.15);
            animation: gatePulse 4s ease-in-out infinite;
        }

        @keyframes gatePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.08); opacity: 0.9; }
        }

        .central-gate::before {
            content: '';
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: gateRotate 20s linear infinite;
        }

        @keyframes gateRotate {
            to { transform: rotate(360deg); }
        }

        .character-card {
            position: absolute;
            width: 140px;
            height: 196px;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                0 0 30px rgba(0, 243, 255, 0.08);
            transform: scale(0) translate(-50%, -50%);
            transform-origin: top left;
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
        }

        .character-card.visible {
            opacity: 1;
            transform: scale(1) translate(-50%, -50%);
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            border-radius: 18px 18px 0 0;
            pointer-events: none;
            z-index: 2;
        }

        .character-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.92;
            filter: saturate(1.05) contrast(1.02);
        }

        .character-card .card-glow {
            position: absolute;
            inset: -10px;
            border-radius: 22px;
            opacity: 0.4;
            filter: blur(16px);
            z-index: -1;
        }

        /* ============================================================
           Phase 2: 入口界面
           ============================================================ */
        #entrance {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 12vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 1s ease;
            pointer-events: none;
        }

        .phase-entrance #entrance {
            opacity: 1;
            visibility: visible;
        }

        #enter-btn {
            pointer-events: auto;
            padding: 16px 52px;
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        #enter-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
            box-shadow: 0 8px 40px rgba(0, 243, 255, 0.2);
        }

        #enter-btn:active {
            transform: scale(0.98);
        }

        #enter-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s ease;
        }

        #enter-btn:hover::after {
            left: 100%;
        }

        .entrance-hint {
            margin-top: 18px;
            font-size: 12px;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
        }

        /* 点击过渡遮罩 */
        #transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: #fff;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 1s ease;
            pointer-events: none;
        }

        .transitioning #transition-overlay {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================================
           响应式
           ============================================================ */
        @media (max-width: 900px) {
            .character-card {
                width: 100px;
                height: 140px;
            }

            .central-gate {
                width: 160px;
                height: 160px;
            }

            .title-main h1 {
                letter-spacing: 0.12em;
            }
        }

        @media (max-width: 480px) {
            .character-card {
                width: 72px;
                height: 100px;
                border-radius: 12px;
            }

            .central-gate {
                width: 120px;
                height: 120px;
            }

            #enter-btn {
                padding: 14px 40px;
                font-size: 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 共享深空背景 -->
    <div id="space-bg"></div>

    <!-- 动态光斑 -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- 星点画布 -->
    <canvas id="starfield"></canvas>

    <!-- 背景视频（入口阶段显示） -->
    <video id="bg-video" autoplay muted loop playsinline poster="images/generated/nebula-bg.jpg"></video>

    <!-- Phase 0: 加载画面 -->
    <div id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">星云苏醒中</div>
        <div class="loading-progress">
            <div class="loading-progress-bar" id="loadingBar"></div>
        </div>
        <div class="loading-watermark">NEBULA CHRONICLE</div>
    </div>

    <!-- 标题 -->
    <div class="title-main">
        <h1>NEBULA CHRONICLE</h1>
        <p>星云编年史 · 探索二次元的次元之门</p>
    </div>

    <!-- Phase 1: 琉璃玻璃角色展示 -->
    <div id="showcase">
        <div class="central-gate"></div>
        <div id="card-container"></div>
    </div>

    <!-- Phase 2: 入口界面 -->
    <div id="entrance">
        <button id="enter-btn">开始旅程</button>
        <p class="entrance-hint">点击开启你的动漫时空之旅</p>
    </div>

    <!-- 过渡遮罩 -->
    <div id="transition-overlay"></div>

    <script>
        // ============================================================
        // 星云编年史 · 统一入口页（三阶段：加载 / 角色展示 / 入口）
        // ============================================================

        const CHARACTERS = [
            { file: 'violet-evergarden.png', name: '薇尔莉特 · 伊芙加登', color: '#b892ff' },
            { file: 'akiyama-mio.jpg', name: '秋山澪', color: '#ff9ec8' },
            { file: 'tachibana-kanade.jpg', name: '立华奏', color: '#c7f0ff' },
            { file: 'shana.jpg', name: '夏娜', color: '#ff4d4d' },
            { file: 'kato-megumi.jpg', name: '加藤惠', color: '#ffb7c5' },
            { file: 'rem.jpg', name: '雷姆', color: '#7fd3ff' },
            { file: 'elaina.jpg', name: '伊蕾娜', color: '#e8e8ff' },
            { file: 'misaka-mikoto.jpg', name: '御坂美琴', color: '#00bfff' }
        ];

        const IMAGE_BASE = 'images/login/';
        const VIDEOS = [
            'images/generated/nebula-trailer-v3-a.mp4',
            'images/generated/nebula-trailer-v3-b.mp4',
            'images/generated/nebula-trailer-v3-c.mp4'
        ];

        // DOM
        const body = document.body;
        const loadingEl = document.getElementById('loading');
        const loadingBar = document.getElementById('loadingBar');
        const cardContainer = document.getElementById('card-container');
        const bgVideo = document.getElementById('bg-video');
        const enterBtn = document.getElementById('enter-btn');
        const transitionOverlay = document.getElementById('transition-overlay');

        let currentVideo = 0;
        let autoPlayTimer = null;

        // ============================================================
        // 工具函数
        // ============================================================
        function setPhase(phase) {
            body.className = '';
            if (phase) body.classList.add(phase);
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        function isHttpProtocol() {
            return location.protocol === 'http:' || location.protocol === 'https:';
        }

        // ============================================================
        // 音效预配置（文件可能不存在，优雅降级）
        // ============================================================
        const audioMap = {};
        function loadAudio(url) {
            const audio = new Audio(url);
            audio.preload = 'auto';
            audioMap[url] = audio;
        }
        function playAudio(url, volume = 0.6) {
            const audio = audioMap[url];
            if (!audio) return;
            audio.currentTime = 0;
            audio.volume = volume;
            audio.play().catch(() => {});
        }
        loadAudio('audio/button-click.mp3');
        loadAudio('audio/card-appear.mp3');

        // ============================================================
        // 星点背景
        // ============================================================
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const stars = [];
            const count = Math.min(260, Math.floor((canvas.width * canvas.height) / 6500));
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.4 + 0.3,
                    opacity: Math.random() * 0.5 + 0.15,
                    speed: Math.random() * 0.25 + 0.04,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.03 + 0.01
                });
            }

            let frame = 0;
            let lastDraw = 0;
            function draw(now) {
                requestAnimationFrame(draw);
                if (now - lastDraw < 36) return;
                lastDraw = now;
                frame++;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }
                    const twinkle = Math.sin(frame * star.twinkleSpeed + star.twinkle) * 0.35 + 0.65;
                    const alpha = star.opacity * twinkle;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                });
            }
            draw(0);
        }

        // ============================================================
        // Phase 0: 预加载资源
        // ============================================================
        function preloadAssets(onProgress) {
            const assets = CHARACTERS.map(c => IMAGE_BASE + c.file);
            const video = document.createElement('video');
            const canPlayMp4 = video.canPlayType('video/mp4') !== '';

            let loaded = 0;
            const total = assets.length + (canPlayMp4 ? 1 : 0);

            function updateProgress() {
                loaded++;
                onProgress(loaded / total);
                if (loaded >= total) {
                    setTimeout(() => onProgress(1), 200);
                }
            }

            assets.forEach(src => {
                const img = new Image();
                img.onload = updateProgress;
                img.onerror = updateProgress;
                img.src = src;
            });

            // 预加载第一个视频（可选，HTTP/HTTPS 下）
            if (canPlayMp4 && isHttpProtocol()) {
                const v = document.createElement('video');
                v.preload = 'auto';
                v.muted = true;
                v.playsInline = true;
                v.oncanplaythrough = updateProgress;
                v.onerror = updateProgress;
                v.onstalled = () => setTimeout(updateProgress, 3000);
                v.src = VIDEOS[0];
                v.load();
                setTimeout(() => {
                    if (loaded < total) updateProgress();
                }, 4000);
            } else {
                updateProgress();
            }
        }

        // ============================================================
        // Phase 1: 创建角色玻璃卡片
        // ============================================================
        function createCharacterCards() {
            const W = window.innerWidth;
            const H = window.innerHeight;
            const radiusX = Math.min(W * 0.32, 360);
            const radiusY = Math.min(H * 0.22, 180);
            const centerX = W / 2;
            const centerY = H * 0.58;

            cardContainer.innerHTML = '';
            CHARACTERS.forEach((char, i) => {
                const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                const x = centerX + radiusX * Math.cos(angle);
                const y = centerY + radiusY * Math.sin(angle);

                const card = document.createElement('div');
                card.className = 'character-card';
                card.style.left = x + 'px';
                card.style.top = y + 'px';
                card.style.transitionDelay = (i * 0.12) + 's';

                const glow = document.createElement('div');
                glow.className = 'card-glow';
                glow.style.background = char.color;
                card.appendChild(glow);

                const img = document.createElement('img');
                img.src = IMAGE_BASE + char.file;
                img.alt = char.name;
                card.appendChild(img);

                cardContainer.appendChild(card);
            });

            return cardContainer.querySelectorAll('.character-card');
        }

        function startShowcaseAnimation() {
            const cards = createCharacterCards();
            const reduced = prefersReducedMotion();

            setPhase('phase-showcase');

            if (reduced) {
                cards.forEach(c => c.classList.add('visible'));
                setTimeout(enterEntrancePhase, 2000);
                return;
            }

            // 依次浮现卡片
            cards.forEach((card, i) => {
                setTimeout(() => {
                    card.classList.add('visible');
                    playAudio('audio/card-appear.mp3', 0.25);
                }, 300 + i * 180);
            });

            // 整体环绕旋转
            let rotation = 0;
            const W = window.innerWidth;
            const H = window.innerHeight;
            const radiusX = Math.min(W * 0.32, 360);
            const radiusY = Math.min(H * 0.22, 180);
            const centerX = W / 2;
            const centerY = H * 0.58;
            let rafId;

            function orbit() {
                rotation += 0.0015;
                cards.forEach((card, i) => {
                    const baseAngle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const angle = baseAngle + rotation;
                    const x = centerX + radiusX * Math.cos(angle);
                    const y = centerY + radiusY * Math.sin(angle);
                    const floatY = Math.sin(Date.now() * 0.001 + i) * 6;
                    card.style.left = x + 'px';
                    card.style.top = (y + floatY) + 'px';
                });
                rafId = requestAnimationFrame(orbit);
            }
            rafId = requestAnimationFrame(orbit);

            // 5.5 秒后进入入口阶段
            setTimeout(() => {
                cancelAnimationFrame(rafId);
                enterEntrancePhase();
            }, 6000);
        }

        // ============================================================
        // Phase 2: 入口界面
        // ============================================================
        function setupVideoCarousel() {
            if (!isHttpProtocol()) {
                bgVideo.style.display = 'none';
                return;
            }

            let idx = 0;
            let hasStarted = false;

            function playNext() {
                bgVideo.src = VIDEOS[idx];
                bgVideo.load();
                const playPromise = bgVideo.play();
                if (playPromise) {
                    playPromise.catch(err => {
                        console.warn('Video autoplay blocked:', err);
                        if (!hasStarted) bgVideo.style.display = 'none';
                    });
                }
                hasStarted = true;
            }

            function onVideoEnded() {
                idx = (idx + 1) % VIDEOS.length;
                bgVideo.style.opacity = '0';
                setTimeout(() => {
                    playNext();
                    bgVideo.style.opacity = '1';
                }, 800);
            }

            bgVideo.addEventListener('ended', onVideoEnded);
            bgVideo.addEventListener('error', () => {
                console.warn('Video error, hiding background video');
                bgVideo.style.display = 'none';
            });

            playNext();
        }

        function enterEntrancePhase() {
            setPhase('phase-entrance');
            setupVideoCarousel();
        }

        function onEnterClick() {
            playAudio('audio/button-click.mp3', 0.7);
            body.classList.add('transitioning');

            // 白屏后跳转
            setTimeout(() => {
                sessionStorage.setItem('nebulaUser', '旅人');
                window.location.href = 'nebula-chronicle.html';
            }, 1100);
        }

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            initStarfield();
            createCharacterCards();
            enterBtn.addEventListener('click', onEnterClick);

            preloadAssets(progress => {
                loadingBar.style.width = (progress * 100) + '%';
                if (progress >= 1) {
                    const minDelay = 2500 - (performance.now() - initStart);
                    setTimeout(() => {
                        loadingEl.classList.add('hidden');
                        startShowcaseAnimation();
                    }, Math.max(0, minDelay));
                }
            });
        }

        const initStart = performance.now();
        init();
    </script>
</body>
