<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星云编年史 - 沉浸式动漫编年史入口">
    <title>星云编年史 | Nebula Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Space+Grotesk:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #050714;
            --bg-darker: #03030a;
            --neon-cyan: #00f3ff;
            --neon-purple: #b892ff;
            --neon-blue: #4da6ff;
            --neon-pink: #ff2a6d;
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.72);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.35);
            --theme-color: #00f3ff;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        /* ============================================================
           共享背景层
           ============================================================ */
        #space-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 45%, rgba(124, 77, 255, 0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(77, 166, 255, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(184, 146, 255, 0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 35%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-darker) 100%);
            transition: opacity 0.8s ease;
        }

        #space-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/generated/nebula-bg.jpg') center/cover no-repeat;
            opacity: 0.4;
            mix-blend-mode: screen;
        }

        .mode-lightweight #space-bg {
            opacity: 0;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .mode-cinematic #bg-video {
            opacity: 1;
        }

        .mode-lightweight #bg-video {
            opacity: 0;
        }

        /* 动态光斑 */
        .ambient-light {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            transition: opacity 0.8s ease;
        }

        .mode-lightweight .ambient-light {
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: float 16s ease-in-out infinite;
        }

        .orb-1 {
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, var(--neon-blue) 0%, rgba(45, 90, 245, 0.6) 70%, transparent 100%);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--neon-purple) 0%, rgba(124, 77, 255, 0.5) 70%, transparent 100%);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #52d1c1 0%, rgba(0, 153, 204, 0.5) 70%, transparent 100%);
            top: 50%;
            left: 50%;
            margin-left: -160px;
            margin-top: -160px;
            animation-delay: -10s;
        }

        .orb-4 {
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.22) 0%, rgba(45, 90, 245, 0.08) 40%, transparent 70%);
            top: 50%;
            left: 50%;
            margin-left: -600px;
            margin-top: -600px;
            opacity: 0.18;
            animation-delay: -13s;
            animation-duration: 24s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -50px) scale(1.08); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(50px, 40px) scale(1.03); }
        }

        /* 星点画布 */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .mode-lightweight #starfield {
            opacity: 0.35;
        }

        /* ============================================================
           沉浸模式专属层
           ============================================================ */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .mode-cinematic #canvas-container {
            opacity: 1;
        }

        #canvas-container canvas {
            display: block;
        }

        #title-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .mode-cinematic #title-layer.visible {
            opacity: 1;
            transform: scale(1);
        }

        .mode-cinematic #title-layer.watermark {
            opacity: 0.38;
            transform: scale(0.85);
            filter: blur(0.5px);
        }

        #title-layer h1 {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-shadow:
                0 0 40px rgba(255, 255, 255, 0.3),
                0 0 80px rgba(0, 243, 255, 0.15);
            margin-bottom: 12px;
        }

        #title-layer .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--neon-cyan);
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            margin-bottom: 16px;
        }

        .title-ornament {
            width: min(520px, 72vw);
            height: auto;
            opacity: 0.85;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.25));
        }

        #title-layer .tagline {
            font-size: clamp(14px, 1.8vw, 20px);
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            opacity: 0.9;
        }

        .title-disc {
            position: absolute;
            width: min(520px, 80vw);
            height: min(260px, 40vw);
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: -1;
            transform: translateY(20px) rotateX(60deg);
            box-shadow:
                0 0 60px rgba(0, 243, 255, 0.1),
                inset 0 0 40px rgba(255, 255, 255, 0.05);
        }

        /* ============================================================
           轻量模式专属层
           ============================================================ */
        #slideshow {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .mode-lightweight #slideshow {
            opacity: 1;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
            will-change: opacity, transform;
        }

        .slide.active {
            opacity: 1;
        }

        .slide.active img {
            animation: kenburns 10s linear infinite alternate;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.12);
        }

        @keyframes kenburns {
            0% { transform: scale(1.08) translate(0, 0); }
            100% { transform: scale(1.18) translate(-1.5%, -1%); }
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
            background:
                radial-gradient(circle at 35% 40%, transparent 0%, rgba(3, 3, 10, 0.35) 45%, rgba(3, 3, 10, 0.8) 100%),
                linear-gradient(90deg, rgba(3, 3, 10, 0.1) 0%, rgba(3, 3, 10, 0.05) 40%, rgba(3, 3, 10, 0.6) 75%, rgba(3, 3, 10, 0.75) 100%),
                linear-gradient(180deg, rgba(3, 3, 10, 0.35) 0%, rgba(3, 3, 10, 0.05) 40%, rgba(3, 3, 10, 0.55) 100%);
        }

        .mode-lightweight .vignette {
            opacity: 1;
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .mode-lightweight #particle-canvas {
            opacity: 1;
        }

        /* ============================================================
           主场景：两种布局共享
           ============================================================ */
        .scene {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 min(5vw, 80px);
            perspective: 1200px;
            pointer-events: none;
        }

        /* 顶部标题 */
        .title-section {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .mode-lightweight .title-section,
        .mode-cinematic.login-ready .title-section {
            opacity: 1;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.4);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(0.85rem, 2.5vw, 1.05rem);
            color: rgba(240, 240, 255, 0.72);
            margin-top: 8px;
            letter-spacing: 4px;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.25); }
        }

        /* 左侧角色信息区（轻量/登录完成态） */
        .character-section {
            position: absolute;
            left: min(5vw, 80px);
            bottom: 100px;
            width: min(38vw, 460px);
            min-width: 280px;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: auto;
        }

        .mode-lightweight .character-section,
        .mode-cinematic.login-ready .character-section {
            opacity: 1;
            transform: translateX(0);
        }

        .character-info-card {
            background: rgba(3, 3, 10, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--theme-color);
            border-radius: 0 20px 20px 0;
            padding: 24px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            transition: border-color 0.6s ease;
        }

        .character-year {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--theme-color);
            text-shadow: 0 0 14px color-mix(in srgb, var(--theme-color) 60%, transparent);
            margin-bottom: 8px;
        }

        .character-name {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.6rem, 3.2vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .character-quote {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }

        /* 登录场景 */
        .login-scene {
            position: relative;
            width: min(42vw, 420px);
            min-width: 320px;
            opacity: 0;
            transform: translateY(40px) scale(0.96);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: auto;
        }

        .mode-cinematic .login-scene {
            opacity: 0;
            transform: translateY(60px);
        }

        .mode-cinematic.login-ready .login-scene,
        .mode-lightweight .login-scene {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .mode-lightweight .login-scene {
            margin-left: auto;
        }

        .mode-cinematic.login-ready .login-scene {
            margin-left: 0;
        }

        .glass-back {
            position: absolute;
            width: 92%;
            height: 94%;
            top: 12px;
            left: 4%;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
            transform: translateZ(-70px) rotateX(5deg);
        }

        .glass-card {
            position: relative;
            width: 100%;
            padding: 44px 38px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.35),
                0 0 36px color-mix(in srgb, var(--theme-color) 8%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.38) 0%,
                rgba(255, 255, 255, 0.08) 45%,
                transparent 75%
            );
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: -50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 255, 255, 0.04) 30deg,
                transparent 60deg,
                color-mix(in srgb, var(--theme-color) 6%, transparent) 90deg,
                transparent 120deg,
                rgba(255, 255, 255, 0.03) 150deg,
                transparent 180deg,
                color-mix(in srgb, var(--theme-color) 4%, transparent) 210deg,
                transparent 240deg,
                rgba(255, 255, 255, 0.02) 270deg,
                transparent 300deg,
                transparent 360deg
            );
            animation: lightRotate 14s linear infinite;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .glass-card:hover::after,
        .glass-card:focus-within::after {
            opacity: 1;
        }

        @keyframes lightRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sheen {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.18) 0%,
                color-mix(in srgb, var(--theme-color) 8%, transparent) 35%,
                transparent 70%
            );
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.45s ease;
            mix-blend-mode: overlay;
        }

        .glass-card:hover .sheen {
            opacity: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
        }

        .login-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--theme-color);
            box-shadow: 0 0 14px var(--theme-color);
            animation: pulse 2.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .login-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-group input:focus {
            border-color: var(--theme-color);
            background: rgba(0, 0, 0, 0.3);
            box-shadow:
                0 0 0 3px color-mix(in srgb, var(--theme-color) 12%, transparent),
                0 0 24px color-mix(in srgb, var(--theme-color) 30%, transparent);
        }

        .login-button {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(135deg, color-mix(in srgb, var(--theme-color) 22%, transparent), rgba(176, 38, 255, 0.18));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.35s ease;
            box-shadow:
                0 6px 24px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .login-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .login-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow:
                0 10px 36px color-mix(in srgb, var(--theme-color) 22%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .login-button .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .guest-link:hover {
            color: var(--neon-cyan);
        }

        /* 轮播指示器 */
        .slide-indicators {
            position: absolute;
            bottom: 42px;
            left: 42px;
            display: flex;
            gap: 10px;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .mode-lightweight .slide-indicators,
        .mode-cinematic.login-ready .slide-indicators {
            opacity: 1;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: var(--theme-color);
            box-shadow: 0 0 12px var(--theme-color);
            transform: scale(1.4);
        }

        /* ============================================================
           控制按钮
           ============================================================ */
        #mode-toggle, #audio-toggle, #skip-btn {
            position: fixed;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.25);
            color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #mode-toggle:hover, #audio-toggle:hover, #skip-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        #mode-toggle {
            top: 28px;
            left: 28px;
            padding: 10px 18px;
            border-radius: 100px;

    <script>

        (function() {

    <script>
        // ============================================================

        const CHARACTERS = [

            { file: 'rem.jpg', name: '雷姆', year: '2018 世萌萌王', color: '#7fd3ff', quote: '雷姆相信昴。', focus: '50% 28%' },
            { file: 'elaina.jpg', name: '伊蕾娜', year: '2021 世萌萌王', color: '#e8e8ff', quote: '请问有什么委托吗？', focus: '48% 26%' },
            { file: 'misaka-mikoto.jpg', name: '御坂美琴', year: '人气之王', color: '#00bfff', quote: '你指尖跃动的电光，是我此生不变的信仰。', focus: '46% 30%' }

        const DURATION = {

        };

        // 状态
        let currentMode = 'cinematic';
        let scene3D, camera, renderer;
        let cards3D = [];
        let constellationLines, vortexParticles, centralGlow, magicCircle, burstParticles;
        let masterTimeline;
        let isSkipped = false;
        let rafId;
        let reducedMotion = false;
        let webglFailed = false;
        let slideInterval;
        let currentSlide = 0;

        // DOM
        const body = document.body;
        const loadingEl = document.getElementById('loading');
        const modeToggle = document.getElementById('mode-toggle');
        const audioToggle = document.getElementById('audio-toggle');
        const skipBtn = document.getElementById('skip-btn');
        const titleLayer = document.getElementById('title-layer');
        const characterInfoCard = document.getElementById('characterInfoCard');
        const characterYear = document.getElementById('characterYear');
        const characterName = document.getElementById('characterName');
        const characterQuote = document.getElementById('characterQuote');
        const indicators = document.getElementById('indicators');
        const slideshow = document.getElementById('slideshow');
        const glassCard = document.getElementById('glassCard');
        const sheen = document.getElementById('sheen');
        const loginForm = document.getElementById('loginForm');
        const guestLink = document.getElementById('guestLink');
        const rootStyle = document.documentElement.style;

        // 共享纹理
        let particleTexture, magicCircleTexture;

        // ============================================================
        // 工具函数
        // ============================================================
        function isWebGLAvailable() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl2') || canvas.getContext('webgl')));
            } catch (e) {
                return false;
            }
        }

        function prefersReducedMotion() {
            return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        function isMobile() {
            return window.innerWidth < 900 || /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        }

        // ============================================================
        // 程序化环境音乐
        // ============================================================
        function initAudio() {
            if (audioNodes) return;
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;

            const ctx = new AudioCtx();
            const master = ctx.createGain();
            master.gain.value = 0;
            master.connect(ctx.destination);

            const drones = [
                { freq: 55, gain: 0.12, type: 'sine' },
                { freq: 110, gain: 0.06, type: 'triangle' },
                { freq: 220, gain: 0.03, type: 'sine' }
            ];

            const oscillators = [];
            const gains = [];

            drones.forEach(d => {
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = d.type;
                osc.frequency.value = d.freq;
                g.gain.value = d.gain;
                osc.connect(g);
                g.connect(master);
                osc.start();
                oscillators.push(osc);
                gains.push(g);
            });

            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.08;
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain);
            lfoGain.connect(master.gain);
            lfo.start();

            const delay = ctx.createDelay();
            delay.delayTime.value = 0.45;
            const delayGain = ctx.createGain();
            delayGain.gain.value = 0.25;
            master.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(ctx.destination);

            audioNodes = { ctx, master, oscillators, gains, lfo, lfoGain, delay, delayGain };
        }

        function toggleAudio() {
            if (!audioNodes) initAudio();
            if (!audioNodes) return;

            audioMuted = !audioMuted;
            audioToggle.setAttribute('aria-pressed', !audioMuted);
            audioToggle.textContent = audioMuted ? '♪' : '♫';

            const now = audioNodes.ctx.currentTime;
            if (!audioMuted) {
                audioNodes.ctx.resume();
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0.3, now + 2.5);
            } else {
                audioNodes.master.gain.cancelScheduledValues(now);
                audioNodes.master.gain.linearRampToValueAtTime(0, now + 0.8);
            }
        }

        // ============================================================
        // 星点背景（两种模式都可用）
        // ============================================================
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let starRafId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const stars = [];
            const count = Math.min(260, Math.floor((canvas.width * canvas.height) / 6500));

            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.4 + 0.3,
                    opacity: Math.random() * 0.5 + 0.15,
                    speed: Math.random() * 0.25 + 0.04,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.03 + 0.01
                });
            }

            let frame = 0;
            let lastDraw = 0;
            function draw(now) {
                starRafId = requestAnimationFrame(draw);
                if (reducedMotion || currentMode === 'lightweight') return;
                if (now - lastDraw < 36) return;
                lastDraw = now;
                frame++;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (Math.random() < 0.012) createShootingStar(ctx, canvas);

                stars.forEach(star => {
                    star.y -= star.speed;
                    if (star.y < 0) {
                        star.y = canvas.height;
                        star.x = Math.random() * canvas.width;
                    }

                    const twinkle = Math.sin(frame * star.twinkleSpeed + star.twinkle) * 0.35 + 0.65;
                    const alpha = star.opacity * twinkle;

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();

                    if (star.size > 1.1) {
                        ctx.save();
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(star.x - star.size * 2, star.y);
                        ctx.lineTo(star.x + star.size * 2, star.y);
                        ctx.moveTo(star.x, star.y - star.size * 2);
                        ctx.lineTo(star.x, star.y + star.size * 2);
                        ctx.stroke();
                        ctx.restore();
                    }
                });
            }
            draw(0);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(starRafId);
                } else {
                    draw(0);
                }
            });
        }

        function createShootingStar(ctx, canvas) {
            const startX = Math.random() * canvas.width;
            const startY = Math.random() * canvas.height * 0.4;
            const length = Math.random() * 60 + 40;
            const angle = Math.PI / 4;
            let progress = 0;

            function drawTrail() {
                progress += 6;
                if (progress > length + 20) return;

                const x = startX + Math.cos(angle) * progress;
                const y = startY + Math.sin(angle) * progress;
                const tailX = x - Math.cos(angle) * length;
                const tailY = y - Math.sin(angle) * length;

                const gradient = ctx.createLinearGradient(tailX, tailY, x, y);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.9)');

                ctx.save();
                ctx.globalAlpha = Math.max(0, 1 - progress / (length + 20));
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.restore();

                requestAnimationFrame(drawTrail);
            }
            drawTrail();
        }

        // ============================================================
        // 轻量模式：轮播与粒子
        // ============================================================
        function initLightweight() {
            // 轮播
            CHARACTERS.forEach((char, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide' + (index === 0 ? ' active' : '');

                const img = document.createElement('img');
                img.src = IMAGE_BASE + char.file;
                img.alt = char.name;
                img.loading = index === 0 ? 'eager' : 'lazy';
                img.style.objectPosition = char.focus || '50% 50%';
                slide.appendChild(img);

                slideshow.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'indicator' + (index === 0 ? ' active' : '');
                dot.setAttribute('aria-label', `切换到 ${char.name}`);
                dot.addEventListener('click', () => goToSlide(index));
                indicators.appendChild(dot);
            });

            updateCharacterInfo(0, true);
            startAutoPlay();

            // 粒子
            initLightweightParticles();
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.indicator');

            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');

            currentSlide = index;

            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            updateCharacterInfo(currentSlide);

            resetAutoPlay();
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % CHARACTERS.length);
        }

        function updateCharacterInfo(index, initial = false) {
            const char = CHARACTERS[index];
            rootStyle.setProperty('--theme-color', char.color);

            if (initial) {
                characterYear.textContent = char.year;
                characterName.textContent = char.name;
                characterQuote.textContent = `「${char.quote}」`;
                return;
            }

            characterInfoCard.classList.remove('visible');
            setTimeout(() => {
                characterYear.textContent = char.year;
                characterName.textContent = char.name;
                characterQuote.textContent = `「${char.quote}」`;
                characterInfoCard.classList.add('visible');
            }, 400);
        }

        function startAutoPlay() {
            slideInterval = setInterval(nextSlide, 6000);
        }

        function resetAutoPlay() {
            clearInterval(slideInterval);
            startAutoPlay();
        }

        function initLightweightParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particleRafId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize, { passive: true });

            const particles = [];
            const count = Math.min(160, Math.floor((canvas.width * canvas.height) / 10000));

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.5 + 0.1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }

            let frame = 0;
            function draw() {
                particleRafId = requestAnimationFrame(draw);
                frame++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;

                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    const twinkle = Math.sin(frame * 0.02 + p.twinkle) * 0.3 + 0.7;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity * twinkle})`;
                    ctx.fill();
                });
            }
            draw();

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(particleRafId);
                } else {
                    draw();
                }
            });
        }

        // ============================================================
        // Three.js 沉浸场景
        // ============================================================
        function initThree() {
            const container = document.getElementById('canvas-container');

            scene3D = new THREE.Scene();
            scene3D.fog = new THREE.FogExp2(0x050714, 0.02);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 14);

            const maxDpr = window.innerWidth < 768 ? 1.5 : 2;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxDpr));
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            renderer.domElement.addEventListener('webglcontextlost', (e) => {
                e.preventDefault();
                cancelAnimationFrame(rafId);
                webglFailed = true;
                switchMode('lightweight', true);
            });

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
            scene3D.add(ambientLight);

            const pointLight = new THREE.PointLight(0x4da6ff, 1.2, 50);
            pointLight.position.set(0, 0, 8);
            scene3D.add(pointLight);

            const rimLight = new THREE.PointLight(0xb892ff, 0.8, 50);
            rimLight.position.set(-10, 5, 5);
            scene3D.add(rimLight);

            const glowGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0x4da6ff, transparent: true, opacity: 0.3 });
            centralGlow = new THREE.Mesh(glowGeo, glowMat);
            centralGlow.scale.set(0, 0, 0);
            scene3D.add(centralGlow);

            magicCircleTexture = new THREE.TextureLoader().load('images/generated/magic-circle.jpg');
            magicCircleTexture.encoding = THREE.sRGBEncoding;
            const magicMat = new THREE.SpriteMaterial({
                map: magicCircleTexture,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending,
                color: 0x88ccff
            });
            magicCircle = new THREE.Sprite(magicMat);
            magicCircle.scale.set(0, 0, 0);
            scene3D.add(magicCircle);

            particleTexture = new THREE.TextureLoader().load('images/effects/particle-glow.png');
            particleTexture.encoding = THREE.sRGBEncoding;

            initCards();

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function createCard(char, index, texture) {
            const group = new THREE.Group();
            const geometry = new THREE.PlaneGeometry(2.2, 3.2, 1, 1);

            const material = new THREE.MeshPhysicalMaterial({
                map: texture,
                color: 0xffffff,
                metalness: 0.05,
                roughness: 0.12,
                clearcoat: 1.0,
                clearcoatRoughness: 0.08,
                transparent: true,
                opacity: 0,
                side: THREE.DoubleSide,
                emissive: new THREE.Color(char.color),
                emissiveIntensity: 0.06,
                envMapIntensity: 1.0,
                transmission: 0.55,
                thickness: 1.2,
                ior: 1.5
            });

            const card = new THREE.Mesh(geometry, material);
            group.add(card);

            const borderGeo = new THREE.PlaneGeometry(2.35, 3.35, 1, 1);
            const borderMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(char.color),
                transparent: true,
                opacity: 0.25,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending
            });
            const border = new THREE.Mesh(borderGeo, borderMat);
            border.position.z = -0.02;
            group.add(border);

            const glowGeo = new THREE.PlaneGeometry(3.0, 4.0, 1, 1);
            const glowMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(char.color),
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.z = -0.1;
            group.add(glow);

            group.userData = {
                index, color: char.color, name: char.name,
                cardMesh: card, borderMesh: border, glowMesh: glow
            };

            group.scale.set(0, 0, 0);
            group.visible = false;

            return group;
        }

        function initCards() {
            const loader = new THREE.TextureLoader();
            CHARACTERS.forEach((char, index) => {
                const texture = loader.load(IMAGE_BASE + char.file);
                texture.encoding = THREE.sRGBEncoding;
                const card = createCard(char, index, texture);
                cards3D.push(card);
                scene3D.add(card);
            });
        }

        function initConstellationLines() {
            const material = new THREE.LineBasicMaterial({
                color: 0x00f3ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending
            });
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(8 * 3 * 2);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            constellationLines = new THREE.LineSegments(geometry, material);
            scene3D.add(constellationLines);
        }

        function updateConstellationLines() {
            if (!constellationLines) return;
            const positions = constellationLines.geometry.attributes.position.array;
            for (let i = 0; i < cards3D.length; i++) {
                const current = cards3D[i];
                const next = cards3D[(i + 1) % cards3D.length];
                const idx = i * 6;
                positions[idx] = current.position.x;
                positions[idx + 1] = current.position.y;
                positions[idx + 2] = current.position.z;
                positions[idx + 3] = next.position.x;
                positions[idx + 4] = next.position.y;
                positions[idx + 5] = next.position.z;
            }
            constellationLines.geometry.attributes.position.needsUpdate = true;
        }

        function initVortex() {
            const particleCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const basePositions = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0x4da6ff),
                new THREE.Color(0xb892ff),
                new THREE.Color(0xffffff),
                new THREE.Color(0x00f3ff)
            ];

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 8 + 0.5;
                const height = (Math.random() - 0.5) * 4;

                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = height;
                positions[i * 3 + 2] = Math.sin(angle) * radius;

                basePositions[i * 3] = positions[i * 3];
                basePositions[i * 3 + 1] = height;
                basePositions[i * 3 + 2] = positions[i * 3 + 2];

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                sizes[i] = Math.random() * 0.12 + 0.03;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.userData = { basePositions };

            const material = new THREE.PointsMaterial({
                size: 0.14, map: particleTexture, vertexColors: true,
                transparent: true, opacity: 0, blending: THREE.AdditiveBlending,
                depthWrite: false, sizeAttenuation: true
            });

            vortexParticles = new THREE.Points(geometry, material);
            vortexParticles.visible = false;
            scene3D.add(vortexParticles);
        }

        function resetVortex() {
            if (!vortexParticles) return;
            const positions = vortexParticles.geometry.attributes.position.array;
            const base = vortexParticles.geometry.userData.basePositions;
            for (let i = 0; i < positions.length; i++) positions[i] = base[i];
            vortexParticles.geometry.attributes.position.needsUpdate = true;
        }

        function updateVortex(time, intensity = 1) {
            if (!vortexParticles || !vortexParticles.visible) return;
            const positions = vortexParticles.geometry.attributes.position.array;
            const count = positions.length / 3;

            for (let i = 0; i < count; i++) {
                const idx = i * 3;
                let x = positions[idx];
                let z = positions[idx + 2];
                const radius = Math.sqrt(x * x + z * z);
                let angle = Math.atan2(z, x);

                angle += 0.03 * intensity;
                const shrink = radius > 0.3 ? radius * (0.992 - 0.004 * intensity) : radius;

                positions[idx] = Math.cos(angle) * shrink;
                positions[idx + 1] *= 0.995;
                positions[idx + 2] = Math.sin(angle) * shrink;
            }
            vortexParticles.geometry.attributes.position.needsUpdate = true;
            vortexParticles.rotation.y = time * 0.15;
        }

        // ============================================================
        // 动画编排
        // ============================================================
        function getCardOrbitPosition(index, total, radius, yOffset = 0) {
            const positions = [
                { angle: -Math.PI / 2, r: 1.0, yMul: 0.15 },
                { angle: 0, r: 1.0, yMul: 0 },
                { angle: Math.PI / 2, r: 1.0, yMul: -0.15 },
                { angle: Math.PI, r: 1.0, yMul: 0 },
                { angle: -Math.PI / 4, r: 1.18, yMul: 0.08 },
                { angle: Math.PI / 4, r: 1.18, yMul: -0.08 },
                { angle: 3 * Math.PI / 4, r: 1.18, yMul: -0.08 },
                { angle: -3 * Math.PI / 4, r: 1.18, yMul: 0.08 }
            ];
            const p = positions[index % positions.length];
            return {
                x: Math.cos(p.angle) * radius * p.r,
                y: yOffset + Math.sin(p.angle) * radius * p.yMul,
                z: Math.sin(p.angle) * radius * p.r,
                rotY: -p.angle,
                rotX: 0.08
            };
        }

        function getCardRingPosition(index, total, radius) {
            const angle = (index / total) * Math.PI * 2 - Math.PI / 2;
            return {
                x: Math.cos(angle) * radius,
                y: Math.sin(angle) * radius * 0.55,
                z: -2.8,
                rotY: -angle * 0.35 + Math.PI,
                rotX: 0
            };
        }

        function buildTimeline() {
            const tl = gsap.timeline({
                onComplete: () => {
                    if (!isSkipped) enterLoginReadyState();
                }
            });
            masterTimeline = tl;

            if (reducedMotion) {
                tl.call(enterLoginReadyState, null, 0.2);
                return tl;
            }

            const t0 = 0;
            tl.to(centralGlow.scale, { x: 1.5, y: 1.5, z: 1.5, duration: DURATION.nebulaAwake, ease: 'power2.inOut' }, t0);
            tl.to(centralGlow.material, { opacity: 0.6, duration: DURATION.nebulaAwake, ease: 'power2.inOut' }, t0);

            const t2 = t0 + DURATION.nebulaAwake;
            cards3D.forEach((card, i) => {
                const stagger = i * 0.08;
                tl.call(() => { card.visible = true; }, null, t2 + stagger);
                tl.to(card.scale, { x: 1, y: 1, z: 1, duration: DURATION.glassForm, ease: 'back.out(1.4)' }, t2 + stagger);
                tl.to(card.userData.cardMesh.material, { opacity: 0.96, duration: DURATION.glassForm * 0.6, ease: 'power2.out' }, t2 + stagger);
            });

            const t3 = t2 + DURATION.glassForm + 0.4;
            cards3D.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards3D.length, 4.5, 0);
                tl.to(card.position, { x: target.x, y: target.y, z: target.z, duration: DURATION.characterAwake, ease: 'power3.out' }, t3);
                tl.to(card.rotation, { y: target.rotY, x: target.rotX, duration: DURATION.characterAwake, ease: 'power3.out' }, t3);
            });

            const t4 = t3 + DURATION.characterAwake;
            tl.to(constellationLines.material, { opacity: 0.6, duration: DURATION.starChartExpand * 0.4, ease: 'power2.out' }, t4);
            tl.to(magicCircle.material, { opacity: 0.55, duration: DURATION.starChartExpand * 0.5, ease: 'power2.out' }, t4 + 0.3);
            tl.to(magicCircle.scale, { x: 5, y: 5, z: 5, duration: DURATION.starChartExpand, ease: 'sine.out' }, t4 + 0.3);
            cards3D.forEach((card, i) => {
                const target = getCardOrbitPosition(i, cards3D.length, 5.5, 0);
                tl.to(card.position, { x: target.x, y: target.y, z: target.z, duration: DURATION.starChartExpand, ease: 'sine.inOut' }, t4);
            });

            const t5 = t4 + DURATION.starChartExpand;
            tl.to(constellationLines.material, { opacity: 0, duration: DURATION.scatter * 0.5, ease: 'power2.in' }, t5);
            tl.to(magicCircle.material, { opacity: 0, duration: DURATION.scatter, ease: 'power2.in' }, t5);
            cards3D.forEach((card, i) => {
                const stagger = i * 0.05;
                const scatterAngle = (i / cards3D.length) * Math.PI * 2;
                const scatterRadius = 9 + Math.random() * 2;
                tl.to(card.position, { x: Math.cos(scatterAngle) * scatterRadius, y: (Math.random() - 0.5) * 5, z: Math.sin(scatterAngle) * scatterRadius, duration: DURATION.scatter, ease: 'power3.out' }, t5 + stagger);
                tl.to(card.rotation, { y: Math.PI * 3 + scatterAngle, z: 0.3, duration: DURATION.scatter, ease: 'power3.out' }, t5 + stagger);
                tl.to(card.scale, { x: 0.1, y: 0.1, z: 0.1, duration: DURATION.scatter * 0.7, ease: 'power3.in' }, t5 + stagger * 0.5);
                tl.to(card.userData.cardMesh.material, { opacity: 0, duration: DURATION.scatter * 0.5, ease: 'power2.in' }, t5 + DURATION.scatter * 0.4 + stagger);
            });

            const t6 = t5 + DURATION.scatter + 0.2;
            tl.call(() => { resetVortex(); vortexParticles.visible = true; centralGlow.material.color.setHex(0xffffff); }, null, t6);
            tl.to(vortexParticles.material, { opacity: 0.85, duration: DURATION.vortex * 0.4, ease: 'power2.out' }, t6);
            tl.to(centralGlow.scale, { x: 4, y: 4, z: 4, duration: DURATION.vortex, ease: 'power2.out' }, t6);
            tl.to(centralGlow.material, { opacity: 0.75, duration: DURATION.vortex, ease: 'power2.out' }, t6);
            tl.to(vortexParticles.material, { opacity: 0, duration: DURATION.vortex * 0.6, ease: 'power2.in' }, t6 + DURATION.vortex * 0.5);
            tl.to(centralGlow.scale, { x: 0.1, y: 0.1, z: 0.1, duration: 0.8, ease: 'power2.in' }, t6 + DURATION.vortex * 0.7);

            const t7 = t6 + DURATION.vortex + 0.3;
            tl.call(() => {
                titleLayer.classList.add('visible');
                setTimeout(() => titleLayer.classList.add('watermark'), 1200);
            }, null, t7);

            return tl;
        }

        function enterLoginReadyState() {
            loginReady = true;
            body.classList.add('login-ready');
            skipBtn.classList.remove('visible');

            // 角色卡片凝聚为守护星座环
            cards3D.forEach((card, i) => {
                card.visible = true;
                card.userData.isRing = true;
                const target = getCardRingPosition(i, cards3D.length, 5.2);
                card.userData.ringRadius = 5.2;
                card.userData.ringAngle = (i / cards3D.length) * Math.PI * 2 - Math.PI / 2;
                card.userData.ringY = target.y;

                gsap.to(card.position, { x: target.x, y: target.y, z: target.z, duration: DURATION.ringForm, ease: 'power3.out' });
                gsap.to(card.rotation, { y: target.rotY, x: target.rotX, z: 0, duration: DURATION.ringForm, ease: 'power3.out' });
                gsap.to(card.scale, { x: 0.68, y: 0.68, z: 0.68, duration: DURATION.ringForm, ease: 'power3.out' });
                gsap.to(card.userData.cardMesh.material, { opacity: 0.95, duration: DURATION.ringForm * 0.6, ease: 'power2.out' });
                gsap.to(card.userData.borderMesh.material, { opacity: 0.35, duration: DURATION.ringForm, ease: 'power2.out' });
                gsap.to(card.userData.glowMesh.material, { opacity: 0.16, duration: DURATION.ringForm, ease: 'power2.out' });
            });

            if (constellationLines) constellationLines.visible = false;
            if (vortexParticles) vortexParticles.visible = false;
            if (centralGlow) {
                gsap.to(centralGlow.scale, { x: 0.3, y: 0.3, z: 0.3, duration: 1.5 });
                gsap.to(centralGlow.material, { opacity: 0.25, duration: 1.5 });
            }

            updateCharacterInfo(currentSlide, true);
        }

        function skipAnimation() {
            if (isSkipped) return;
            isSkipped = true;
            if (masterTimeline) masterTimeline.kill();
            gsap.killTweensOf(cards3D);
            gsap.killTweensOf([centralGlow, magicCircle, vortexParticles?.material, constellationLines?.material]);
            enterLoginReadyState();
        }

        // ============================================================
        // 渲染循环
        // ============================================================
        function animate() {
            rafId = requestAnimationFrame(animate);
            if (document.hidden || currentMode !== 'cinematic' || !renderer) return;

            const time = performance.now() * 0.001;

            cards3D.forEach((card, i) => {
                if (!card.visible) return;

                if (loginReady && card.userData.isRing) {
                    const baseY = card.userData.ringY || card.position.y;
                    const angle = card.userData.ringAngle + time * 0.06;
                    card.position.x = Math.cos(angle) * card.userData.ringRadius;
                    card.position.y = baseY + Math.sin(time * 0.5 + i) * 0.06;
                    card.position.z = -2.8 + Math.sin(angle * 0.5) * 0.25;
                    card.rotation.y = -angle * 0.35 + Math.PI + Math.sin(time * 0.3 + i) * 0.03;
                } else {
                    card.position.y += Math.sin(time * 0.8 + i) * 0.002;
                    card.rotation.y += 0.002;
                }
            });

            if (magicCircle && magicCircle.visible && magicCircle.material.opacity > 0) {
                magicCircle.material.rotation += 0.003;
            }

            if (constellationLines && constellationLines.material.opacity > 0) {
                updateConstellationLines();
            }

            updateVortex(time, 1.5);
            updateBurst();

            renderer.render(scene3D, camera);
        }

        // ============================================================
        // 登录成功粒子爆发
        // ============================================================
        function createLoginBurst() {
            const count = 120;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const opacities = new Float32Array(count);

            const colorPalette = [new THREE.Color(0x00f3ff), new THREE.Color(0xb892ff), new THREE.Color(0xffffff)];

            for (let i = 0; i < count; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = 0;

                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = Math.random() * 0.15 + 0.05;
                velocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
                velocities[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed;
                velocities[i * 3 + 2] = Math.cos(phi) * speed;

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
                opacities[i] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.18, map: particleTexture, vertexColors: true,
                transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false
            });

            burstParticles = new THREE.Points(geometry, material);
            burstParticles.userData = { velocities, opacities, life: 0 };
            scene3D.add(burstParticles);
        }

        function updateBurst() {
            if (!burstParticles) return;
            const positions = burstParticles.geometry.attributes.position.array;
            const velocities = burstParticles.userData.velocities;
            const opacities = burstParticles.userData.opacities;
            burstParticles.userData.life++;

            let alive = false;
            for (let i = 0; i < opacities.length; i++) {
                if (opacities[i] <= 0.01) continue;
                alive = true;
                positions[i * 3] += velocities[i * 3];
                positions[i * 3 + 1] += velocities[i * 3 + 1];
                positions[i * 3 + 2] += velocities[i * 3 + 2];
                opacities[i] *= 0.96;
            }

            burstParticles.geometry.attributes.position.needsUpdate = true;
            burstParticles.material.opacity = Math.max(...opacities);

            if (!alive || burstParticles.userData.life > 120) {
                scene3D.remove(burstParticles);
                burstParticles.geometry.dispose();
                burstParticles.material.dispose();
                burstParticles = null;
            }
        }

        // ============================================================
        // 模式切换
        // ============================================================
        function switchMode(mode, force = false) {
            if (currentMode === mode && !force) return;
            currentMode = mode;
            body.className = mode === 'cinematic' ? 'mode-cinematic' : 'mode-lightweight';
            modeToggle.textContent = mode === 'cinematic' ? '轻量模式' : '沉浸动画';

            // 背景视频控制
            const bgVideo = document.getElementById('bg-video');
            if (bgVideo) {
                if (mode === 'cinematic') {
                    bgVideo.play().catch(() => {});
                } else {
                    bgVideo.pause();
                }
            }

            if (mode === 'lightweight') {
                // 停止沉浸动画
                if (masterTimeline) masterTimeline.kill();
                gsap.killTweensOf(cards3D);
                isSkipped = true;
                skipBtn.classList.remove('visible');

                // 显示登录 UI
                body.classList.add('login-ready');
                loginReady = true;

                // 初始化轻量资源（首次）
                if (!slideshow.hasChildNodes()) {
                    initLightweight();
                }

                // 重置当前角色信息
                updateCharacterInfo(currentSlide, true);
            } else {
                // 切回沉浸：重新加载页面最简单，避免状态混乱
                location.reload();
            }
        }

        // ============================================================
        // 登录交互
        // ============================================================
        function initLoginInteraction() {
            // 鼠标跟随高光
            let targetX = 0, targetY = 0;
            let currentX = 0, currentY = 0;
            let sheenRafId = null;

            function animateSheen() {
                currentX += (targetX - currentX) * 0.12;
                currentY += (targetY - currentY) * 0.12;
                sheen.style.left = currentX + 'px';
                sheen.style.top = currentY + 'px';
                sheenRafId = requestAnimationFrame(animateSheen);
            }

            glassCard.addEventListener('pointerenter', () => {
                sheen.style.opacity = '1';
                if (!sheenRafId) animateSheen();
            });

            glassCard.addEventListener('pointerleave', () => {
                sheen.style.opacity = '0';
                glassCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
                if (sheenRafId) {
                    cancelAnimationFrame(sheenRafId);
                    sheenRafId = null;
                }
            });

            glassCard.addEventListener('pointermove', (e) => {
                const rect = glassCard.getBoundingClientRect();
                targetX = e.clientX - rect.left;
                targetY = e.clientY - rect.top;

                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                glassCard.style.transform = `rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
            }, { passive: true });

            // 输入框主题色循环
            const inputs = loginForm.querySelectorAll('input');
            let themeIndex = 0;
            let themeInterval = null;

            function cycleThemeColor() {
                const char = CHARACTERS[themeIndex % CHARACTERS.length];
                rootStyle.setProperty('--theme-color', char.color);
                themeIndex++;
            }

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    cycleThemeColor();
                    if (!themeInterval) themeInterval = setInterval(cycleThemeColor, 1200);
                });
                input.addEventListener('blur', () => {
                    clearInterval(themeInterval);
                    themeInterval = null;
                    rootStyle.setProperty('--theme-color', CHARACTERS[currentSlide].color);
                });
            });

            // 按钮涟漪
            const btn = loginForm.querySelector('.login-button');
            btn.addEventListener('click', (e) => {
                const rect = btn.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });

            // 提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    alert('请输入用户名和密码');
                    return;
                }
                if (password.length < 6) {
                    alert('密码长度不能少于 6 位');
                    return;
                }

                btn.disabled = true;
                btn.textContent = '星门开启中…';

                if (currentMode === 'cinematic' && scene3D) createLoginBurst();

                setTimeout(() => {
                    sessionStorage.setItem('nebulaUser', username);
                    window.location.href = 'nebula-chronicle.html';
                }, 900);
            });

            guestLink.addEventListener('click', (e) => {
                e.preventDefault();
                if (currentMode === 'cinematic' && scene3D) createLoginBurst();
                setTimeout(() => {
                    sessionStorage.setItem('nebulaUser', '游客');
                    window.location.href = 'nebula-chronicle.html';
                }, 600);
            });
        }

        // ============================================================
        // 初始化
        // ============================================================
        async function init() {
            reducedMotion = prefersReducedMotion();
            initStarfield();
            initLoginInteraction();

            modeToggle.addEventListener('click', () => {
                switchMode(currentMode === 'cinematic' ? 'lightweight' : 'cinematic');
            });
            audioToggle.addEventListener('click', toggleAudio);
            skipBtn.addEventListener('click', skipAnimation);

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && skipBtn.classList.contains('visible')) {
                    e.preventDefault();
                    skipAnimation();
                }
            });

            // 判断默认模式
            const shouldUseLightweight = reducedMotion || isMobile() || !isWebGLAvailable();

            if (shouldUseLightweight) {
                switchMode('lightweight', true);
                loadingEl.classList.add('hidden');
                return;
            }

            try {
                initThree();
                await new Promise(resolve => setTimeout(resolve, 300));
                loadingEl.classList.add('hidden');
                skipBtn.classList.add('visible');
                buildTimeline();
                animate();
            } catch (err) {
                console.error('沉浸模式初始化失败:', err);
                webglFailed = true;
                switchMode('lightweight', true);
                loadingEl.classList.add('hidden');
            }
        }

        init().catch(err => {
            console.error('初始化失败:', err);
            switchMode('lightweight', true);
            loadingEl.classList.add('hidden');
        });
    </script>
</body>
</html>
